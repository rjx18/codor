id: account-usage-limits-are-probed-periodically-and-honestly-refreshable
hash: a-70eef0038b1b
title: Account usage limits are probed on boot, every five minutes, and manually
  refreshable with an honest, visible outcome
state: active
statement: "The daemon probes account-level usage limits once immediately on
  boot and then every five minutes by default, running one probe per
  harness/account and fanning the identical result to every active non-removed
  member of that harness; an in-flight probe coalesces overlapping automatic and
  manual requests so none is duplicated, and a provider failure or empty result
  preserves the last-known-good limits. An authorized manual usage-refresh -
  gated like the adapter refresh (manage_agents) and subject to a short
  server-enforced cooldown so repeated clicks cannot exceed provider rate limits
  - invokes the same probe and returns a distinguishable outcome: refreshed on
  success, cooldown or coalesced when a probe is too recent or already in
  flight, and failed when a provider probe threw. A failed outcome is surfaced
  to the operator as a concise, visible, accessible message near the refresh
  control - not by tint or title alone - while every last-known-good gauge is
  preserved. Provider OAuth credentials are never exposed to clients."
depends_on: []
created_by: codor-polish-phase3-honest-refresh-outcome
