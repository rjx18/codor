title: Harness refresh rescans safely and discovers only newly available models
state: active
statement: An authenticated global manage_agents operation may rescan canonical
  executable presence without restarting the daemon or mutating PATH, and model
  discovery starts only for adapters that transition from unavailable to
  available.
