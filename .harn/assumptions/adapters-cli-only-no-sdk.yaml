id: adapters-cli-only-no-sdk
hash: a-3cc26efc0176
title: Adapters drive plain CLI subprocesses, never SDKs
state: active
statement: The codex adapter must drive the codex CLI strictly as a spawned
  child process over argv and stdout JSONL - flags before the resume subcommand,
  stdin closed, the child in its own process group so signals reach the real
  engine behind the npm shim - with no SDK, HTTP client, or IPC dependency,
  because plain-CLI coupling is the design rule that keeps every harness
  identically shaped and new harnesses cheap.
depends_on:
  - codex-event-contract-pinned
created_by: codex-adapter-cli-driver
