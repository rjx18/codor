id: agent-member-credentials-are-defense-in-depth
hash: a-e7156168f8dd
title: A member credential narrows defaults but is not a process sandbox
state: active
statement: Documentation must state that a rotating room-scoped member
  credential prevents accidental owner-authority use by default, but an agent
  subprocess still runs as the operator's OS uid and may read the owner token
  file and every filesystem or network resource that uid and its harness policy
  permit; real containment requires an OS, VM, or container boundary.
depends_on:
  - member-session-masks-operator-token
  - agent-network-authority-is-narrow
created_by: lc6-release
