id: agent-member-credentials-stay-secret
hash: a-e6cce7bbed4d
title: An agent receives a credential, never a reusable secret in the transcript
state: active
statement: A daemon-owned agent session must receive a cryptographically random
  member credential through Session.env together with the exact local socket,
  channel, and member identity it belongs to. Only a one-way hash may be
  persisted on the member row; the raw token may live only on the in-memory
  Session, and every path that acquires a new daemon-owned session - initial
  spawn, revive or adoption, and lazy reconstruction after restart - must rotate
  it. The server may resolve the hash only to that active agent member and room,
  because a transcript, member frame, payload, journal, log, or old revived
  process must never become a reusable credential.
depends_on:
  - a-session-carries-the-environment-its-children-need
  - server-token-required
  - redaction-before-fanout
created_by: lc2a-member-credentials
