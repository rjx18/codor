id: attachments-are-data-dir-files-delivered-as-paths
hash: a-8d9ab62c58c2
title: Attachments are room-scoped files under the data directory, capped,
  served authenticated, and handed to agents as absolute paths
state: retired
statement: A message attachment is one uploaded file of any type up to 25 MB
  stored under the daemon data directory keyed by a server-issued id (never the
  client filename), at most 8 per message, posted only by referencing prior
  authenticated uploads in the same room, served back only through the
  authenticated endpoint, appended to agent delivery payloads as an absolute
  path line, unlinked from disk when its message is deleted, and swept at boot
  when no message referenced it within a day.
depends_on: []
created_by: message-attachments
retired_by: attachment-serve-mime-hardening
