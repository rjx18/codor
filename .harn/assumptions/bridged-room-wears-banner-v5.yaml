id: bridged-room-wears-banner-v5
hash: a-90cb84dc7513
title: Bridged rooms permanently disclose their external content boundary
state: active
statement: A room with any enabled Slack or Telegram bridge must persist a
  bridged config flag and render a permanent plain-language external-platform
  privacy banner on room, settings and ledger surfaces, in the soft-editorial
  visual system, because readable room content deliberately leaves the local
  trust boundary until the bridge is disabled.
depends_on:
  - soft-editorial-design-system-guides-responsive-surfaces
  - web-room-visual-hierarchy-matches-soft-editorial-reference
