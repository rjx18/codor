id: built-in-adapters-require-daemon-path
hash: a-4407330f1198
title: Built-in harness availability comes from the daemon PATH
state: retired
statement: A built-in adapter is available for new agents only when its
  registry-owned canonical executable resolves on the daemon host PATH, while a
  successfully loaded configured adapter is available by virtue of module
  loading; full registered metadata remains available internally and the public
  catalog reports installation state without executing a harness.
depends_on:
  - adapter-registry-sole-harness-source
  - adapters-own-their-model-catalog
created_by: codor-agent-onboarding-phase3
retired_by: codor-runtime-fidelity-phase6
