id: claude-control-protocol-pinned
hash: a-eceb86526019
title: Recorded claude stream-json fixtures pin the control protocol
state: active
statement: The JSONL files under packages/adapters/claude-code/fixtures/ must be
  raw scrubbed captures of live claude -p stream-json sessions (system init
  session_id, assistant events, result usage and cost,
  control_request/control_response shapes for AskUserQuestion and permission
  prompts including the stdin answer path, SubagentStart/SubagentStop hook
  payloads, and both kill/resume crash boundaries) and are the normative shapes
  the claude adapter and its tests replay, because the ask/approval control
  protocol is pinned from probed reality - drift must be re-probed, never
  hand-edited.
depends_on: []
created_by: harness-conformance-fixtures
