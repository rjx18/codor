id: claude-sdk-message-contract-preserves-normalized-runs
hash: a-27a0a13449f9
title: Agent SDK message objects preserve Claude normalized run semantics
state: active
statement: Claude translation must consume Agent SDK message objects, keep tool,
  pending-permission, and terminal state turn-scoped, carry only the native
  session id and context-window telemetry across turns/query recovery, and
  preserve normalized usage snapshots/live updates, native compaction markers
  and post-token re-baselining, and native result failures with error detail
  structurally separate from reply text; fixture tests and injected Query mocks
  must never call the live CLI or API.
