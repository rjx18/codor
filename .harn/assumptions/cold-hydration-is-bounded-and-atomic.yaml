id: cold-hydration-is-bounded-and-atomic
hash: a-070479625404
title: A limit-bearing cold subscribe hydrates a bounded tail plus named
  correctness outliers from one snapshot, committed atomically
state: retired
statement: When a subscriber sends a hydrate limit with since_seq 0, the store
  answers from one transaction with the contiguous tail of the last N messages
  plus every running run, the messages of unresolved interactions, the messages
  referenced by that subscriber's unread consumed deliveries, and the latest
  finalized non-ack agent message, alongside the full roster, the
  subscriber-scoped inbox, and the latest meter, with sync_complete carrying the
  current seq and the contiguous tail's floor id; clients stage hydration frames
  and commit them in a single store update revealed bottom-anchored; a
  subscriber that sends no limit, and every warm subscribe with since_seq above
  zero, receives today's full replay byte-identically, so bounding can never
  hide an in-place change from a reconnect.
depends_on: []
created_by: bounded-cold-hydration
retired_by: durable-read-support
