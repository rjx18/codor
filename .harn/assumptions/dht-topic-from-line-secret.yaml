id: dht-topic-from-line-secret
hash: a-821aab376a4d
title: Line discovery topics derive only from the shared name and secret
state: retired
statement: Every configured line must join the 32-byte libsodium BLAKE2b hash of
  the exact UTF-8 string wireroom:name:secret as both a Hyperswarm client and
  server, while neither the line name nor secret appears on the DHT, because
  only holders of the shared line configuration may discover one another.
depends_on:
  - single-crypto-suite-libsodium
created_by: hyperswarm-transport
retired_by: codor-p6b-runtime-strings
