title: Grouped deliveries retain roster and conventions briefings
state: active
statement: Delivery-time composition for grouped work must append the active
  roster when the recipient roster is stale and the capability-aware conventions
  on first delivery or after misaddress, then clear each flag only after
  appending its block, while the immutable group root and result bundle remains
  unchanged.
