id: interaction-ack-requires-stream-progress
hash: a-fb6790edbc55
title: Interaction acknowledgement requires later stream progress
state: retired
statement: respondInteraction must register its acknowledgement boundary before
  writing stdin and resolve only after a subsequent output event proves the
  harness consumed the control response; EOF, child error, or exit must reject
  the acknowledgement, and the daemon must propagate that failure to the caller.
depends_on:
  - interactions-answered-via-stdin-control
