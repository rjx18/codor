id: literal-draft-recipient-visible-before-send
hash: a-27f291e82167
title: The composer makes default recipients literal before send
state: active
statement: The composer must materialize an available latest finalized non-ack
  agent default as one editable literal @handle mention when the first character
  of an empty draft is not @, never reinsert it within that draft after
  deletion, and use the shared body parser for a keyboard-and-touch member
  mention popup that excludes non-addressable and removed members, because the
  human must see and control the exact recipient in message text before sending.
depends_on:
  - body-parser-shared-across-router-and-web
  - substantive-routing-excludes-acknowledgements
  - removed-members-remain-attribution-tombstones
created_by: codor-p4e-composer
