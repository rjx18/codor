id: message-activity-drives-unread
hash: a-5a08c81e2309
title: Only substantive incoming message activity creates channel unread
state: retired
statement: Each chat insertion and each transition of a non-ack run into a
  finalized status must record that message's room activity seq, while running
  runs, asks, approvals, system rows, acknowledgements, pinning, deletion, and
  non-message mutations must not; a human's unread count is the nondeleted
  activity above their read seq whose author is not them, so in-place run
  finalization is visible without unrelated changes becoming unread.
depends_on:
  - substantive-routing-excludes-acknowledgements
  - changelog-is-sync-cursor
created_by: durable-read-support
retired_by: continuation-writer
