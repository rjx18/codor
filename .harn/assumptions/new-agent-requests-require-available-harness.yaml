id: new-agent-requests-require-available-harness
hash: a-de2a4c16378a
title: New agents require truthful native or configurable availability
state: active
statement: New member and starting-agent requests must reject a native adapter
  that is unavailable before persistence, while ACP requests must carry
  authorized valid structured launch configuration whose executable resolves on
  the daemon host; failures after either preflight retain the established
  room-creation behavior.
depends_on:
  - adapter-catalog-distinguishes-installed-and-configurable
  - acp-launch-is-structured-authorized-and-bounded
  - canonical-spawn-controls-enforced
  - channel-creation-derived-and-seeded
