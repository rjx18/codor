id: pins-are-durable-owner-admin-markers
hash: a-f6f1d7e92786
title: A pin is a durable message flag only owner or admin humans may flip,
  synced like any message change
state: active
statement: Pinning sets a boolean on the message row through the room change
  log, so live frames and reconnect sync agree on it forever; only human members
  with role owner or admin may flip it, agents and observers are refused, a
  deleted message cannot be pinned, re-flipping to the same value changes
  nothing and emits nothing, and pinning never re-routes deliveries, alters run
  journals, or affects message ids.
depends_on: []
created_by: pins-statement-truth-correction
