id: public-npx-install-is-primary-install
hash: a-477d7e252f16
title: The public npx install command is Codor's primary installation path
state: active
statement: Operator documentation must present `npx @richhardry/codor install`
  as the primary Linux, macOS, and Windows installation, require Node.js 22.12.0
  or newer, explain the five-stage interactive flow and explicit unattended
  flags, retain `setup` as a backward-compatible alias, and keep the Git
  checkout build only as a development fallback; because the product promise is
  one install command and the documentation must match the command operators
  actually publish and run.
depends_on:
  - public-package-bundles-complete-codor-runtime
  - public-install-is-the-primary-command-with-setup-alias
  - setup-unattended-mutation-requires-explicit-intent
  - setup-preserves-private-platform-service
created_by: public-npx-install-docs
