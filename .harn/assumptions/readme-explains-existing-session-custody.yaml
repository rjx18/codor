title: The README explains both directions of existing-session custody
state: active
statement: The primary README must distinguish joining a live Claude Code or
  Codex TUI as a mirrored channel member from attaching a Codor-owned resumable
  member in a native terminal, and must name explicit adoption plus the required
  mirroring setup, because confusing these directions can either hide completed
  turns or create two writers for one session.
