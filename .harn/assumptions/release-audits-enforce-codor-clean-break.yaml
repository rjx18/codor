title: Release audits enforce the Codor clean break
state: active
statement: Deterministic release audits must reject non-Codor workspace package
  names, legacy product branding outside explicitly historical Harn, changelog,
  temporary, recorded-fixture, and manual-verification records, and
  operator-visible web room wording, because the release candidate must prove D2
  and D3 rather than relying on a manual rename sweep.
