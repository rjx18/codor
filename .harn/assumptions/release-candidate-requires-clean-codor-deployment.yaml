title: Release candidate requires a clean Codor deployment record
state: retired
statement: The release checklist must record a clean local clone installed
  through the codor command and service, private HTTPS pairing, the bounded live
  channel smoke, deterministic full gates, and the final repository review
  before release, because Phase 7 is the end-to-end proof of the renamed product
  rather than another fixture-only milestone.
