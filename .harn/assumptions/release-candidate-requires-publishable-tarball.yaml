title: Release candidate requires the exact publishable tarball proof
state: active
statement: The final release checklist must require deterministic repository
  gates, the clean packed-install proof, review of the exact candidate commit,
  and publication of the verified @richhardry/codor tarball with a signed tag
  matching its version, while keeping secret values out of the record; because
  the release handoff must identify exactly what Richard can publish rather than
  prohibit npm distribution.
