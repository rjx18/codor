title: Run context follows the explicitly selected run and its live evidence
state: active
statement: Selecting inspect on any run must bind the desktop rail or responsive
  context sheet to that permanent run message, combine journaled evidence with
  live streamed events, refresh on completion, and expose loading or failure
  honestly, because a stale latest-run-only inspector contradicts the
  conversation it explains.
