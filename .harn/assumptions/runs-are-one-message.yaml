id: runs-are-one-message
hash: a-111ce49f5e97
title: One turn produces exactly one run message, reused across retries
state: retired
statement: Starting a turn must post exactly one run placeholder message (status
  running, events_ref pointing at its blob) and a crash-retry of the same
  delivery must REUSE that placeholder rather than posting a second run message,
  because message ids are permanent and a re-attempted turn is the same turn,
  not a new one.
depends_on:
  - reply-is-finalized-run-message
created_by: daemon-pump-lifecycle
retired_by: continuation-writer
