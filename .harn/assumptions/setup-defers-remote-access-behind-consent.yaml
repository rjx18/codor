id: setup-defers-remote-access-behind-consent
hash: a-8db33073cce3
title: Remote access detects and configures Tailscale only after the operator
  chooses remote and consents, degrading to local on failure
state: retired
statement: Interactive setup must ask where Codor will be used (this computer
  only, or remotely) and must not detect, capability-probe, or configure
  Tailscale until the operator chooses remote; only then may it resolve the CLI,
  probe Serve, explain that Serve enables secure access from other devices, and
  ask a separate consent before configuring Serve; a missing or Serve-incapable
  Tailscale offers Retry or Continue-on-this-computer, and a Serve configuration
  failure keeps local Codor working while showing the exact resolved `tailscale
  serve` command and the real error to run later rather than exiting fatally or
  inventing sudo; because choosing an access mode must never silently mutate
  Tailscale and a remote-access problem must never break local setup.
depends_on:
  - setup-resolves-and-capability-probes-tailscale-serve
  - setup-auto-advances-and-gates-mutation-on-consent
created_by: codor-install-remote-access
retired_by: codor-remote-access-recovery-assumption
