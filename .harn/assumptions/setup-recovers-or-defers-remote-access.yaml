id: setup-recovers-or-defers-remote-access
hash: a-759febaf3325
title: Remote access defers Tailscale behind consent and recovers a Serve
  failure in place instead of auto-degrading
state: retired
statement: Interactive setup must ask where Codor will be used (this computer
  only, or remotely) and must not detect, capability-probe, or configure
  Tailscale until the operator chooses remote; only then may it resolve the CLI,
  probe Serve, explain that Serve enables secure access from other devices, and
  ask a separate consent before configuring Serve. A missing or Serve-incapable
  Tailscale offers Retry or Continue-on-this-computer. A Serve configuration
  failure must not auto-degrade - it stays in the remote-access step showing the
  real error and the exact resolved tailscale serve command, and, only when the
  error indicates a permission/operator/root authorization problem on Linux or
  WSL, the documented sudo tailscale set --operator recovery command - then
  offers Retry, which re-runs Serve, or Continue-on-this-computer, which
  confirms the local-only fallback before advancing. It never runs sudo
  automatically, never claims a sudo fix for unrelated errors, and never breaks
  local Codor.
depends_on:
  - setup-resolves-and-capability-probes-tailscale-serve
  - setup-auto-advances-and-gates-mutation-on-consent
created_by: codor-remote-access-recovery-assumption
retired_by: codor-tailscale-recovery-qr-fit
