id: setup-renders-five-stage-interactive-session
hash: a-4bdda758a064
title: Setup renders five numbered stages from pure state
state: active
statement: Interactive setup must render Codor word art, version and byline,
  five numbered named stages with pending, running, done, skipped or failed
  state, an animated running indicator, bounded dim rolling logs, and a closing
  summary naming endpoint, detected harnesses, and next action; frame production
  must be a pure function of supplied state and must keep actionable content
  visible at 80x10 and 40x24, because deterministic terminal behavior requires
  frames that can be asserted as values rather than scraped from side effects.
depends_on:
  - adapter-registry-sole-harness-source
created_by: codor-interactive-setup-session
