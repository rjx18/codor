id: shutdown-interrupted-deliveries-requeue
hash: a-a40846670986
title: A daemon restart re-queues the deliveries of turns it killed, bounded by
  the attempt ceiling
state: active
statement: When boot recovery finalizes a stranded running run as interrupted,
  the deliveries bound to that run re-queue with their attempt count preserved
  so the recipient re-takes the same instruction as a fresh turn, while
  deliveries at the attempt ceiling or whose trigger message was deleted are
  left consumed and surfaced through the stranded-run system message, so a
  routine restart never silently eats an instruction and a poisonous one cannot
  loop the daemon.
depends_on: []
created_by: shutdown-interrupted-requeue
