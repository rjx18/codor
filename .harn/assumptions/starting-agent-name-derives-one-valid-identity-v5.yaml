id: starting-agent-name-derives-one-valid-identity-v5
hash: a-10d1556bc585
title: A channel's starting-agent name derives exactly one valid identity
state: active
statement: A channel's optional starting-agent name must be preserved as
  display_name while one shared protocol helper derives the lowercase ASCII
  assignable handle preview and request value; unsupported runs become
  separators, length is bounded, empty or too-short derivations use a stable
  valid fallback, reserved output is rejected, and identity errors are shown at
  the name field before any room is created, because a human-facing Name control
  must not leak the strict handle grammar or blame the project folder.
depends_on:
  - reserved-handles-rejected
  - channel-create-request-contract
  - channel-creation-derived-and-seeded
  - channel-create-dialog-renders-an-accessible-accent
created_by: v5-p3-room
