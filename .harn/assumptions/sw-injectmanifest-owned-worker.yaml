id: sw-injectmanifest-owned-worker
hash: a-c5ee2469d681
title: The PWA builds a source-owned service worker through injectManifest
state: active
statement: The web production build must use vite-plugin-pwa in injectManifest
  mode to compile and register a service worker owned in the web source tree,
  with an installable mobile manifest and update lifecycle under Wireroom's
  control, because push decryption and notification actions must extend that
  same worker in P3.3 without replacing an autogenerated worker.
depends_on: []
created_by: pwa-shell
