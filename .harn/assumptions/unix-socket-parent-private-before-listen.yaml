id: unix-socket-parent-private-before-listen
hash: a-68719e99fcea
title: Unix socket parent privacy is established before listen
state: active
statement: Before binding the unauthenticated local WebSocket, startServer must
  create or verify that the socket parent directory has no group or other
  permissions, rejecting a public parent before listen, because post-listen
  chmod of the socket alone leaves a local authentication window.
depends_on:
  - unix-socket-same-protocol
created_by: m1fix-lifecycle-minors
