id: web-room-visual-hierarchy-matches-restrained-reference
hash: a-a6e5847e2e73
title: The room surface matches the restrained editorial references
state: retired
statement: The web room must prioritize conversation through full-height matte
  panes, text-first room rows, unframed messages and evidence, a plain context
  inspector, sparse functional glass, compact system typography, and scarce
  semantic color from wide desktop through the installed mobile PWA, because the
  approved v4 references define a calm operational tool rather than a neon
  control room or generic chat layout.
