id: web-room-visual-hierarchy-matches-soft-editorial-reference
hash: a-faccb7a02c09
title: The room surface matches the soft-editorial references
state: active
statement: The web room must match the approved soft-editorial references - a
  warm neutral canvas, three floating rounded panels for the channel rail, the
  centered timeline and the context rail on desktop, a centered timeline about
  760px wide with the day's messages full-bleed, message rows with a 34px avatar
  and per-message actions limited to a functional Copy control that copies the
  message body and announces success, or a clipboard failure, in a live region,
  and the existing independent permalink, both reachable by keyboard and touch,
  run, tool and ask cards on the v5 radius scale, and a rounded composer with a
  typing peek. All eight adopted surfaces - message, run, tool, ask, hold,
  composer, member and channel-row - consume the presentation model with
  adoption true and resolve their frame live, subscribing to viewport width
  after mount so that crossing the 720px content breakpoint reframes them, with
  every listener removed on unmount. On a phone the ordinary message, run and
  tool surfaces render as an unframed prose timeline with no message cards, no
  per-message avatars, an author header only on speaker change and tool calls
  collapsed to one tappable line, behind a header and off-canvas drawer, while
  ask, hold, composer, member and channel-row stay framed at every width. The
  Copy control is offered only on ordinary chat message rows; run, ask and hold
  bodies may be empty and do not carry Copy unless separately specified.
  Decorative Quote and More affordances are not shipped and require a separately
  specified functional contract. This holds because the approved v5 references
  define a calm, content-first editorial tool rather than the restrained matte
  control surface it replaces.
