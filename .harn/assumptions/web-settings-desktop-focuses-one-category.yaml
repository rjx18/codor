id: web-settings-desktop-focuses-one-category
hash: a-40c3790a997f
title: Desktop settings present one focused category at a time
state: retired
statement: The desktop settings workspace must show the selected category as the
  primary content panel while the mobile settings surface keeps every category
  in a linear scroll, because desktop operators need a calm focused tool and the
  installed PWA needs predictable native-style navigation.
