id: windows-setup-installs-task-scheduler-service
hash: a-b5c7396b6976
title: Windows setup installs a hidden per-user Task Scheduler service
state: retired
statement: On Windows codor setup must confirm mutations, create private
  configuration and data paths, protect the operator token with the current
  user's ACL, render a hidden logon Task Scheduler job that runs the built CLI
  and web-next assets from the invoking checkout with absolute paths, read the
  token from disk without printing it, and propagate the daemon exit code,
  because setup must produce the same durable per-user service outcome as Linux
  and macOS without exposing credentials.
depends_on:
