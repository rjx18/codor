title: Recursive and project gates cover every buildable workspace
state: active
statement: pnpm-workspace.yaml must enumerate packages/*, nested adapters,
  nested bridges, website, and relay so recursive build and test scripts cannot
  skip a buildable project, while vitest.workspace.ts must enumerate every
  project that actually owns Vitest specs and leave the VitePress website to its
  package-level static-build test.
