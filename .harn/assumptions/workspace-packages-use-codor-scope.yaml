id: workspace-packages-use-codor-scope
hash: a-1236ba0217a7
title: Every publishable workspace identity uses the codor package scope
state: active
statement: All fourteen scoped workspace package names, workspace dependency
  keys, source imports, package-identity tests, and root filter commands must
  use the @codor scope with a lockfile regenerated by pnpm, because the clean
  product rename must not leave mixed package identities or resolution paths.
depends_on:
  - workspace-gates-cover-all-buildable-projects
  - release-gate-runs-unit-and-browser
created_by: codor-p6a-package-scope
