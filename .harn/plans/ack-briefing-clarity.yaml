id: ack-briefing-clarity
title: Clarify that ACK_OK is an entire no-action response, never a sign-off.
notes: Agent briefings currently say only to respond exactly with ACK_OK when no
  substantive reply is needed. Models can misread that as permission to append
  the marker after useful work, causing the exact-marker parser to treat the
  whole response as substantive and route it onward. Ordinary and grouped
  briefings will say that ACK_OK is the entire response only when neither action
  nor an answer is needed, and that it must never be appended after work or used
  as a sign-off. Detection remains exact and case-sensitive. Public protocol
  examples and anchored regressions change with the emitted bytes.
