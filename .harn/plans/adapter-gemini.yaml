id: adapter-gemini
title: P1.7a Gemini CLI adapter from documented stream JSON behavior
assumptions:
  retire: []
  create:
    - id: gemini-capability-truth
      title: Gemini capabilities match its direct CLI behavior
      statement: The Gemini adapter must drive one headless CLI process per turn with
        stream-json output, capture and reuse the init session UUID in the
        persisted working directory, enumerate stored main-session UUIDs, expose
        the native resume TUI, translate documented message, tool, error,
        result, and token-usage events without fabricating dollar cost, and
        declare asks, runtime approvals, and extensions unsupported, because
        every advertised capability must be demonstrated by a synthetic
        documented-format fixture or an operator-authenticated manual probe.
      reason: PLAN-M1 P1.7a makes capability truth the acceptance boundary; the
        first-party headless and session-management references document JSONL
        init UUIDs, exact UUID resume, project-scoped history, and token
        statistics, while this machine has neither the Gemini binary nor
        authentication and therefore cannot honestly produce a live capture.
      depends_on:
        - adapters-cli-only-no-sdk
        - adapter-process-lifecycle-supervised
        - uncosted-usage-visible-not-guessed
  reviewed:
    - id: adapters-cli-only-no-sdk
      outcome: unchanged
      reason: The implementation spawns the first-party gemini executable with
        headless stream-json flags and does not use Gemini ACP, an SDK, HTTP, or
        a Paseo sidecar.
    - id: adapter-process-lifecycle-supervised
      outcome: unchanged
      reason: Gemini receives the same spawn, stderr, error, close, stream-EOF,
        detached-process-group, and group-interrupt supervision as existing CLI
        adapters.
    - id: uncosted-usage-visible-not-guessed
      outcome: unchanged
      reason: Documented Gemini stream statistics contain token counts but no dollar
        cost, so normalized usage must remain visibly uncosted.
    - id: attach-custody-lease-tracks-child-pid
      outcome: unchanged
      reason: The native Gemini resume TUI is added to the existing inherited-stdio
        attach supervisor without changing its lease or process-group handshake.
anchors:
  gemini-capability-truth:
    gemini-documented-event-translation:
      action: change
      reason: Translate synthetic documented-format JSONL and expose only the session,
        text, tool, error, and token facts the stream actually reports.
    gemini-capability-conformance:
      action: change
      reason: Assert every true capability through fixture replay, store discovery,
        argv construction, or the native attach command, and every false
        capability through explicit adapter behavior.
  adapters-cli-only-no-sdk:
    gemini-cli-subprocess-driver:
      action: change
      reason: Add the direct gemini CLI spawn, resume, model, policy, cwd, and
        process-group driver while intentionally rejecting the ACP reference
        path.
  adapter-process-lifecycle-supervised:
    gemini-cli-process-supervision:
      action: change
      reason: Supervise Gemini spawn through stdout EOF and signal its entire process
        group on interrupt or cleanup.
  attach-custody-lease-tracks-child-pid:
    interactive-child-supervision:
      action: change
      reason: Resolve Gemini interactive attach to gemini --resume UUID inside the
        existing child supervisor.
