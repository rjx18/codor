      action: change
      reason: Keep the primary CLI install and common commands visible in fewer lines.
  live-collaboration-contract-is-public-v5:
    readme-live-collaboration:
      action: change
      reason: Collapse only advanced live-collaboration mechanics.
  agent-member-credentials-are-defense-in-depth:
    readme-agent-trust-boundary:
      action: change
      reason: Shorten the visible warning without weakening its boundary.
files:
  - README.md
verification: Harn check passes with no unplanned anchors; README is 110-161
  lines; the visible path contains requirements, clone, frozen install, build,
  CLI install, setup, platform service result, product value, common CLI
  commands, security warning, and documentation; no more than three secondary
  details blocks hold operating help, advanced collaboration/privacy, and
  development; all local links and logo assets resolve; website verification,
