id: balanced-human-readme
title: Make the README concise without hiding the everyday product and CLI path
notes: Richard wants a human-readable README around one-third to one-half of its
  current 323 lines, not an operations manual and not a stack of dropdowns. Keep
  the branded header, normal installation, product value, everyday channel
  workflow, basic CLI examples, documentation links, and the short security
  warning visible. Put only secondary service diagnostics, Tailscale manual
  commands, foreground development, upgrades, advanced collaboration mechanics,
  deeper privacy notes, and contributor commands in native HTML details blocks.
  Link to the dedicated guides instead of duplicating their prose. Code, service
  behavior, and public contracts remain unchanged.
assumptions:
  reviewed:
    - id: operator-launches-serve-web-next
      outcome: unchanged
      reason: The short visible install still builds and launches web-next, with
        secondary operating commands collapsed or linked to SELF-HOST.
    - id: human-facing-surfaces-call-rooms-channels
      outcome: unchanged
      reason: Visible product and workflow copy continues to call the concept a
        channel.
    - id: global-cli-install-is-idempotent
      outcome: unchanged
      reason: The install script and basic CLI use stay visible, while pnpm link
        remains an option.
    - id: live-collaboration-contract-is-public-v5
      outcome: unchanged
      reason: The advanced agent-to-agent collaboration contract remains public in one
        disclosure.
    - id: agent-member-credentials-are-defense-in-depth
      outcome: unchanged
      reason: The concise process-boundary warning remains visible and links to deeper
        privacy detail.
anchors:
  operator-launches-serve-web-next:
    readme-current-web-client:
      action: change
      reason: Replace the long install manual with one primary flow and one secondary
