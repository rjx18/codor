id: codor-install-durable-wiring
title: Phase 1 - point the per-user service at the durable runtime and gate the
  Install step behind consent
notes: >-
  Second phase of the installer redesign. Wire the Phase 0 durable-runtime
  backend into runSetup so every platform service (systemd unit, launchd plist,
  Windows script) resolves its CLI entrypoint, static root, and working
  directory from the durable ~/.codor/runtime copy instead of the ephemeral
  invoking runtime, while the service template is still read from the source
  runtime (which exists at install time). The Install step performs the durable
  copy plus private config/data/token, only on consent, and offers
  Continue/Update when an install already exists. A source checkout stays
  in-place. Dry-run reports the durable target without mutating. `--yes`
  performs the durable install unattended.

  This phase keeps the current step order; the five-step reframe, visuals, and
  Tailscale/pairing changes follow in later phases.
assumptions:
  reviewed:
    - id: setup-installs-durable-per-user-runtime
      outcome: unchanged
      reason: The backend contract is unchanged; runSetup now calls it and points the
        service at its result, adding a second anchored use site.
    - id: setup-preserves-private-platform-service
      outcome: unchanged
      reason: Directory modes, the absent-only token, the service PATH, and the
        no-root, no-secret invariants are unchanged; the service now references
        the durable installed runtime rather than the ephemeral invoking one,
        and the Install step is consent-gated.
    - id: setup-dry-run-reports-without-mutation-or-secret
      outcome: unchanged
      reason: Dry-run still previews without mutating or leaking the token; it now
        also reports the durable install target and that the service references
        it.
anchors:
  setup-installs-durable-per-user-runtime:
    setup-install-runtime-wiring:
      action: change
      reason: runSetup computes the service runtime from the durable install location
        and the Install step performs the copy plus config/data/token on
        consent.
  setup-preserves-private-platform-service:
    setup-platform-service-runtime:
      action: change
      reason: The service rendering consumes the durable installed runtime; the
        Install step gains the durable copy and Continue/Update.
    setup-platform-service-regression:
      action: change
      reason: A regression proves the service ExecStart references ~/.codor/runtime
        for an ephemeral runtime and stays in-place for a checkout.
  setup-dry-run-reports-without-mutation-or-secret:
    setup-dry-run-runtime:
      action: change
      reason: Dry-run reports the durable install target.
    setup-dry-run-regression:
      action: change
      reason: The dry-run regression covers the durable-target line.
  windows-setup-installs-private-task-service:
    windows-setup-runtime:
      action: keep
      reason: The change is inside the nested platform-service region; the outer
        Windows runtime anchor is not directly touched.
files:
  - packages/cli/src/setup.ts
  - packages/cli/src/setup-ui.ts
  - packages/cli/src/index.spec.ts
verification: >
  - Ephemeral runtime: the rendered systemd/launchd service ExecStart references
    ~/.codor/runtime/node_modules/@richhardry/codor/node_modules/@codor/cli/dist/index.js
    and never an _npx path; the durable copy is performed via an injected io.

  - Source checkout: the service stays in-place at the checkout paths (existing
    dry-run snapshot unchanged).

  - Install step creates config/data mode 700 and the absent-only mode-600 token
    after the durable copy; --yes performs it unattended; dry-run reports the
    durable target without mutating.

  - Focused index.spec setup suites, tsc build, and harn check pass.
