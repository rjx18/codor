id: codor-install-remote-access
title: >-
  Phase 3 - Where will you use Codor, with a deferred Tailscale remote sub-flow
  and graceful Serve degradation
notes: >-
  Fourth phase. Reframe step 3 as "Where will you use Codor?" (On this computer
  only / On this computer and remotely). Tailscale is not inspected until the
  operator chooses remote: only then does the step detect the CLI, capability
  probe Serve, explain what Serve does, and ask a separate consent before
  configuring it. If Tailscale is missing or cannot Serve, the step offers Retry
  or Continue-on-this-computer. If configuring Serve fails, local Codor is kept
  working and the exact copyable command (the resolved `tailscale serve --bg`
  we attempted) plus the real error are shown for the operator to finish later -
  no invented sudo, no fatal exit. Merely selecting remote never mutates.

  A mid-step consent needs a new session capability: SetupStepContext.choose
  presents a vertical choice while a step is running and returns the selected id
  (cancel aborts). Tailscale resolution/capability/Serve functions are unchanged;
  only when they are called and the wizard sub-flow around them change.
assumptions:
  create:
    - id: setup-defers-remote-access-behind-consent
      title: Remote access detects and configures Tailscale only after the operator
        chooses remote and consents, degrading to local on failure
      statement: Interactive setup must ask where Codor will be used (this computer
        only, or remotely) and must not detect, capability-probe, or configure
        Tailscale until the operator chooses remote; only then may it resolve the
        CLI, probe Serve, explain that Serve enables secure access from other
        devices, and ask a separate consent before configuring Serve; a missing
        or Serve-incapable Tailscale offers Retry or Continue-on-this-computer,
        and a Serve configuration failure keeps local Codor working while showing
        the exact resolved `tailscale serve` command and the real error to run
        later rather than exiting fatally or inventing sudo; because choosing an
        access mode must never silently mutate Tailscale and a remote-access
        problem must never break local setup.
      reason: Captures the deferred, consented, gracefully-degrading remote-access
        sub-flow as one reviewable behavior.
      depends_on:
        - setup-resolves-and-capability-probes-tailscale-serve
        - setup-auto-advances-and-gates-mutation-on-consent
  reviewed:
    - id: setup-resolves-and-capability-probes-tailscale-serve
      outcome: unchanged
      reason: resolveTailscale, tailscaleServeSupported, and configureTailscaleServe
        are unchanged; the wizard now calls them lazily (only on remote) and
        wraps a Serve failure as graceful local degradation.
    - id: setup-restores-terminal-on-every-exit
      outcome: unchanged
      reason: The session gains a choose() capability for mid-step prompts; terminal
        ownership and teardown are unchanged.
    - id: setup-auto-advances-and-gates-mutation-on-consent
      outcome: unchanged
      reason: The run loop supplies choose() to a step's context; auto-advance, consent,
        and skip semantics are unchanged.
    - id: setup-preserves-private-platform-service
      outcome: unchanged
      reason: Tailscale detection becomes lazy and step 3 becomes the where/remote
        sub-flow; directory modes, token, service PATH, and no-root invariants are
        unchanged.
    - id: setup-dry-run-reports-without-mutation-or-secret
      outcome: unchanged
      reason: The dry-run tailscale guard now resolves Tailscale lazily; it still
        previews without mutating.
anchors:
  setup-defers-remote-access-behind-consent:
    setup-remote-access-subflow:
      action: change
      reason: New step-3 where/remote sub-flow with deferred detection, separate Serve
        consent, and graceful degradation.
    setup-remote-access-regression:
      action: change
      reason: New regression for the deferred/consented/degrading remote sub-flow.
  setup-restores-terminal-on-every-exit:
    setup-terminal-session:
      action: change
      reason: The run loop supplies a choose() capability to step contexts.
    setup-terminal-session-regression:
      action: change
      reason: A regression proves choose() presents a mid-step vertical choice.
  setup-auto-advances-and-gates-mutation-on-consent:
    setup-consent-navigation:
      action: change
      reason: The run loop builds the step context with choose().
  setup-preserves-private-platform-service:
    setup-platform-service-runtime:
      action: change
      reason: Lazy Tailscale detection and the where/remote step definition.
  setup-dry-run-reports-without-mutation-or-secret:
    setup-dry-run-runtime:
      action: change
      reason: The dry-run tailscale guard resolves Tailscale lazily.
  windows-setup-installs-private-task-service:
    windows-setup-runtime:
      action: keep
      reason: The change is inside the nested platform-service region.
files:
  - packages/cli/src/setup.ts
  - packages/cli/src/setup-ui.ts
  - packages/cli/src/setup-session.ts
  - packages/cli/src/setup-session.spec.ts
  - packages/cli/src/setup-ui.spec.ts
  - packages/cli/src/setup-remote-access.spec.ts
verification: >
  - Step 3 asks where Codor will be used; choosing "this computer only" never
    touches Tailscale. Choosing remote detects Tailscale then, asks a separate
    Serve consent, and only configures on the affirmative.

  - Missing/Serve-incapable Tailscale offers Retry or Continue-on-this-computer;
    a Serve failure keeps local Codor and prints the exact resolved
    `tailscale serve --bg` command plus the real error, without a fatal exit.

  - context.choose presents a mid-step vertical choice and returns the selection
    (session regression); cancel aborts.

  - setup flow/UI/session/PTY + tailscale + index suites, tsc build, harn check.
