id: codor-install-visual-system
title: Phase 2 - one accent color for questions and choices, with a muted
  description under each active step heading
notes: "Third phase of the installer redesign: the visual system. Each active
  step shows a short muted description directly below its heading explaining
  what the step will do, threaded from the step definition through the flow to
  the pure renderer. Questions (menu prompts) and the focused choice share one
  accent color; descriptions and secondary text stay muted. No flow, install, or
  Tailscale behavior changes here."
assumptions:
  reviewed:
    - id: setup-renders-progressive-wizard-with-visible-results
      outcome: unchanged
      reason: The renderer still shows completed results and vertical choices; it now
        also renders a muted per-step description under the active heading and
        uses one accent color for the prompt and the focused option. Layout,
        purity, and clamping are unchanged.
    - id: setup-restores-terminal-on-every-exit
      outcome: unchanged
      reason: The session threads an optional per-step description into the frame; its
        terminal ownership and teardown are unchanged.
    - id: setup-auto-advances-and-gates-mutation-on-consent
      outcome: unchanged
      reason: Step descriptions are display metadata; auto-advance, consent, and skip
        behavior are unchanged.
    - id: setup-preserves-private-platform-service
      outcome: unchanged
      reason: The interactive step definitions gain descriptions; the service and
        mutation behavior are unchanged.
anchors:
  setup-renders-progressive-wizard-with-visible-results:
    setup-frame-renderer:
      action: change
      reason: The active block renders a muted description under the heading and uses
        one accent color for the prompt and focused option.
  setup-restores-terminal-on-every-exit:
    setup-terminal-session:
      action: change
      reason: The session maps each step's description into the rendered frame.
    setup-terminal-session-regression:
      action: change
      reason: A regression proves a step description reaches the frame.
  setup-preserves-private-platform-service:
    setup-platform-service-runtime:
      action: change
      reason: The interactive step definitions gain short descriptions.
  setup-auto-advances-and-gates-mutation-on-consent:
    setup-consent-navigation:
      action: change
      reason: The run loop threads each step's description into the flow descriptor.
  windows-setup-installs-private-task-service:
    windows-setup-runtime:
      action: keep
      reason: The change is inside the nested platform-service region.
files:
