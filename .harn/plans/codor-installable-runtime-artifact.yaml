id: codor-installable-runtime-artifact
title: Emit one installable @richhardry/codor package with its CLI, adapters, browser, and service runtime
notes: >-
  Phase 6, contract 1 of 3. Generate the public package without renaming any
  @codor workspace. The wrapper carries the complete runtime workspace closure
  discovered recursively from @codor/cli, rewrites every staged workspace:*
  dependency to the exact bundled version, installs third-party dependencies
  normally from npm, delegates the public bin through runCli with concise error
  handling, and includes the production web-next build plus the systemd
  template beside the staged CLI. Setup and the foreground `up` default resolve
  that package-relative runtime first while preserving an explicit checkout
  fallback, so source installs and npx installs both render absolute service
  paths. The artifact build compiles its own inputs and its test command removes
  all inherited CODOR_ variables rather than blanking them. Interactive setup
  behavior, publication, and the final clean-container release proof belong to
  the next two contracts.
assumptions:
  create:
    - id: public-package-bundles-complete-codor-runtime
      title: The public package carries the complete Codor runtime behind one npm name
      statement: The generated @richhardry/codor package must recursively discover
        and bundle the exact @codor runtime closure from @codor/cli, rewrite every
        staged workspace dependency to the exact bundled version, install the
        closure's third-party dependencies through npm, and include the built
        web-next application and native service resources; because a one-command
        install must not depend on unpublished workspace packages or a Git
        checkout while workspace identities remain @codor.
      reason: The monorepo packages are private and use workspace:* links, while the
        approved public command is npx @richhardry/codor setup.
      depends_on:
        - workspace-packages-use-codor-scope
        - supported-browser-is-standalone-web-next
    - id: public-cli-delegation-reports-concise-failures
      title: The public wrapper invokes the CLI and preserves its one-line failure contract
      statement: The generated public codor executable must call the exported runCli
        entry explicitly and convert a rejected invocation into one nonzero,
        stack-free stderr line; because importing @codor/cli through a wrapper does
        not trigger its argv-based self-invocation guard and an unhandled rejection
        would expose implementation detail instead of an actionable error.
      reason: The public bin is a different argv entrypoint from the staged CLI module.
      depends_on:
        - public-package-bundles-complete-codor-runtime
    - id: setup-resolves-installed-or-checkout-runtime
      title: Setup services resolve the runtime that actually invoked setup
      statement: Setup and the default foreground launch path must resolve one
        complete runtime containing the CLI entrypoint, built web-next assets, and
        service template, preferring an explicitly injected checkout for tests,
        then package-relative installed assets, then the source checkout; every
        generated Linux, macOS, and Windows service must use those absolute paths,
        because an npx-installed service cannot point at a repository that is not
        present and a checkout install must remain supported.
      reason: Every current service renderer hard-codes packages/cli/dist and
        packages/web-next/dist under repoRoot.
      depends_on:
        - public-package-bundles-complete-codor-runtime
        - operator-launches-serve-web-next
        - cli-setup-wizard-installs-platform-user-service
    - id: artifact-build-runs-from-clean-source
      title: Building the public artifact compiles every input from a clean source tree
      statement: The root artifact command must build the recursively selected CLI
        runtime dependencies and web-next before staging the package, ignore its
        generated output, and be regression-tested without relying on pre-existing
        dist directories; because a tarball packed by hand from a warm worktree can
        look complete while the documented build command fails for a new contributor.
      reason: Phase 6 must hand Richard a reproducible tarball, not an artifact that
        only exists after unrelated prior builds.
      depends_on:
        - public-package-bundles-complete-codor-runtime
    - id: cli-tests-delete-inherited-codor-environment
      title: CLI tests delete every inherited CODOR_ variable before running
      statement: The CLI test command must run through a wrapper that deletes every
        CODOR_-prefixed key from the child environment, never prints a value, and
        preserves the child exit status; because blank values remain defined and a
        test inheriting live socket and bearer variables can authenticate against
        the operator's running daemon instead of its fixture.
      reason: Codor agent sessions export live CODOR_ variables in this worktree.
  reviewed:
    - id: workspace-packages-use-codor-scope
      outcome: unchanged
      reason: The public scope exists only in a generated manifest; every tracked
        workspace identity and import remains @codor.
    - id: supported-browser-is-standalone-web-next
      outcome: unchanged
      reason: The artifact copies the already-built standalone web-next output and
        introduces no legacy browser dependency.
    - id: cli-setup-wizard-installs-platform-user-service
      outcome: unchanged
      reason: This contract changes runtime path resolution but retains the current
        confirmation flow, private modes, platform services, harness PATH, dry-run,
        optional Tailscale, and pairing behavior. The interactive flow is contract 2.
    - id: setup-service-runs-from-current-checkout
      outcome: unchanged
      reason: An injected or detected checkout remains a fully tested runtime branch;
        package-relative resolution is an additional supported layout.
    - id: windows-setup-installs-task-scheduler-service
      outcome: unchanged
      reason: Windows still installs the same hidden per-user task and token-reading
        wrapper, now using the resolved invoking runtime instead of assuming a repo.
    - id: wsl-setup-reaches-windows-loopback
      outcome: unchanged
      reason: WSL bind selection and browser endpoint semantics do not change.
    - id: operator-launches-serve-web-next
      outcome: unchanged
      reason: Source paths still serve packages/web-next/dist and installed paths
        serve a byte-for-byte copy of that production build.
    - id: fresh-clone-install-proven-by-script
      outcome: unchanged
      reason: The existing clone-and-build proof remains the checkout-path gate; the
        packed install proof is added later without weakening it.
    - id: global-cli-install-is-idempotent
      outcome: unchanged
      reason: The checked-in checkout installer and its documentation are untouched
        in this contract; primary-install documentation changes in contract 3.
    - id: release-gate-runs-unit-and-browser
      outcome: unchanged
      reason: CLI artifact tests run inside the existing recursive unit-test stage;
        browser and unit release coverage is not removed or reordered.
files:
  - .gitignore
  - package.json
  - packages/cli/package.json
  - packages/cli/src/artifact.ts
  - packages/cli/src/artifact.spec.ts
  - packages/cli/src/runtime-paths.ts
  - packages/cli/src/runtime-paths.spec.ts
  - packages/cli/src/setup.ts
  - packages/cli/src/index.spec.ts
  - packages/cli/src/setup-win32.spec.ts
  - packages/cli/src/up.ts
  - scripts/test-env.mjs
anchors:
  public-package-bundles-complete-codor-runtime:
    artifact-runtime-builder:
      action: change
      reason: Discover, validate, and stage the full runtime closure plus web assets.
    artifact-runtime-regression:
      action: change
      reason: Assert exact closure, manifest rewriting, runtime assets, and package shape.
  public-cli-delegation-reports-concise-failures:
    public-wrapper-delegation:
      action: change
      reason: Generate and test the explicit runCli wrapper with one-line rejection handling.
  setup-resolves-installed-or-checkout-runtime:
    setup-runtime-resolution:
      action: change
      reason: Resolve complete package or checkout runtime paths and reject partial layouts.
    setup-runtime-resolution-regression:
      action: change
      reason: Prove both layouts and failures that name every attempted candidate.
  artifact-build-runs-from-clean-source:
    artifact-build-command:
      action: change
      reason: Compile the recursive runtime inputs and browser before staging.
  cli-tests-delete-inherited-codor-environment:
    cli-test-environment-wrapper:
      action: change
      reason: Delete all CODOR_ variables and test deletion, secrecy, and exit propagation.
  cli-setup-wizard-installs-platform-user-service:
    setup-runtime:
      action: change
      reason: Feed resolved absolute runtime paths into every service renderer.
    setup-regression:
      action: change
      reason: Update service snapshots and cover the installed runtime layout.
    setup-command-surface:
      action: keep
      reason: Interactive and unattended flags are contract 2.
  setup-service-runs-from-current-checkout:
    linux-service-current-checkout:
      action: change
      reason: Preserve checkout rendering through the shared runtime resolver.
    linux-service-current-checkout-regression:
      action: change
      reason: Keep the existing checkout regression and add installed-layout coverage.
  windows-setup-installs-task-scheduler-service:
    windows-service-rendering:
      action: change
      reason: Render the task wrapper from resolved CLI and browser paths.
    windows-setup-runtime:
      action: change
      reason: Pass the resolved runtime into Windows setup.
    windows-setup-regression:
      action: change
      reason: Prove checkout and installed paths without weakening ACL or redaction checks.
  operator-launches-serve-web-next:
    launchd-current-web-client:
      action: change
      reason: Launchd points to the resolved web-next build in either layout.
    cli-default-static-root:
      action: change
      reason: Foreground installed CLI discovers its packaged web build before cwd fallback.
  wsl-setup-reaches-windows-loopback:
    wsl-bind-selection:
      action: keep
      reason: Runtime layout changes must not alter WSL exposure selection.
    wsl-bind-regression:
      action: change
      reason: The surrounding setup snapshot changes paths while preserving host assertions.
  workspace-packages-use-codor-scope:
    codor-package-scope-regression:
      action: keep
      reason: Tracked workspace identities must remain @codor.
  global-cli-install-is-idempotent:
    per-user-cli-install-script:
      action: keep
      reason: The source CLI self-invocation and existing installer remain untouched.
    cli-install-regression:
      action: keep
      reason: The checkout installer regression remains byte-for-byte unchanged.
verification: >-
  Run the CLI artifact unit suite, including exact current closure discovery,
  workspace-protocol rewriting, third-party range conflict rejection, absence of
  source/spec/fixture files, built web and service resource presence, public
  wrapper delegation, and deletion of poisoned CODOR_ variables. Build from a
  clean exported source tree with no dist or node_modules, install dependencies,
  run pnpm build:artifact, and assert the ignored artifact contains all runtime
  assets. Pack the staged directory locally and verify npm's tar listing has no
  workspace protocol or symlink. Run CLI, switchboard, web build, audits, Harn,
  and whitespace gates. The networked clean-container and published-package
  proofs remain contract 3.
