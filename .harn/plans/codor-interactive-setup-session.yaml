  - packages/cli/src/runtime-paths.spec.ts
anchors:
  cli-setup-wizard-installs-platform-user-service:
    setup-runtime:
      action: remove
      reason: Replace the prompt wizard region with staged orchestration anchors.
    setup-regression:
      action: remove
      reason: Re-anchor setup regressions to the split replacement contracts.
    setup-command-surface:
      action: remove
      reason: Replace the old command surface with --yes and --access.
  setup-service-runs-from-current-checkout:
    linux-service-current-checkout:
      action: remove
      reason: Re-anchor service rendering to the complete invoking runtime.
    linux-service-current-checkout-regression:
      action: remove
      reason: Preserve checkout coverage under the replacement runtime assumption.
  setup-resolves-installed-or-checkout-runtime:
    setup-runtime-resolution:
      action: remove
      reason: Move the unchanged resolver to the dependency-correct replacement.
    setup-runtime-resolution-regression:
      action: remove
      reason: Re-anchor its regression to the replacement runtime contract.
  windows-setup-installs-task-scheduler-service:
    windows-service-rendering:
      action: remove
      reason: Re-anchor Windows rendering to the replacement contract.
    windows-setup-runtime:
      action: remove
      reason: Re-anchor staged Windows setup orchestration.
    windows-setup-regression:
      action: remove
      reason: Re-anchor unchanged ACL, task, and redaction coverage.
    readme-native-windows-service:
      action: keep
      reason: Documentation changes belong to contract 3.
    selfhost-native-windows-service:
      action: keep
      reason: Documentation changes belong to contract 3.
  wsl-setup-reaches-windows-loopback:
    wsl-bind-selection:
      action: remove
      reason: Re-anchor unchanged bind selection to the replacement WSL contract.
    wsl-bind-regression:
      action: remove
      reason: Re-anchor unchanged matrix coverage.
    readme-wsl-access:
      action: keep
      reason: Documentation changes belong to contract 3.
  setup-renders-five-stage-interactive-session:
    setup-frame-renderer:
      action: change
      reason: Add pure stages, statuses, bounded logs, summary, and viewport clamping.
    setup-frame-regression:
      action: change
      reason: Assert pure frames and constrained terminals.
  setup-terminal-input-survives-chunk-boundaries:
    setup-key-decoder:
      action: change
      reason: Add the stateful pure decoder and flush behavior.
    setup-key-decoder-regression:
      action: change
      reason: Prove split and coalesced sequences.
  setup-restores-terminal-on-every-exit:
    setup-terminal-session:
      action: change
      reason: Own streams, raw mode, cursor, timers, resize, and signals in one layer.
    setup-terminal-session-regression:
      action: change
      reason: Prove cleanup and interactive selection on every exit.
  setup-unattended-mutation-requires-explicit-intent:
    setup-command-surface:
      action: change
      reason: Add --yes and constrained --access while preserving --dry-run.
    setup-unattended-runtime:
      action: change
      reason: Gate non-TTY mutation and route TTYs into the session.
    setup-unattended-regression:
      action: change
      reason: Assert errors, dry-run defaults, and absence of ANSI or hangs.
  setup-preserves-private-platform-service:
    setup-platform-service-runtime:
      action: change
      reason: Preserve private files, PATH, and native services within staged execution.
    setup-platform-service-regression:
      action: change
      reason: Preserve mode, path, platform, and command assertions.
  setup-resolves-complete-invoking-runtime:
    setup-runtime-resolution:
      action: change
      reason: Re-anchor the resolver with corrected dependencies.
    setup-runtime-resolution-regression:
      action: change
      reason: Re-anchor both layout and partial-root coverage.
  setup-dry-run-reports-without-mutation-or-secret:
    setup-dry-run-runtime:
      action: change
      reason: Preview explicit access without entering the session or mutating.
    setup-dry-run-regression:
      action: change
      reason: Update snapshot and preserve token redaction and zero effects.
  setup-verifies-codor-before-creating-pairing-code:
    setup-readiness-and-pairing:
      action: change
      reason: Poll Codor-specific status then emit QR, URL, code, and expiry.
    setup-readiness-and-pairing-regression:
      action: change
      reason: Reject arbitrary listeners and prove bounded success/failure.
  windows-setup-installs-private-task-service:
    windows-service-rendering:
      action: change
      reason: Preserve hidden task rendering with the resolved runtime.
    windows-setup-runtime:
      action: change
      reason: Execute Windows as one staged service operation.
    windows-setup-regression:
      action: change
      reason: Preserve native Windows ACL, UTF-16 task, logging, and exit behavior.
  wsl-setup-keeps-private-windows-loopback:
    wsl-bind-selection:
      action: change
      reason: Re-anchor the unchanged bind selector.
    wsl-bind-regression:
      action: change
      reason: Re-anchor the WSL matrix and endpoint assertions.
verification: >-
  Run pure frame and decoder tests, including split escape input, bare-Escape
  flush, purity, every stage state, width and height at 80x10 and 40x24, and
  Space-visible radio selection. Exercise the effectful session with fake TTY
  streams and signal targets to prove prior raw mode, cursor, every listener,
  repaint timer, and flush timer restore on success, cancellation, failure,
  SIGINT, and SIGTERM; assert no alternate-screen sequence. Run a real PTY
  smoke through util-linux script when available. Update Linux, macOS, Windows,
  and WSL tests to use explicit unattended flags and a fixture Codor readiness
  probe while retaining existing modes, PATH, commands, service contents,
  redaction, QR URL equality, and endpoint assertions. Add negative readiness
  responses for an open listener and arbitrary JSON. Prove non-TTY mutation
  without both flags exits promptly and ANSI-free; prove dry-run needs neither,
  defaults localhost even when Tailscale is detected, and explicit Tailscale
  preview remains side-effect-free. Build and test CLI, run audits and Harn.
