id: codor-interactive-setup-session
title: Replace setup prompts with a five-stage terminal session and explicit unattended mode
notes: >-
  Phase 6, contract 2 of 3. Replace the five independent y/N prompts with the
  Harn-style staged terminal experience Richard requested. Rendering and key
  decoding are pure; one effectful session exclusively owns streams, raw mode,
  cursor, timers, resize, and signals. TTY setup runs five stages: check this
  computer, prepare private files, choose access, start Codor, and create a
  pairing code. Non-TTY mutation requires --yes together with --access, while
  --dry-run remains noninteractive, flag-free, localhost by default, redacted,
  and side-effect-free. The service must answer the Codor pairing-status shape
  under bounded retries before setup reports readiness. Stage five displays the
  QR, exact URL, formatted short code, and expiry without claiming a browser
  enrolled. Existing Linux, macOS, Windows, and WSL service guarantees are
  recreated against the installed-or-checkout runtime contract.
assumptions:
  retire:
    - id: cli-setup-wizard-installs-platform-user-service
      reason: Confirming every mutation is the prompt-by-prompt interaction model
        being removed; its service, privacy, PATH, dry-run, Tailscale, and pairing
        obligations are split into independently reviewable replacements.
    - id: setup-service-runs-from-current-checkout
      reason: Setup now supports the package runtime as well as a checkout; the
        complete invoking-runtime contract replaces this narrower dependency.
    - id: setup-resolves-installed-or-checkout-runtime
      reason: Its behavior remains but its dependency on the retired wizard contract
        must be replaced with the new platform-service contract.
    - id: windows-setup-installs-task-scheduler-service
      reason: Windows keeps the same durable outcome but no longer confirms each
        mutation and no longer assumes the invoking runtime is a checkout.
    - id: wsl-setup-reaches-windows-loopback
      reason: WSL behavior remains, but its dependency must move from the retired
        prompt wizard to the recreated platform-service contract.
  create:
    - id: setup-renders-five-stage-interactive-session
      title: Setup renders five numbered stages from pure state
      statement: Interactive setup must render Codor word art, version and byline,
        five numbered named stages with pending, running, done, skipped or failed
        state, an animated running indicator, bounded dim rolling logs, and a
        closing summary naming endpoint, detected harnesses, and next action;
        frame production must be a pure function of supplied state and must keep
        actionable content visible at 80x10 and 40x24, because deterministic
        terminal behavior requires frames that can be asserted as values rather
        than scraped from side effects.
      reason: Richard explicitly requested the Harn CLI visual language and stages.
      depends_on:
        - adapter-registry-sole-harness-source
    - id: setup-terminal-input-survives-chunk-boundaries
      title: Setup key decoding preserves split terminal sequences
      statement: The setup key decoder must retain incomplete escape sequences
        across data events, consume unknown CSI sequences without emitting their
        trailing letter, apply coalesced keys in order, and expose a pure flush
        that turns a retained bare Escape into cancel; because terminals split
        arrow sequences arbitrarily and a trailing letter must never become an
        unintended command.
      reason: Coalesced-only tests cannot reach the split-escape defect.
    - id: setup-restores-terminal-on-every-exit
      title: Setup restores terminal ownership on success, failure, cancel, and signal
      statement: The setup session must enter raw mode and hide the cursor only
        while it owns an interactive TTY, and on every exit must restore prior raw
        mode, show the cursor, clear repaint and Escape-flush timers, detach input,
        resize, SIGINT, and SIGTERM listeners, and re-raise a signal only after
        cleanup; it must never enter the alternate screen, because setup must not
        damage the operator's shell and its final summary must remain visible.
      reason: Terminal cleanup is independent from setup business logic and must be
        reviewable on its own.
      depends_on:
        - setup-terminal-input-survives-chunk-boundaries
    - id: setup-unattended-mutation-requires-explicit-intent
      title: Unattended setup never blocks or guesses an exposure choice
      statement: A mutating setup run with either stream non-TTY must make the
        interactive session unreachable and require both --yes and an explicit
        --access localhost or tailscale, naming a missing flag and exiting
        nonzero instead of waiting; dry-run must bypass interaction with neither
        flag required, preview localhost by default, accept an explicit access
        choice, and emit no terminal-control sequences, because CI must not hang
        and remote tailnet exposure must never be inferred from detection alone.
      reason: The current readline prompts can block a pipe, while the packed dry-run
        command is intentionally executed without TTYs.
      depends_on:
        - tailnet-auto-pairing-explicit-trust
    - id: setup-preserves-private-platform-service
      title: Setup installs a private native user service with the operator's executable paths
      statement: Setup must create configuration and data directories mode 700 and
        an absent-only operator token mode 600, install and start the native
        per-user Linux, macOS, or Windows service using the resolved absolute Node,
        CLI, browser, data, and service paths, preserve a service PATH containing
        local user bin, Node bin, and every detected supported harness directory,
        and keep secrets out of output; because persistent harness processes do
        not inherit the interactive shell and must run without root.
      reason: This carries the durable service guarantees forward independently of
        the retired confirmation model.
      depends_on:
        - setup-renders-five-stage-interactive-session
        - public-package-bundles-complete-codor-runtime
    - id: setup-resolves-complete-invoking-runtime
      title: Setup services resolve one complete installed or checkout runtime
      statement: Setup and the foreground default must resolve one complete runtime
        containing CLI entrypoint, built web-next assets, and service template,
        preferring an injected checkout, then package-relative installed assets,
        then source checkout, and every platform service must use those absolute
        paths; because mixing partial roots or assuming a repository breaks npx
        installs while source installs remain supported.
      reason: Recreates the applied runtime contract without depending on the retired wizard.
      depends_on:
        - public-package-bundles-complete-codor-runtime
        - setup-preserves-private-platform-service
        - operator-launches-serve-web-next
    - id: setup-dry-run-reports-without-mutation-or-secret
      title: Setup dry-run reports exact actions without mutating or leaking
      statement: Dry-run must report the complete platform action list, rendered
        service content, computed PATH, chosen access preview, and pairing-code
        intent while performing no filesystem, service-manager, readiness, or
        Tailscale effect and substituting a redaction for every token; because it
        is the safe way to inspect setup and the install proof runs it in a clean
        non-TTY container.
      reason: The existing dry-run safety survives while its access default becomes explicit.
      depends_on:
        - setup-unattended-mutation-requires-explicit-intent
        - setup-preserves-private-platform-service
    - id: setup-verifies-codor-before-creating-pairing-code
      title: Setup proves Codor answers before reporting readiness
      statement: The start stage must use bounded retries to require a successful
        response from the expected local Codor pairing-status endpoint whose JSON
        contains a boolean trusted_enrollment field before marking done, rejecting
        an open socket or arbitrary 200 response; only then may the final stage
        display one QR, the byte-identical pairing URL, formatted eight-character
        code, and expiry without claiming enrollment, because service-manager
        success is not daemon readiness and an operator with a phone needs the
        short-code path.
      reason: Current setup trusts the service command and omits the pairing code.
      depends_on:
        - terminal-pairing-qr-matches-plain-url
        - pairing-code-enrollment-surfaces
    - id: windows-setup-installs-private-task-service
      title: Windows setup installs a hidden private per-user Task Scheduler service
      statement: Native Windows setup must protect the token with the current
        user's ACL, render a hidden logon task whose wrapper reads the token from
        disk, runs the resolved Codor CLI and browser runtime, logs privately,
        propagates the daemon exit code, and starts without an open terminal;
        because Windows needs the same durable user-service outcome as Linux and
        macOS without exposing credentials.
      reason: Recreates the Windows contract for staged and unattended setup.
      depends_on:
        - setup-preserves-private-platform-service
        - setup-resolves-complete-invoking-runtime
    - id: wsl-setup-keeps-private-windows-loopback
      title: WSL setup remains private while reaching the Windows browser
      statement: WSL2 NAT-style setup must bind the guest daemon to 0.0.0.0 so
        Windows localhost forwarding reaches it, while ordinary Linux, WSL1, and
        mirrored WSL2 remain loopback-only and every displayed browser endpoint
        stays http://127.0.0.1:8137; because a universal wildcard creates LAN
        exposure while guest loopback alone is unreliable under WSL2 NAT.
      reason: Recreates the unchanged WSL selection under the new service contract.
      depends_on:
        - setup-preserves-private-platform-service
  reviewed:
    - id: public-package-bundles-complete-codor-runtime
      outcome: unchanged
      reason: Setup consumes the package layout emitted by contract 1 without
        changing its closure or staged assets.
    - id: cli-tests-delete-inherited-codor-environment
      outcome: unchanged
      reason: PTY and process tests continue to run through the established scrubber.
    - id: terminal-pairing-qr-matches-plain-url
      outcome: unchanged
      reason: Setup adds the code and expiry beside the same URL used for the QR.
    - id: pairing-code-enrollment-surfaces
      outcome: unchanged
      reason: Setup extends the existing CLI short-code surface without changing the exchange.
    - id: tailnet-auto-pairing-explicit-trust
      outcome: unchanged
      reason: Tailscale remains explicit and unavailable choices are refused.
    - id: operator-launches-serve-web-next
      outcome: unchanged
      reason: Every recreated platform service keeps using the resolved web-next build.
