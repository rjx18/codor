id: codor-p4f-motion-pairing
title: P4f motion, acknowledgement, and unpaired enrollment polish
assumptions:
  create:
    - id: web-motion-is-purposeful-and-reduced-motion-safe
      title: Web motion communicates live state without blocking reduced-motion use
      statement: The web surface must use the shared 120, 180, and 250 millisecond
        motion tokens for row, dialog, popup, run-reveal, tab, and running-state
        feedback, animate only transform and opacity except for the sanctioned
        run-collapse grid track, remove shimmer at finalization, and replace
        motion with instant transitions plus a static accent when reduced motion
        is requested, because live activity should be legible without jank or
        vestibular cost.
      reason: Phase 4f implements S14 under the reviewer's contradiction resolution.
      depends_on:
        - normalized-run-items-presented-live
        - web-glass-theme-accessible-modes
    - id: unpaired-browser-always-has-enrollment-path
      title: Unpaired app visits always render an actionable enrollment screen
      statement: Any app route without restored browser access must show a dedicated
        pairing screen that first reads an unauthenticated, non-mutating
        200-status trusted-enrollment probe, attempts enrollment with a progress
        state only when available, and otherwise instructs the operator to run
        codor pair and accepts a concealed pairing link that navigates to the
        existing offer route, because an unpaired browser must never land on a
        blank, permanently reconnecting application, or expected authorization
        error.
      reason: Phase 4f implements the S8b fallback and S8 client path.
      depends_on:
        - tailnet-auto-pairing-explicit-trust
        - pairing-offer-token-remains-qr-only
        - pwa-cold-launch-restores-local-auth
  reviewed:
    - id: normalized-run-items-presented-live
      outcome: unchanged
      reason: Run evidence and collapse semantics remain intact while gaining motion
        and shimmer classes.
    - id: acknowledgement-marker-protocol
      outcome: unchanged
      reason: Durable ack runs gain their specified muted web representation without
        changing evidence.
    - id: tailnet-auto-pairing-explicit-trust
      outcome: unchanged
      reason: A read-only status probe exposes only trusted-enrollment availability;
        the existing off-by-default completion authorization remains unchanged.
    - id: pwa-cold-launch-restores-local-auth
      outcome: unchanged
      reason: Successful operator or device restoration still wins before the new
        unpaired gate.
    - id: pairing-offer-token-remains-qr-only
      outcome: unchanged
      reason: The paste field conceals the link and the offer route retains its
        non-visible token treatment.
    - id: pairing-discloses-browser-and-relay-boundaries
      outcome: unchanged
      reason: Manual and automatic entry states share the existing honest enrollment
        disclosures.
    - id: single-crypto-suite-libsodium
      outcome: unchanged
      reason: Trusted completion reuses the same browser identity, sealed-room-key,
        and storage path.
    - id: web-glass-theme-accessible-modes
      outcome: unchanged
      reason: Motion and enrollment states use semantic colors, focus, and
        reduced-motion fallbacks.
    - id: normalized-run-evidence-inspector
      outcome: unchanged
      reason: Active row shimmer and the queued empty-state screenshot do not alter
        evidence selection.
    - id: web-spawn-dialog-exposes-canonical-agent-controls
      outcome: unchanged
      reason: Member state-dot shimmer is visual only and leaves replacement controls
        unchanged.
    - id: live-run-event-cache-bounded
      outcome: unchanged
      reason: The run reveal lifetime changes only presentation; the bounded cache and
        full-journal recovery behavior remain unchanged.
    - id: extensions-not-addressable-v1
      outcome: unchanged
      reason: Extension evidence remains visible but non-addressable while its run
        rendering gains presentation-only motion.
