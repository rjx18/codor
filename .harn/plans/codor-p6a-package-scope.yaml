id: codor-p6a-package-scope
title: P6a rename workspace package scope to codor
assumptions:
  create:
    - id: workspace-packages-use-codor-scope
      title: Every publishable workspace identity uses the codor package scope
      statement: All fourteen scoped workspace package names, workspace dependency
        keys, source imports, package-identity tests, and root filter commands
        must use the @codor scope with a lockfile regenerated by pnpm, because
        the clean product rename must not leave mixed package identities or
        resolution paths.
      reason: Phase 6a performs the first atomic package-scope portion of D2.
      depends_on:
        - workspace-gates-cover-all-buildable-projects
        - release-gate-runs-unit-and-browser
  reviewed:
    - id: release-gate-runs-unit-and-browser
      outcome: unchanged
      reason: The root release command keeps the same build, unit, and browser order
        while its web package filter adopts the new scope.
    - id: adapter-registry-sole-harness-source
      outcome: unchanged
      reason: Built-in adapter imports change package scope only; registry ownership
        and configured module behavior remain unchanged.
    - id: global-cli-install-is-idempotent
      outcome: unchanged
      reason: Package references in the build guard and tests change scope while the
        current runtime command remains wireroom until Phase 6b.
anchors:
  workspace-packages-use-codor-scope:
    codor-package-scope-regression:
      action: change
      reason: Prove every workspace manifest and root filter uses the codor scope.
  release-gate-runs-unit-and-browser:
    root-release-test-script:
      action: change
      reason: Update only the web package selector in the unchanged release gate.
  adapter-registry-sole-harness-source:
    configured-adapter-registry:
      action: change
      reason: Resolve the same built-in adapters through their renamed packages.
    registry-cli-composition:
      action: change
      reason: Resolve the same CLI adapter dependencies through their renamed scope.
    hardcoded-list-guard:
      action: change
      reason: Make the sole-registry source scan recognize the renamed adapter scope.
  global-cli-install-is-idempotent:
    cli-install-regression:
      action: change
      reason: Keep the installer build guard test aligned with the renamed CLI package.
