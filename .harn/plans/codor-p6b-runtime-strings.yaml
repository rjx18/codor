id: codor-p6b-runtime-strings
title: P6b rename runtime identity, storage, transport, and service strings
assumptions:
  retire:
    - id: dht-topic-from-line-secret
      reason: The clean break changes the exact discovery domain from wireroom to
        codor.
  create:
    - id: dht-topic-from-codor-line-secret
      title: Codor line discovery topics derive only from the shared name and secret
      statement: Every configured line must join the 32-byte libsodium BLAKE2b hash of
        the exact UTF-8 string codor:name:secret as both a Hyperswarm client and
        server, while neither the line name nor secret appears on the DHT,
        because only holders of the shared Codor line configuration may discover
        one another.
      reason: Phase 6b applies the D2 clean break to the discovery domain.
      depends_on:
        - single-crypto-suite-libsodium
    - id: codor-runtime-identity-is-a-clean-break
      title: Runtime identity uses codor names without legacy aliases
      statement: The CLI and bridge bins, CODOR environment variables, default
        configuration and data paths, Unix socket, service unit, setup wizard,
        browser storage and globals, PWA assets, relay headers, cryptographic
        domain separators, ledger audit directory, and internal diagnostics must
        use codor naming without wireroom aliases or fallbacks, because D2
        requires a coherent clean-break runtime rather than dual identities.
      reason: Phase 6b performs the machine-facing portion of the product rename.
      depends_on:
        - workspace-packages-use-codor-scope
    - id: codor-delivery-header-identifies-channel
      title: Agent payload headers identify Codor channels
      statement: Every composed agent delivery must begin with the exact Codor header
        prefix using channel, message id, author identity, recipient list, and
        current member identity, because the clean-break prompt contract must
        identify the renamed product while the wire protocol continues to call
        the same database object a room.
      reason: Phase 6b replaces the old product and room wording in agent payloads.
      depends_on:
        - whole-message-delivery
  reviewed:
    - id: fresh-clone-install-proven-by-script
      outcome: unchanged
      reason: The service template moves and adopts Codor paths; the fresh-clone
        script is updated separately in Phase 6d.
    - id: cli-setup-wizard-preserves-service-environment
      outcome: unchanged
      reason: Setup keeps the same confirmations, modes, absolute Node, and PATH
        computation while every installed artifact adopts Codor naming.
    - id: global-cli-install-is-idempotent
      outcome: unchanged
      reason: The installer remains build-guarded and idempotent at the codor target.
    - id: unix-socket-same-protocol
      outcome: unchanged
      reason: Only the socket filename and environment error text change; frames do
        not.
    - id: attach-custody-lease-tracks-child-pid
      outcome: unchanged
      reason: Command override variables change prefix without affecting custody.
    - id: relay-opaque-forwarder-no-crypto
      outcome: unchanged
      reason: Relay header names change together on producer and relay boundaries.
    - id: relay-stateless-subscription-in-request
      outcome: unchanged
      reason: Renamed authentication headers retain the same stateless request body.
    - id: notify-signed-by-allowlisted-switchboard
      outcome: unchanged
      reason: The signature domain changes cleanly on both signer and verifier.
    - id: push-previews-redacted-pad-then-sealed
      outcome: unchanged
      reason: Push domain and header names change without changing redaction or
        sealing.
    - id: push-decrypts-on-device-only
      outcome: unchanged
      reason: Browser and Node associated-data domains change together.
    - id: push-room-key-rotation-reaches-surviving-devices
      outcome: unchanged
      reason: Renamed domains do not change key rotation or device wrapping.
    - id: paired-browser-challenge-session
      outcome: unchanged
      reason: Browser and server challenge/session domains change together.
    - id: unpair-purges-all-browser-state
      outcome: unchanged
      reason: Purge targets the renamed Codor browser databases, caches, and keys.
    - id: single-crypto-suite-libsodium
      outcome: unchanged
      reason: Domain labels change while libsodium algorithms and formats stay fixed.
    - id: sw-injectmanifest-owned-worker
      outcome: unchanged
      reason: Manifest and icon names change without changing worker ownership.
    - id: ledger-home-only-refs-travel
      outcome: unchanged
      reason: The private audit directory changes name without changing ledger
        authority.
    - id: custody-uncertain-never-double-writes
      outcome: unchanged
      reason: The web attach command hint changes binary name only.
    - id: adapter-process-lifecycle-supervised
      outcome: unchanged
      reason: Hook paths, errors, and temporary names change product identity only.
    - id: bridge-runtime-persists-delivery-progress
      outcome: unchanged
      reason: Bridge state tests change the private directory prefix only.
    - id: terminal-pairing-qr-matches-plain-url
      outcome: unchanged
      reason: QR payload equality remains exact under renamed data paths.
    - id: adapter-registry-sole-harness-source
      outcome: unchanged
      reason: Function and test names change product identity without changing
        registry ownership.
    - id: permalink-ids-stable
      outcome: unchanged
      reason: Credential-gated acceptance text and environment names change only.
    - id: m0-live-acceptance-chain
      outcome: unchanged
      reason: Credential-gated live acceptance names change without running paid turns.
    - id: push-configuration-and-failures-are-visible
      outcome: unchanged
      reason: Diagnostic and header names change while failures remain visible.
    - id: web-settings-pairing-match-restrained-reference
      outcome: unchanged
      reason: Settings product labels change without layout or interaction changes.
    - id: web-settings-controls-preserve-product-truth
      outcome: unchanged
      reason: Runtime environment labels change with the same operational truth.
    - id: pairing-discloses-browser-and-relay-boundaries
      outcome: unchanged
      reason: Pairing branding changes while disclosures remain exact.
    - id: web-shell-responsive-three-pane
      outcome: unchanged
      reason: Shell branding changes without responsive structure changes.
    - id: client-syncs-by-seq
      outcome: unchanged
      reason: The test-only connection global changes name without sync semantics.
    - id: web-first-run-color-mode-is-dark
      outcome: unchanged
      reason: Browser storage keys change prefix while dark-first behavior remains.
    - id: web-glass-theme-accessible-modes
      outcome: unchanged
      reason: Theme regression storage names change without token behavior.
    - id: web-theme-choice-stays-local
      outcome: unchanged
      reason: The local theme key changes product prefix without changing choices.
