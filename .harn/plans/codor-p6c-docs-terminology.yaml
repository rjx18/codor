id: codor-p6c-docs-terminology
title: P6c rename documentation and human-facing room terminology
assumptions:
  create:
    - id: human-facing-surfaces-call-rooms-channels
      title: Human-facing surfaces call protocol rooms channels
      statement: Operator-visible web copy, CLI commands, long options, help,
        generated reports, documentation, website content, and agent delivery
        conventions must call the product concept a channel, while wire frames,
        REST paths, database fields, and implementation types retain room and
        the protocol guide states the equivalence exactly once, because D3
        separates product language from the stable protocol contract.
      reason: Phase 6c applies the binding channel terminology decision without
        renaming protocol identifiers.
      depends_on:
        - codor-runtime-identity-is-a-clean-break
  reviewed:
    - id: codor-runtime-identity-is-a-clean-break
      outcome: unchanged
      reason: Public documentation, website, skill, and packaging references adopt
        Codor without adding aliases or fallbacks.
    - id: codor-delivery-header-identifies-channel
      outcome: unchanged
      reason: Agent-facing conventions adopt channel language while the exact Codor
        payload header remains unchanged.
    - id: fresh-clone-install-proven-by-script
      outcome: unchanged
      reason: Install documentation and website metadata adopt the Phase 6 runtime
        names without changing the proven flow.
    - id: global-cli-install-is-idempotent
      outcome: unchanged
      reason: Installation docs name the codor command while installer behavior is
        unchanged.
    - id: cli-setup-wizard-preserves-service-environment
      outcome: unchanged
      reason: The service template uses channel-named public options without changing
        setup environment construction.
    - id: cli-member-recovery-is-actionable
      outcome: unchanged
      reason: Recovery help names channels and --channel while preserving candidate
        and dead-member behavior.
    - id: terminal-pairing-qr-matches-plain-url
      outcome: unchanged
      reason: Pairing documentation changes terminology only.
    - id: adapter-registry-sole-harness-source
      outcome: unchanged
      reason: Adapter docs and CLI help change product language without changing
        registry ownership.
    - id: tailnet-auto-pairing-explicit-trust
      outcome: unchanged
      reason: Self-host guidance changes names without weakening explicit trust.
    - id: ledger-home-only-refs-travel
      outcome: unchanged
      reason: Generated ledger headings and errors call the user concept a channel
        while storage paths and authority remain room-based protocol internals.
    - id: pairing-discloses-browser-and-relay-boundaries
      outcome: unchanged
      reason: Pairing copy changes nouns without changing the disclosed boundaries.
    - id: web-settings-controls-preserve-product-truth
      outcome: unchanged
      reason: Settings copy adopts channel terminology with the same controls.
    - id: web-settings-pairing-match-restrained-reference
      outcome: unchanged
      reason: Pairing and settings wording changes without layout changes.
    - id: web-theme-choice-stays-local
      outcome: unchanged
      reason: Settings terminology changes without affecting local theme state.
    - id: unpair-purges-all-browser-state
      outcome: unchanged
      reason: Purge notices call state channel state without changing deletion.
    - id: web-shell-responsive-three-pane
      outcome: unchanged
      reason: Rails, drawers, and context labels change terminology without changing
        responsive structure.
    - id: web-room-visual-hierarchy-matches-restrained-reference
      outcome: unchanged
      reason: Visible labels change while hierarchy and layout remain unchanged.
    - id: web-room-rail-creates-owner-room
      outcome: unchanged
      reason: The creation dialog says channel while still calling the room REST API.
    - id: channel-create-dialog-uses-authoritative-result
      outcome: unchanged
      reason: Visible creation terminology changes without deriving the returned id.
    - id: web-spawn-dialog-exposes-canonical-agent-controls
      outcome: unchanged
      reason: Spawn help calls the destination a channel without changing controls.
    - id: custody-uncertain-never-double-writes
      outcome: unchanged
      reason: Attach help changes public option spelling only.
    - id: bridged-room-wears-banner
      outcome: unchanged
      reason: The bridge banner says channel without changing its visibility.
    - id: push-decrypts-on-device-only
      outcome: unchanged
      reason: Notification copy changes terminology without changing envelope fields.
    - id: unpaired-browser-always-has-enrollment-path
      outcome: unchanged
      reason: Enrollment copy changes terminology without changing available paths.
    - id: pairing-offer-token-remains-qr-only
      outcome: unchanged
      reason: Pairing copy changes without exposing pairing tokens.
    - id: graph-derived-from-vault-links-readonly
      outcome: unchanged
      reason: Ledger navigation labels change without changing graph behavior.
    - id: normalized-run-evidence-inspector
      outcome: unchanged
      reason: Context-sheet accessible names change without changing evidence
        selection or rendering.
    - id: roster-briefing-refreshes-on-membership
      outcome: unchanged
      reason: The adjacent agent conventions copy changes terminology without changing
        roster refresh or payload contents.
    - id: sw-caches-shell-only-no-message-data
      outcome: unchanged
      reason: Timeline copy changes without changing page-memory or service-worker
        cache ownership.
    - id: spend-meter-always-on
      outcome: unchanged
      reason: The meter accessible name changes terminology while remaining visible.
    - id: literal-draft-recipient-visible-before-send
      outcome: unchanged
      reason: Composer labels change terminology without changing recipient state.
    - id: run-context-selects-and-follows-live-evidence
      outcome: unchanged
      reason: Context-sheet names change without changing live evidence selection.
    - id: single-crypto-suite-libsodium
      outcome: unchanged
      reason: Browser validation errors call the user concept a channel without
        changing key formats or algorithms.
    - id: sw-injectmanifest-owned-worker
      outcome: unchanged
      reason: Notification action labels change without changing worker ownership.
    - id: permalink-ids-stable
      outcome: unchanged
      reason: Timeline labels and generated acceptance reports change terminology
        without changing identifiers.
