      outcome: unchanged
      reason: Fresh-install and release audits now enforce the renamed runtime.
    - id: human-facing-surfaces-call-rooms-channels
      outcome: unchanged
      reason: The release audit checks operator-visible web strings while retaining
        room protocol identifiers.
    - id: workspace-packages-use-codor-scope
      outcome: unchanged
      reason: The license audit now also rejects manifest names outside codor scope.
