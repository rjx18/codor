id: codor-packed-release-proof
title: Make the packed npm runtime the primary install and prove the release artifact
notes: "Phase 6, contract 3 of 3. Document npx @richhardry/codor setup as the
  primary cross-platform install while retaining the checkout installers as an
  explicit development fallback. Add one clean, pinned Node 22 container proof
  that builds the public artifact from a clean clone, installs the packed tarball,
  repeats npm install, loads native modules, runs the installed CLI and dry-run
  offline, boots the packaged daemon, verifies its browser bundle and service
  worker, exercises CLI and API state, and tears down. Put that proof in the root
  release gate and update the operator checklist from the obsolete source-only
  no-npm release policy to the exact tarball handoff Richard will publish. Raise
  the documented and root Node floor to the actual Commander 15 requirement,
  22.12.0."
assumptions:
  retire:
    - id: global-cli-install-is-idempotent
      reason: Its implementation stays as a source fallback, but its statement makes
        the checkout symlink the primary distribution path, which the public package replaces.
    - id: windows-cli-installer-is-idempotent
      reason: The Windows shim stays as the source-checkout fallback and is folded into
        one cross-platform fallback obligation rather than remaining a primary installer.
    - id: release-candidate-requires-clean-codor-deployment
      reason: The historical source-linked Phase 7 record and npm prohibition no longer
        describe the 0.10.0 public-package release candidate.
  create:
    - id: public-npx-setup-is-primary-install
      title: The public npx command is the primary Codor installation
      statement: Operator documentation must present npx @richhardry/codor setup as
        the primary Linux, macOS, and Windows installation, require Node.js 22.12.0
        or newer, explain the five-stage interactive flow and explicit unattended
        flags, and retain the Git checkout build only as a development fallback;
        because the product promise is one install command rather than a repository
        toolchain walkthrough.
      reason: Richard chose the public @richhardry scope and will perform publication.
      depends_on:
        - public-package-bundles-complete-codor-runtime
        - setup-unattended-mutation-requires-explicit-intent
        - setup-preserves-private-platform-service
    - id: source-cli-installers-remain-idempotent-fallback
      title: Checkout installers remain stable development fallbacks
      statement: The checked-in POSIX installer must idempotently replace one local-bin
        symlink with the built CLI, and the Windows installer must refuse a missing
        build, write one argument-preserving local-bin shim, and add that directory
        to user PATH at most once; documentation must label both as source-checkout
        fallbacks, because contributors still need a predictable unpublished path
        without confusing it for normal installation.
      reason: Preserve the tested scripts while correcting their product role.
      depends_on:
        - fresh-clone-install-proven-by-script
    - id: packed-release-proof-runs-offline-runtime
      title: The release gate proves the packed runtime from a clean source clone
      statement: The release gate must use the pinned glibc Node 22 container to build
        from a clean selected Git ref, pack and install @richhardry/codor with no
        workspace resolution, repeat npm install, load its native switchboard,
        run the installed CLI and setup dry-run under no network and no inherited
        CODOR variables, boot the packaged daemon with isolated data, verify root,
        referenced app bundle, service worker, CLI post-tail, authenticated room API,
        and teardown; because a green workspace cannot prove the tarball operators receive.
      reason: Contract 1 proved package shape and contract 2 proved setup behavior; the
        release gate must now prove their packed integration from the state a user gets.
      depends_on:
        - public-npx-setup-is-primary-install
        - cli-tests-delete-inherited-codor-environment
        - supported-browser-is-standalone-web-next
    - id: release-candidate-requires-publishable-tarball
      title: Release candidate requires the exact publishable tarball proof
      statement: The final release checklist must require deterministic repository
        gates, the clean packed-install proof, review of the exact candidate commit,
        and publication of the verified @richhardry/codor tarball with a signed tag
        matching its version, while keeping secret values out of the record; because
        the release handoff must identify exactly what Richard can publish rather
        than prohibit npm distribution.
      reason: Replace the obsolete source-only historical candidate policy.
      depends_on:
        - packed-release-proof-runs-offline-runtime
        - release-audits-enforce-codor-clean-break
  reviewed:
    - id: fresh-clone-install-proven-by-script
      outcome: unchanged
      reason: The source-clone proof remains useful and unchanged as the development fallback.
    - id: operator-launches-serve-web-next
      outcome: unchanged
      reason: Updated docs and the packed proof still serve only the current web-next build.
    - id: release-audits-enforce-codor-clean-break
      outcome: unchanged
      reason: The release audit gains package-install assertions without relaxing rename checks.
    - id: windows-setup-installs-private-task-service
      outcome: unchanged
      reason: Windows documentation is re-anchored to the active staged-setup contract.
    - id: wsl-setup-keeps-private-windows-loopback
      outcome: unchanged
      reason: WSL documentation is re-anchored without changing its private bind behavior.
