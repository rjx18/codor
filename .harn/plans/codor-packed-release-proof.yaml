verification: Build and test the artifact from a clean selected Git ref in
  node:22-slim@sha256:6c74791e557ce11fc957704f6d4fe134a7bc8d6f5ca4403205b2966bd488f6b3.
  Inspect the tar listing, install it with npm, run npm ls and a second install,
  then run the installed native import, CLI, setup dry-run, daemon/browser/service
  worker, CLI post-tail, and authenticated API checks with --network none and all
  inherited CODOR variables deleted. Prove teardown and deliberate CLI failure
  formatting. Run the legacy source-clone proof, full repository release gate,
  audits, Harn, and documentation build. Confirm the generated tarball name,
  integrity, size, and publish command without publishing it.
