  - packages/adapters/claude-code/src/translate.spec.ts
  - packages/adapters/claude-code/src/limits-probe.ts
  - packages/adapters/claude-code/src/limits-probe.spec.ts
  - packages/web-next/src/room/ContextPanel.tsx
  - packages/web-next/src/runtime/api.ts
  - packages/web-next/src/styles/room.css
  - packages/web-next/tests/room11-batch-b.e2e.spec.ts
verification: |
  - Adapter unit fixtures: offset timestamp canonicalizes to the equivalent Z
    instant; OAuth endpoint percent is preserved (no multiply); a real 0..1 stream
    fraction becomes 0..100 percent; 0/1/boundary and malformed values are handled.
  - Fake-clock daemon tests: immediate boot probe, five-minute cadence, coalescing
    of overlapping requests, manual cooldown, last-good preservation on failure,
    one probe per account fanned to members.
  - Server tests: the usage-refresh route rejects an unprivileged caller and never
    returns credentials.
  - web-next: the Refresh-usage button sits left of Plus, shows busy/error without
    replacing the last good gauges, and a corrected fractional stream renders the
    right "% left".
  - Focused protocol/adapters/switchboard suites + web-next build + focused
    Playwright; Harn unstaged/staged gates pass.
