id: codor-polish-phase5-tasks
title: Durable bounded native task lists in People and agents
notes: Execution plan for product-polish Phase 5. Add one bounded normalized
  run.tasks replace/upsert contract, map only authoritative structured native
  evidence from Claude TaskCreate/TaskUpdate/TodoWrite, OpenCode todowrite, ACP
  stable plan, and Codex 0.144.5 turn/plan/updated, materialize the current list
  as an idempotent durable session-scoped member projection outside run
  journals, and show only nonempty bounded checklists in People and agents.
  Exact schemas, evidence mappings, reset semantics, file list, and verification
  are fixed by tmp/codor-product-polish/PLAN.md; implementation may not
  substitute prose parsing, another endpoint, or adapter-specific public state.
assumptions:
  create:
    - id: normalized-agent-task-updates-are-bounded-and-authoritative
      title: Native structured task evidence becomes one bounded replace/upsert
        contract
      statement: Adapters may emit run.tasks only from authoritative bounded native
        structures. Agent task ids are 1..128 characters, content and active
        forms are trimmed 1..500 character strings, status is pending,
        in_progress, or completed, optional priority is low, medium, or high,
        each complete list has at most 100 unique ids, and optional explanation
        is at most 1000 characters and never authoritative task content. Replace
        is a complete ordered snapshot whose empty list clears; upsert updates a
        known id in place and appends a new id only from a complete patch.
        Claude correlates successful TaskCreate results to the strict native
        Task id prefix, successful TaskUpdate input to that id, and successful
        TodoWrite input to a replacement; OpenCode completed todowrite, ACP
        stable plan, and Codex 0.144.5 turn/plan/updated are complete
        replacements. Failed, partial, malformed, duplicate-id, over-bound,
        mismatched-thread/turn, or unknown evidence emits no task update, and
        final prose, reasoning, shell output, TaskList text, and item/plan/delta
        are never parsed as tasks.
      reason: Every supported harness already exposes structured checklist truth; one
        bounded contract can surface it without guessing from prose.
      depends_on:
        - first-party-run-items-normalized
        - claude-sdk-message-contract-preserves-normalized-runs
        - opencode-capability-truth
        - acp-v1-events-and-capabilities-are-negotiated
        - codex-app-server-contract-is-pinned-to-0-144-5
    - id: member-task-projection-is-durable-and-session-scoped
      title: The current task list is an idempotent durable member projection scoped
        to one native session
      statement: A member's current bounded task list is materialized transactionally
        in SQLite from validated run.tasks replace/upsert status events, with
        exactly one ordinary member changelog row and frame only when the
        materialized value changes; duplicate delivery is a no-op. Task status
        events and task payloads never enter run journals or run_event frames.
        Authoritative empty replacement clears the projection. Restart,
        reconnect, process rebuild, ordinary turns, and revive/attach to the
        same persisted session id preserve it; changing an existing session_ref
        to a different native session id clears it atomically in both
        member-update and direct session-runtime paths.
      reason: The roster needs current engine checklist state after restart without
        turning status into transcript evidence or leaking a prior session's
        work.
      depends_on:
        - normalized-agent-task-updates-are-bounded-and-authoritative
        - changelog-covers-every-visible-entity
        - revive-via-session-ref
    - id: people-and-agents-shows-only-nonempty-task-lists
      title: People and agents renders only nonempty bounded accessible task lists
      statement: An agent card renders a task section only when its durable member
        task projection is nonempty. Pending, in-progress, and completed rows
        carry visible text and symbol redundancy; in-progress may show the
        native active form and completed content is muted and struck. At most
        five rows are initially visible, Show all and Show fewer control the
        remainder, and the expanded list scrolls inside a 240px bound so the
        context panel cannot grow without limit. Optional explanation is subdued
        context only. Member frames update the existing client store live; there
        is no polling or task cache.
      reason: Operators should see genuine harness checklists without empty chrome,
        color-only state, or an unbounded member card.
      depends_on:
        - member-task-projection-is-durable-and-session-scoped
  reviewed:
    - id: normalized-run-item-payload-contract
      outcome: unchanged
      reason: run.tasks is a sibling status event; first-party run.item payload
        schemas and permissive malformed-third-party behavior do not change.
    - id: first-party-run-items-normalized
      outcome: unchanged
      reason: Existing normalized text, reasoning, tool, file, image, error, and usage
        rows remain identical; task status is additive.
    - id: claude-sdk-message-contract-preserves-normalized-runs
      outcome: unchanged
      reason: The same turn-scoped SDK tool correlation gains structured task
        projection without changing session or terminal semantics.
    - id: opencode-capability-truth
      outcome: unchanged
      reason: The same direct JSON run contract adds projection from a completed
        structured todowrite input.
    - id: acp-v1-events-and-capabilities-are-negotiated
      outcome: unchanged
      reason: ACP stable plan was already negotiated and rendered; it additionally
        produces a bounded replacement.
    - id: codex-app-server-contract-is-pinned-to-0-144-5
      outcome: unchanged
      reason: The official pinned turn/plan/updated notification is documented and
        consumed without changing transport or lifecycle.
    - id: member-config-is-changed-not-respawned
      outcome: unchanged
      reason: Member update SQL gains task persistence/session-id clearing while
        model, thinking, policy, harness, and cwd behavior remain unchanged.
    - id: run-journals-own-evidence-across-output-messages
      outcome: unchanged
      reason: tasks is a member projection column, never a run event payload column.
    - id: attach-custody-lease-tracks-child-pid
      outcome: unchanged
      reason: The member-column edit mechanically crosses the enclosing SCHEMA;
        custody lease truth is unchanged.
    - id: collaboration-groups-are-durable-state
      outcome: unchanged
      reason: The member-column edit mechanically crosses the enclosing SCHEMA;
        collaboration storage is unchanged.
    - id: substantive-output-messages-drive-unread
      outcome: unchanged
      reason: The member-column edit mechanically crosses the enclosing SCHEMA; task
        member changes do not drive unread.
    - id: continuation-writer-follows-journaled-output-ownership
      outcome: unchanged
      reason: Mechanical import attribution only - adding the AgentTask schema import
        to schemas.spec.ts registers as touching this file's first top-level
        anchored region; no continuation behavior or regression body changes.
