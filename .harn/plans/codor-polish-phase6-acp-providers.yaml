verification: >-
  Full protocol, switchboard, and web-next unit suites/builds pass. Provider
  tests prove PATH executable/nonexecutable/directory classification, no process
  invocation/download/package runner, stable ordering, native shadowing, and
  false/true/false refresh. Protocol/store/daemon/server tests prove one-of
  validation, unknown/stale refusal before persistence, safe public id, no
  catalog/member command leak, exact private launch, custom authorization, and
  spawn/rebuild revalidation. Focused room31 plus ACP subsets of room3, room10,
  and room29 prove detected-only primary tiles, ACP pills, generic absence,
  Advanced custom, id-not-command requests, configure stability, refresh,
  responsive light/dark keyboard/no-overflow behavior, and axe. Harn
  unstaged/staged/apply gates pass; no ACP/native adapter runtime is edited.
