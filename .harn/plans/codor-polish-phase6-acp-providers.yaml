id: codor-polish-phase6-acp-providers
title: Named PATH-detected ACP providers with command-private launch and Advanced custom ACP
notes: >-
  Execution plan for product-polish Phase 6. A frozen switchboard-owned provider
  registry defines only Kimi Code CLI (kimi, argv acp) and Kilo Code (kilo, argv
  acp). Startup and authorized adapter refresh perform PATH-only executable-file
  detection without invocation or download. Public catalog/spawn/member state
  carries safe provider identity and never the definition's command; the daemon
  resolves and privately persists the existing bounded AcpLaunchConfig and
  revalidates it at spawn/rebuild. Shared unlocked selectors show installed
  native adapters and detected unshadowed named providers with ACP pills; generic
  ACP moves to Advanced Custom ACP command. Exact definitions, schemas, file
  list, and tests are fixed by tmp/codor-product-polish/PLAN.md.
assumptions:
  retire:
    - id: agent-selection-catalog-is-refreshable
      reason: Primary unlocked selection changes from installed-or-configurable adapter entries to installed natives plus detected named ACP providers, while generic configurable ACP moves behind an Advanced disclosure.
    - id: new-agent-requests-require-available-harness
      reason: New ACP requests may now carry a safe curated provider id that the daemon resolves privately, rather than always carrying client-supplied structured launch.
  create:
    - id: named-acp-provider-catalog-is-path-detected-and-command-private
      title: Named ACP providers are curated, PATH-detected without invocation, and command-private
      statement: >-
        A frozen reviewed switchboard provider registry owns stable public ids,
        labels, help links, direct executable names, literal argv, and optional
        native-adapter preference. Initial entries are exactly Kimi Code CLI id
        kimi executable kimi argv [acp], and Kilo Code id kilo executable kilo
        argv [acp]. Startup and authorized adapter refresh detect only an
        executable non-directory file on the daemon service PATH through the
        existing presence-only resolver; they never invoke a provider, npx,
        uvx, an installer, a downloader, or a version probe and never mutate
        PATH. Registered catalog metadata includes safe provider identity and
        installation/shadow state but never executable or argv. An installed
        richer native adapter shadows the named provider only from primary new
        selection, not from metadata needed by existing members. Detection
        never advertises lifecycle, steering, usage, model, or plan support;
        those remain negotiated by the generic ACP session.
      reason: Normal users need recognizable installed ACP choices without making a provider name a shell/download primitive or a capability promise.
      depends_on:
        - adapter-catalog-distinguishes-installed-and-configurable
        - adapter-refresh-is-authorized-and-incremental
        - built-in-adapters-require-daemon-path
    - id: named-acp-provider-selection-resolves-to-private-structured-launch
      title: A named ACP id resolves server-side to one private validated durable launch
      statement: >-
        Public starting-agent and spawn requests for harness acp carry exactly one
        of a bounded curated acp_provider id or an authorized structured acp_launch;
        non-ACP requests carry neither. Named selector ids such as acp:kimi never
        become runtime harness ids. Before persistence the daemon resolves a named
        id through its frozen registry, requires current PATH detection, rechecks
        its executable, builds the definition's private executable and literal
        argv, and passes that launch through the existing ACP validator. Unknown
        or stale ids fail before member persistence. The safe provider id is a
        public member field; exact launch remains private server-side state and
        is not returned by catalog/member APIs, prompts, logs, or errors. Restart
        and rebuild reuse that exact private launch and revalidate it, failing
        closed rather than changing provider/session; definition changes never
        rewrite an existing member. Native adapters and custom ACP authorization
        and shell-free bounds remain unchanged.
      reason: Friendly named selection must compile to the same secure ACP launch contract without trusting or exposing client commands.
      depends_on:
        - named-acp-provider-catalog-is-path-detected-and-command-private
        - acp-launch-is-structured-authorized-and-bounded
        - durable-agent-runtime-configuration
        - channel-creation-derived-and-seeded
    - id: agent-selection-shows-detected-acp-and-advanced-custom
      title: Shared agent selectors show detected named ACP providers and keep custom ACP Advanced
      statement: >-
        Create Channel, first-channel onboarding, and Add Agent share one catalog
        control whose primary grid contains installed native adapters and detected
        unshadowed named ACP providers only. Named tiles use server labels, neutral
        product monograms, and visible ACP pills, and serialize only harness acp
        plus acp_provider. The generic ACP tile is absent from primary selection
        and appears once inside an accessible Advanced disclosure as Custom ACP
        command; only that choice renders the existing executable and literal
        one-argument-per-line fields. Refresh busy, failure, empty, and disappeared
        selection behavior remains shared. Configure derives a locked selector
        from persisted provider identity and registered metadata so its name and
        ACP pill remain stable if the binary disappears, and it never reveals
        saved custom argv.
      reason: Common setup should show recognizable installed products while retaining a deliberate safe expert escape hatch and one implementation across all selection surfaces.
      depends_on:
        - named-acp-provider-catalog-is-path-detected-and-command-private
        - named-acp-provider-selection-resolves-to-private-structured-launch
        - agent-controls-shared-by-both-dialogs
        - paired-empty-state-creates-first-channel
        - web-spawn-dialog-exposes-canonical-agent-controls
    - id: new-agent-requests-require-available-native-or-detected-acp
      title: New agents require an installed native adapter, detected named ACP id, or authorized custom ACP launch
      statement: >-
        New member and starting-agent requests reject an unavailable native
        adapter, unknown or currently undetected named ACP provider, and missing,
        unauthorized, malformed, or nonresolving custom ACP launch before member
        persistence. Named ACP launch is resolved only by the daemon registry and
        never from client command data. Once preflight passes, channel creation
        retains the existing rule that a genuine starting-agent spawn failure
        leaves the seeded channel and records the failure.
      reason: A stale selector must not bypass daemon-host truth or persist an unlaunchable or client-forged provider.
      depends_on:
        - named-acp-provider-catalog-is-path-detected-and-command-private
        - named-acp-provider-selection-resolves-to-private-structured-launch
        - canonical-spawn-controls-enforced
        - channel-creation-derived-and-seeded
  reviewed:
    - id: adapter-catalog-distinguishes-installed-and-configurable
      outcome: unchanged
      reason: Native installed and generic configurable transport truth remains; named providers are a separate selection class over generic ACP.
    - id: adapter-refresh-is-authorized-and-incremental
      outcome: unchanged
      reason: The same authorized presence-only refresh additionally recomputes named provider state; native transition model discovery is unchanged.
    - id: adapter-registry-sole-harness-source
      outcome: unchanged
      reason: Named provider definitions are selections over the one registered generic ACP adapter and are never added to builtinDefinitions.
    - id: acp-launch-is-structured-authorized-and-bounded
      outcome: unchanged
      reason: Custom launch retains current authorization and bounds; named definitions create the same private validated shape without client commands.
    - id: durable-agent-runtime-configuration
      outcome: unchanged
      reason: Exact launch/lifecycle state remains private and durable; safe provider id is additive public identity.
    - id: channel-create-request-contract
      outcome: unchanged
      reason: Starting-agent metadata additively gains a safe provider id under the existing creation schema.
    - id: one-control-chooses-an-agent-everywhere
      outcome: unchanged
      reason: The same shared identity/behavior/policy control maps selector identity to the runtime request in every creation surface.
    - id: canonical-spawn-controls-enforced
      outcome: unchanged
      reason: Resolved ACP launches pass the same policy/thinking/launch validator; native adapter behavior is unchanged.
    - id: channel-creation-derived-and-seeded
      outcome: unchanged
      reason: Named preflight is additive and the established retained-room behavior after a genuine spawn failure remains.
    - id: agent-controls-shared-by-both-dialogs
      outcome: unchanged
      reason: AgentIdentityControls remains the sole shared selector and gains one shared Advanced section.
    - id: harness-declares-supported-thinking-levels
      outcome: unchanged
      reason: Provider identity adds no thinking capability and all current declarations/rendering remain.
    - id: member-config-is-changed-not-respawned
      outcome: unchanged
      reason: Public provider identity is persisted in the member update shape but remains locked in Configure with harness/cwd.
    - id: run-journals-own-evidence-across-output-messages
      outcome: unchanged
      reason: acp_provider is a member identity column, never run evidence.
    - id: attach-custody-lease-tracks-child-pid
      outcome: unchanged
      reason: The member-column edit mechanically crosses the enclosing SCHEMA; custody is unchanged.
    - id: collaboration-groups-are-durable-state
      outcome: unchanged
      reason: The member-column edit mechanically crosses the enclosing SCHEMA; collaboration storage is unchanged.
    - id: substantive-output-messages-drive-unread
      outcome: unchanged
      reason: The member-column edit mechanically crosses the enclosing SCHEMA; provider identity does not drive unread.
