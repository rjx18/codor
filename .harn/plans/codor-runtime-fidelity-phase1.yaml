id: codor-runtime-fidelity-phase1
title: Preserve first-party adapter event fidelity
notes: >-
  Use Claude Code's existing normalized call/result behavior as the reference
  matrix. Recover only concrete native evidence currently lost by the Codex
  app-server translator: classify single read, list, and search command actions
  instead of flattening them to Bash, and represent file changes as paired
  calls/results with native completion status and verbatim durable diffs.
  Multiple command actions remain one honest composite shell operation. The
  Gemini, OpenCode, Copilot, Cursor, and Antigravity audits found no additional
  structured patch evidence in their captured protocols, so their production
  mappings remain unchanged and no evidence is fabricated.
assumptions:
  reviewed:
    - id: first-party-run-items-normalized
      outcome: unchanged
      reason: Codex will preserve more of its native action and file-change evidence
        while continuing to emit the same bounded normalized payload vocabulary,
        stable call/result ids, and raw journal evidence.
    - id: codex-app-server-contract-is-pinned-to-0-144-5
      outcome: unchanged
      reason: The implementation consumes commandActions and file-change diff/status
        fields already present in the pinned app-server item contract and verifies
        them with immutable fixtures without starting a live model request.
    - id: normalized-run-item-payload-contract
      outcome: unchanged
      reason: Tool calls and results remain accepted by the existing standalone
        normalized schemas; no protocol or payload shape is added.
    - id: normalized-run-items-presented-live
      outcome: unchanged
      reason: Stable file-change call/result pairing lets the existing live presenter
        show native success or failure and durable diff evidence without a renderer
        change.
    - id: compact-one-line-tool-rows
      outcome: unchanged
      reason: Verbatim non-empty Codex diffs give the existing diff-stat parser actual
        added and removed content lines rather than header-only fixture data.
    - id: run-item-raw-journal-only
      outcome: unchanged
      reason: Native command actions, status, and changes stay in normalized payload
        evidence for the durable journal while the established daemon projection
        continues stripping top-level raw data before browser fanout.
    - id: claude-sdk-message-contract-preserves-normalized-runs
      outcome: unchanged
      reason: Claude already provides the behavioral reference for typed tool calls,
        paired results, native status, and durable patches; its translator is not
        changed.
    - id: gemini-capability-truth
      outcome: unchanged
      reason: The audit found its captured stream already preserves exposed tool
        names, ids, parameters, results, and errors, with no native patch field to
        recover.
    - id: opencode-capability-truth
      outcome: unchanged
      reason: The audit found its captured parts already preserve exposed tool state,
        inputs, output, error, and title, with no additional native patch field.
    - id: copilot-capability-truth
      outcome: unchanged
      reason: The audit found its captured events already preserve exposed tool ids,
        names, arguments, results, errors, reasoning, and text, with no native patch
        field to recover.
anchors:
  first-party-run-items-normalized:
    codex-normalized-run-items:
      action: change
      reason: Classify native command actions and pair every Codex file change with a
        status-bearing result and verbatim diff evidence.
  codex-app-server-contract-is-pinned-to-0-144-5:
    codex-app-server-transport:
      action: change
      reason: Consume the pinned commandActions and file-change status/diff members
        without changing transport or invoking Codex.
    codex-app-server-session-regression:
      action: change
      reason: Replay immutable action and patch fixtures through the translator.
  normalized-run-item-payload-contract:
    standalone-run-item-payload-schemas:
      action: change
      reason: Exercise cross-adapter call/result pairing and status through the
        existing normalized parser without changing its schema.
  compact-one-line-tool-rows:
    compact-run-row-regression:
      action: change
      reason: Prove a Codex file-change result retains real unified-diff body lines
        that yield non-zero additions and removals.
files:
  - packages/adapters/codex/src/translate.ts
  - packages/adapters/codex/src/translate.spec.ts
  - packages/adapters/codex/src/event-contract.spec.ts
  - packages/adapters/codex/src/test-fixtures/app-server-actions.jsonl
verification: Run the focused Codex translator and cross-adapter event-contract
  tests, the Codex package build/typecheck, and Harn unstaged and staged gates;
  apply the locked plan and commit Phase 1 as one implementation transaction.
