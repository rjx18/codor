id: codor-runtime-fidelity-phase2
title: Deliver ordered active-turn steering and truthful capabilities
notes: >-
  Add one optional adapter steering operation whose acknowledgement means the
  native active turn accepted the input. Codex implements it with the pinned
  app-server turn/steer RPC and exact expected turn id. The daemon serializes
  steering per member, leaves each delivery durably queued until native
  acknowledgement, records successful steering, and falls back to the ordinary
  FIFO after idle races or failures. Claude's established PostToolUse inbox
  mechanism remains unchanged. The built-in audit keeps Antigravity, Copilot,
  Cursor, Gemini, and OpenCode false because their captured protocols provide
  no genuine active-turn input channel.
assumptions:
  retire:
    - id: live-inbox-capability-is-evidence-backed
      reason: Codex now has an evidence-backed active-turn channel in addition to
        Claude's hook, so the old Claude-alone capability statement is false.
    - id: agent-delivery-lifecycle-streams
      reason: Successful active-turn steering adds a native-acknowledged consumed
        transition and persisted disposition to the existing queued, delivering,
        and completed lifecycle.
  create:
    - id: live-inbox-capability-is-evidence-backed-v2
      title: Live inbox capability matches a genuine active-turn channel
      statement: Claude Code and Codex alone among built-ins must advertise
        live_inbox true, backed respectively by Claude's exact PostToolUse Codor
        inbox hook and Codex app-server turn/steer with the expected active turn
        id; Antigravity, Copilot, Cursor, Gemini, and OpenCode must remain false
        because their captured first-party protocols cannot accept input during
        a running turn.
      reason: Capability reporting must describe what a harness can receive now,
        not what Codor can queue for its next turn.
      depends_on:
        - adapter-children-inherit-session-env
        - extensions-hooks-authoritative
        - codex-app-server-contract-is-pinned-to-0-144-5
    - id: agent-delivery-lifecycle-streams-v2
      title: Agent delivery lifecycle and steering disposition stream live
      statement: Every recorded agent-delivery transition must be emitted to room
        subscribers immediately, including queued creation, turn admission,
        turn completion, and native-acknowledged active steering; a steered
        delivery must persist its acknowledgement timestamp so reconnects and
        the transcript distinguish it from work intentionally waiting for the
        next turn.
      reason: Connected and reconnecting operators need one truthful answer about
        whether a message is queued, admitted, completed, or steered now.
    - id: active-turn-steering-is-ordered-and-durable
      title: Active-turn steering is ordered and never loses queued work
      statement: For an owned local member with a steer-capable adapter and one
        active turn, the daemon must submit newly routed deliveries to that turn
        in FIFO order, mark each consumed with steered_ts only after the native
        acknowledgement names the expected turn, and leave or restore it queued
        for the next turn when the member is idle, the turn races closed, or the
        steering request fails.
      reason: Same-turn correction must be immediate without reordering messages or
        converting transport uncertainty into lost instructions.
      depends_on:
        - live-inbox-capability-is-evidence-backed-v2
        - agent-delivery-lifecycle-streams-v2
        - one-inflight-turn-per-member
        - delivery-fifo-has-durable-sequence
        - delivery-payload-snapshotted
  reviewed:
    - id: cli-hook-inbox-is-silent-when-empty
      outcome: unchanged
      reason: Claude's exact queue consumption and empty-output hook behavior are
        untouched even though Codex gains a separate native steering channel.
    - id: one-inflight-turn-per-member
      outcome: unchanged
      reason: Steering adds input to the sole active native turn and never calls
        adapter.deliver concurrently; non-steered work still drains in one later
        batch.
    - id: inflight-member-state-survives-new-delivery
      outcome: unchanged
      reason: A running or awaiting-input member keeps its state while the delivery
        is either consumed by the live channel or remains queued for the next batch.
    - id: codex-app-server-is-the-member-runtime
      outcome: unchanged
      reason: Steering uses the same retained client, native thread, and active turn
        already owned by the member runtime without changing process lifecycle.
    - id: codex-app-server-contract-is-pinned-to-0-144-5
      outcome: unchanged
      reason: The exact camelCase turn/steer request and response are exercised
        hermetically through the existing injected fake app server.
    - id: adapter-wrappers-preserve-the-whole-contract
      outcome: unchanged
      reason: The production registry wrapper must forward the new optional steering
        method just as it forwards every other optional adapter member.
    - id: harness-declares-what-a-policy-becomes
      outcome: unchanged
      reason: The built-in capability audit crosses Gemini's existing adapter
        declaration block without changing policy translation.
    - id: context-peek-reads-session-artifacts
      outcome: unchanged
      reason: The optional steering member is added beside the existing adapter
        contract without changing session artifact inspection.
    - id: harness-declares-supported-thinking-levels
      outcome: unchanged
      reason: The registry capability matrix shares a regression block with thinking
        metadata, whose declarations and validation remain unchanged.
    - id: agent-model-and-thinking-are-durable
      outcome: unchanged
      reason: The daemon steering regression is adjacent to durable agent config
        coverage and does not change model or thinking persistence.
    - id: agent-chains-uninterrupted-by-default
      outcome: unchanged
      reason: Steering is inserted into delivery dispatch without changing hop-brake
        policy or agent-chain continuation.
    - id: brakes-rechecked-at-turn-start
      outcome: unchanged
      reason: Steering-row exclusion shares turn-admission code with the existing
        brake recheck, whose behavior remains unchanged.
    - id: only-an-admissible-delivery-becomes-delivering
      outcome: unchanged
      reason: Steering-row exclusion shares the admissible-delivery guard without
        changing which ordinary queued rows may enter a turn.
    - id: live-delivery-consumption-is-idempotent
      outcome: unchanged
      reason: Steering persistence coverage is adjacent to the existing atomic
        queued-consumption regression and does not change that contract.
    - id: delivery-payload-snapshotted
      outcome: unchanged
      reason: Active steering submits the same immutable routed payload snapshot
        that an ordinary later turn would consume.
    - id: delivery-fifo-has-durable-sequence
      outcome: unchanged
      reason: Per-member promise serialization follows creation order while durable
        queue sequence remains authoritative for every fallback batch.
    - id: mirrored-deliveries-queue
      outcome: unchanged
      reason: Mirrored and remote members retain existing queue behavior; direct
        steering is only attempted for a locally owned adapter runtime.
    - id: grouped-deliveries-have-an-isolated-batch-class
      outcome: unchanged
      reason: Collaboration group deliveries retain their barrier and batch rules and
        are not diverted into the ordinary single-recipient steering path.
    - id: run-journals-own-evidence-across-output-messages
      outcome: unchanged
      reason: steered_ts is delivery lifecycle metadata, not run-event evidence or a
        database run blob.
    - id: attach-custody-lease-tracks-child-pid
      outcome: unchanged
      reason: The shared deliveries table gains scalar steering metadata without
        changing attach lease storage or process ownership.
    - id: collaboration-groups-are-durable-state
      outcome: unchanged
      reason: The shared deliveries table and its row projection gain scalar steering
        metadata without changing group, round, participant, or barrier persistence.
    - id: substantive-output-messages-drive-unread
      outcome: unchanged
      reason: Delivery steering metadata does not change message activity sequence or
        unread rules.
