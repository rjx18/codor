id: codor-runtime-fidelity-phase3
title: Price resolved Codex usage and migrate legacy accounting once
notes: >-
  Use current public standard API list prices from the official OpenAI model
  catalog: GPT-5.6 Luna 1/0.10/6, Terra 2.5/0.25/15, Sol 5/0.50/30,
  and GPT-5.5 5/0.50/30 USD per million uncached-input/cached-input/output
  tokens. Preserve the documented gpt-5.6 -> gpt-5.6-sol alias and GPT-5.5
  snapshot alias. The pinned app-server has a model on thread start/resume but
  not turn/start; as authorized in channel #762, retain that response model and
  update it from thread/settings/updated and model/rerouted notifications
  correlated to the retained thread/active turn. Future terminal usage stores
  its cached split, truthful resolved model, and one immutable estimate unless
  exact provider cost exists. A one-time Store migration resolves only legacy
  Codex models in the approved run, native journal, member, Sol-default order,
  prices their unsplit input at the ordinary rate, and transactionally rebuilds
  affected room/day meters from run truth before recording its marker. The
  read-only production audit found 501 unpriced Codex runs and 8,878,785,095
  unpriced tokens, with no unpriced non-Codex population; development never
  mutates that database.
assumptions:
  retire:
    - id: estimate-price-table-matches-curated-models
      reason: Codex estimates must now distinguish cached input and recognize the
        current documented aliases, which the uncached-only table cannot express.
    - id: codex-app-server-usage-is-context-aware-and-uncosted
      reason: Codex still reports no exact provider dollars, but its terminal usage
        now preserves cached tokens and the runtime's resolved model for an
        advisory estimate.
    - id: run-cost-estimates-are-finalization-snapshots
      reason: Future estimates remain immutable finalization snapshots, while the
        approved one-time migration deliberately prices previously uncosted legacy
        Codex history.
    - id: estimated-cost-is-advisory-not-spend-brake-input
      reason: The provenance separation remains, but its dependency must move to the
        resolved-model snapshot and one-time historical migration contracts.
  create:
    - id: codex-price-table-models-cache-and-aliases
      title: Codex advisory prices distinguish cache and documented aliases
      statement: The advisory price table must key every current curated Codex
        model, retain only documented compatibility aliases for stored history,
        and calculate uncached input, cached input, and output separately at
        cited public standard API rates including the documented long-context
        tier; unknown models return no estimate and exact provider cost is never
        replaced by this advisory calculation.
      reason: A cached token is materially cheaper than an uncached token, while a
        stale model alias or guessed unknown price makes the operator gauge false.
      depends_on:
        - adapters-own-their-model-catalog
    - id: codex-app-server-usage-preserves-cache-and-resolved-model
      title: Codex completion preserves cached usage and resolved runtime model
      statement: Codex thread token usage must normalize last input, cached input,
        and output tokens, emit the cached split durably on terminal completion,
        and snapshot the latest truthful model from thread start or resume,
        thread settings updates, or an active-turn model reroute correlated to
        the retained runtime; it must never invent an exact provider cost or a
        turn/start model field absent from the pinned protocol.
      reason: Future estimates require both the billable cached split and the model
        the runtime actually used, rather than only the member's configured wish.
      depends_on:
        - codex-app-server-contract-is-pinned-to-0-144-5
        - normalized-agent-usage-telemetry-with-estimates
    - id: resolved-run-cost-estimates-are-finalization-snapshots
      title: Future run estimates snapshot resolved model and cached usage
      statement: A newly terminal tokens-only run must atomically persist its latest
        truthful resolved model, cached-input-aware advisory estimate, usage, and
        meter update; retries and repairs preserve that snapshot, exact provider
        cost remains authoritative, and later member configuration or price-table
        changes cannot reprice finalized new history.
      reason: Runtime resolution and cache usage make the estimate accurate at the
        only safe immutable accounting boundary.
      depends_on:
        - turn-start-transactional
        - turns-reuse-one-root-and-append-output-messages
        - turn-output-finalization-is-atomic
        - codex-price-table-models-cache-and-aliases
        - codex-app-server-usage-preserves-cache-and-resolved-model
    - id: legacy-codex-repricing-is-atomic-and-idempotent
      title: Legacy Codex usage is repriced once from durable run truth
      statement: On Store startup, one versioned transaction must resolve every
        terminal Codex run with tokens but neither exact nor estimated cost from
        persisted run model, native session journal evidence, member model, then
        gpt-5.6-sol only as the legacy Codex fallback; price all recorded legacy
        input at the ordinary current input rate, preserve exact costs, rebuild
        each affected room/day meter from all run truth rather than adding deltas,
        require zero historical Codex uncosted tokens, and record the marker only
        after success so rollback is intact and every restart is a no-op.
      reason: Historical sessions must become fully priced without double charging,
        guessing non-Codex models, or leaving a partially migrated database.
      depends_on:
        - codex-price-table-models-cache-and-aliases
        - resolved-run-cost-estimates-are-finalization-snapshots
        - spend-meter-always-on
    - id: estimated-cost-is-advisory-not-spend-brake-input-v2
      title: Estimated dollars stay separate from exact spend and holds
      statement: Room meters, member details, and browser surfaces must project
        provider-reported cost and stored estimated cost as separate
        non-overlapping buckets, label every estimate and mixture explicitly,
        evaluate spend_brake_usd from provider-reported cost alone, and retain no
        uncosted Codex tokens after the approved historical migration; advisory
        prices remain observability and never billing truth or enforcement input.
      reason: Repriced history improves the gauge without changing exact-spend
        provenance or safety enforcement.
      depends_on:
        - resolved-run-cost-estimates-are-finalization-snapshots
        - legacy-codex-repricing-is-atomic-and-idempotent
        - spend-meter-always-on
        - brakes-opt-in-hold
  reviewed:
    - id: normalized-agent-usage-telemetry-with-estimates
      outcome: unchanged
      reason: AgentUsage already exposes cachedInputTokens; Phase 3 carries that
        engine-reported field into durable terminal Usage without changing the
        transient telemetry vocabulary or estimation marker.
    - id: codex-app-server-contract-is-pinned-to-0-144-5
      outcome: unchanged
      reason: Model capture follows the exact pinned response and notification
        members and remains covered by the injected fake server without a model
        request.
    - id: turn-output-finalization-is-atomic
      outcome: unchanged
      reason: Resolved model, usage, estimate, meter settlement, output, and routing
        continue to commit together or roll back together.
    - id: failed-finalization-reconciles-at-runtime
      outcome: unchanged
      reason: Repair uses the same resolved-model/cached-aware pricing boundary and
        retains the existing idempotent finalization recovery behavior.
    - id: spend-meter-always-on
      outcome: unchanged
      reason: New turns remain metered on finalization; the historical migration
        reconstructs affected aggregates from terminal run truth without changing
        ordinary always-on accounting.
    - id: adapters-own-their-model-catalog
      outcome: unchanged
      reason: Pricing recognizes the existing curated Codex catalog and documented
        aliases without moving model composition out of the adapter registry.
    - id: agent-model-and-thinking-are-durable
      outcome: unchanged
      reason: Configured member model remains durable fallback evidence; resolved
        runtime model is added only to the completed run snapshot.
    - id: run-journals-own-evidence-across-output-messages
      outcome: unchanged
      reason: Legacy model resolution reads native session evidence without moving
        normalized run evidence into database blobs or current member state.
anchors:
  estimate-price-table-matches-curated-models:
    estimate-price-regression:
      action: remove
      reason: Re-anchor pricing regressions to cached-aware current Codex truth.
    estimate-price-table:
      action: remove
      reason: Replace the uncached-only table contract.
  codex-price-table-models-cache-and-aliases:
    codex-price-table:
      action: change
      reason: Cite and implement current cached, uncached, output, alias, and tier rates.
    codex-price-regression:
      action: change
      reason: Pin aliases, all three token classes, long context, and unknown models.
  codex-app-server-usage-is-context-aware-and-uncosted:
    codex-app-server-usage-regression:
      action: remove
      reason: Re-anchor to cached durable usage and resolved-model truth.
    codex-app-server-usage-mapping:
      action: remove
      reason: Replace the terminal usage mapping contract.
  codex-app-server-usage-preserves-cache-and-resolved-model:
    codex-resolved-model-runtime:
      action: change
      reason: Capture response baselines and correlated effective/rerouted updates.
    codex-resolved-model-regression:
      action: change
      reason: Prove start, resume, settings, reroute, and missing-signal fallback.
    codex-terminal-usage-mapping:
      action: change
      reason: Persist cached input and resolved model without exact cost fabrication.
    codex-terminal-usage-regression:
      action: change
      reason: Prove cached split and model on terminal normalized events.
  run-cost-estimates-are-finalization-snapshots:
    run-estimate-schema:
      action: remove
      reason: Re-anchor the durable run fields to resolved-model snapshots.
    run-estimate-regression:
      action: remove
      reason: Replace daemon/store configured-only model regressions.
    run-estimate-finalization:
      action: remove
      reason: Replace configured-only finalization pricing.
    run-model-snapshot:
      action: remove
      reason: Replace admission-only model evidence with truthful terminal resolution.
  resolved-run-cost-estimates-are-finalization-snapshots:
    resolved-run-estimate-schema:
      action: change
      reason: Carry cached input plus immutable resolved model and estimate.
    resolved-run-estimate-finalization:
      action: change
      reason: Prefer terminal resolved evidence and price cached input atomically.
    resolved-run-estimate-repair:
      action: change
      reason: Apply identical authoritative-cost and immutable-estimate rules on repair.
    resolved-run-estimate-regression:
      action: change
      reason: Prove normal, exact-cost, missing-model, retry, and repair behavior.
  legacy-codex-repricing-is-atomic-and-idempotent:
    legacy-codex-repricing-migration:
      action: change
      reason: Resolve and price legacy Codex runs, rebuild meters, assert invariant,
        and write the marker in one transaction.
    legacy-codex-repricing-regression:
      action: change
      reason: Prove priority, ordinary input pricing, exact-history preservation,
        meter reconstruction, rollback, idempotency, and zero unpriced tokens.
  estimated-cost-is-advisory-not-spend-brake-input:
    room-meter-cost-provenance-schema:
      action: remove
      reason: Re-anchor unchanged provenance to the migrated-history v2 contract.
    advisory-accounting-regression:
      action: remove
      reason: Re-anchor daemon/store coverage to the v2 contract.
    member-advisory-cost-projection:
      action: remove
      reason: Re-anchor unchanged member projection.
    separated-meter-accounting:
      action: remove
      reason: Re-anchor exact/estimated separation with rebuilt history.
  estimated-cost-is-advisory-not-spend-brake-input-v2:
    room-meter-cost-provenance-schema:
      action: change
      reason: Preserve exact, estimated, and unknown provenance fields.
    advisory-accounting-regression:
      action: change
      reason: Prove estimated history remains outside exact spend and holds.
    member-advisory-cost-projection:
      action: change
      reason: Keep member aggregation based on immutable stored estimates.
    separated-meter-accounting:
      action: change
      reason: Rebuild and project exact versus estimated buckets without overlap.
  normalized-agent-usage-telemetry-with-estimates:
    agent-usage-telemetry-schema:
      action: change
      reason: The terminal event gains durable resolved-model and cached Usage fields
        while the existing AgentUsage telemetry contract remains unchanged.
  codex-app-server-contract-is-pinned-to-0-144-5:
    codex-app-server-session-regression:
      action: change
      reason: Exercise exact model-bearing responses and correlated notifications.
  turn-output-finalization-is-atomic:
    atomic-turn-finalization:
      action: change
      reason: Include resolved model and cached-aware estimate in the existing transaction.
    output-finalization-regression:
      action: change
      reason: Prove new accounting fields roll back with the full turn.
  failed-finalization-reconciles-at-runtime:
    runtime-finalization-reconcile:
      action: change
      reason: Repair consumes the same terminal model and usage snapshot.
    finalization-repair-transaction:
      action: change
      reason: Preserve atomic repair while storing resolved accounting truth.
    delivery-reconciliation-regression:
      action: change
      reason: Prove repair remains idempotent with cached-aware estimates.
  spend-meter-always-on:
    meter-cost-and-token-accounting:
      action: change
      reason: Historical affected rows are rebuilt from run truth; ordinary finalization
        accounting remains always on.
