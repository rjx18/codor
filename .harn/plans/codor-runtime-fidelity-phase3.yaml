  - packages/protocol/src/events.ts
  - packages/protocol/src/schemas.spec.ts
  - packages/adapters/codex/NOTES.md
  - packages/adapters/codex/src/adapter.ts
  - packages/adapters/codex/src/adapter.spec.ts
  - packages/adapters/codex/src/translate.ts
  - packages/adapters/codex/src/translate.spec.ts
  - packages/adapters/codex/src/test-utils/fake-app-server.ts
  - packages/switchboard/src/pricing.ts
  - packages/switchboard/src/pricing.spec.ts
  - packages/switchboard/src/daemon.ts
  - packages/switchboard/src/daemon.spec.ts
  - packages/switchboard/src/store.ts
  - packages/switchboard/src/store.spec.ts
verification: >-
  Run focused protocol schema, Codex adapter model/usage, switchboard pricing,
  daemon finalization/repair, and Store migration tests plus affected package
  typecheck/build. Run Harn unstaged and staged gates, apply the locked plan,
  and commit Phase 3 as one implementation transaction. Never open the live
  database except read-only during verification.
