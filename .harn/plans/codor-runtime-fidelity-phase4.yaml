id: codor-runtime-fidelity-phase4
title: Open immutable transcript diffs in an accessible dialog
notes: >-
  Replace only the transcript diff chip's current-working-tree detour. A diff
  row opens a body-portaled dialog backed entirely by the RunItemDiff objects
  already reconstructed from the durable run journal. The dialog groups stored
  patches by path, starts on the clicked file, exposes file navigation and
  aggregate additions/deletions, reuses the syntax-aware unified-diff viewer,
  and inherits close, Escape, focus trap, and opener restoration from Modal.
  Empty stored patches say so without querying the filesystem. Non-diff tool
  rows keep their existing inspector, and the separate live Diff panel remains
  unchanged for working-tree use.
assumptions:
  retire:
    - id: normalized-run-evidence-inspector
      reason: The old statement binds every tool row to a responsive context sheet,
        while the current product uses dialogs and Phase 4 gives stored diffs a
        dedicated immutable dialog instead of the live context panel.
    - id: compact-one-line-tool-rows
      reason: Its row-presentation rule remains true, but its dependency must move
        from the obsolete context-sheet inspector contract to the typed dialog
        contract.
  create:
    - id: normalized-run-evidence-dialogs
      title: Normalized run evidence opens the dialog suited to its durable type
      statement: Selecting a non-diff normalized tool row must open the existing
        bounded input/output inspector, while selecting a row with a durable
        unified diff must open the stored-diff dialog for that permanent run;
        both use the shared body portal, trap focus, close on Escape or an
        explicit Close action, restore focus to the opener, and never replace
        the transcript with an inspection surface.
      reason: Tool output and historical patches need focused inspection without
        losing the conversation or borrowing unrelated current repository state.
      depends_on:
        - normalized-run-items-presented-live
        - modal-dialogs-layer-above-room-chrome
    - id: compact-one-line-tool-rows-v2
      title: A compact tool row says what happened and opens its durable evidence
      statement: Every tool row must remain one line with its class icon, truthful
        compact evidence, and right-aligned status; a diff row shows added and
        removed counts against the file base name and opens its stored evidence,
        other rows open their bounded inspector, long commands stay ellipsized,
        and prose rows remain ordinary transcript content.
      reason: Compact rows conserve vertical space while still providing a direct
        route to the complete evidence they summarize.
      depends_on:
        - normalized-run-items-presented-live
        - normalized-run-evidence-dialogs
    - id: transcript-diffs-use-immutable-run-evidence
      title: Transcript diff dialogs render only immutable run evidence
      statement: Opening a transcript diff chip must render the unified patches
        already stored in that run journal, grouped into navigable files with
        per-file additions/deletions and syntax-aware add, delete, hunk, header,
        and context lines; it must remain readable after the current working tree
        becomes clean or files disappear, expose an honest empty-patch state,
        and never fetch or select the live Git Diff panel.
      reason: Historical claims must remain inspectable from the evidence captured
        when the run happened rather than whatever happens to be on disk now.
      depends_on:
        - normalized-run-evidence-dialogs
        - run-journals-own-evidence-across-output-messages
        - normalized-run-item-payload-contract
  reviewed:
    - id: normalized-run-items-presented-live
      outcome: unchanged
      reason: Journal and live events still merge into the same ordered prose/tool
        timeline; only the click destination for rows carrying stored diffs changes.
    - id: run-journals-own-evidence-across-output-messages
      outcome: unchanged
      reason: The dialog consumes reconstructed RunItemDiff evidence through the
        existing events_ref/run_parent_id path and adds no database blob or fetch.
    - id: normalized-run-item-payload-contract
      outcome: unchanged
      reason: RunItemDiff path and unified fields already contain the complete
        durable payload needed by the dialog; no protocol shape changes.
    - id: room-git-state-read-only-from-known-cwds
      outcome: unchanged
      reason: The separate Diff panel keeps its existing authenticated live
        working-tree endpoint, refresh, clean state, and cwd validation untouched.
    - id: modal-dialogs-layer-above-room-chrome
      outcome: unchanged
      reason: The stored-diff surface reuses the shared Modal portal and its existing
        layering, focus trap, Escape, backdrop, and focus restoration behavior.
anchors:
  normalized-run-evidence-dialogs:
    transcript-evidence-dialog-routing:
      action: change
      reason: Route stored diff rows to the historical dialog and retain the existing
        inspector for every other tool row.
    historical-diff-dialog-regression:
      action: change
      reason: Prove navigation, empty evidence, explicit close, and Escape behavior.
  compact-one-line-tool-rows-v2:
    compact-transcript-tool-row:
      action: change
      reason: Preserve compact row semantics while changing only the diff click target.
  transcript-diffs-use-immutable-run-evidence:
    historical-diff-dialog:
      action: change
      reason: Render grouped stored patches, file stats, navigation, and empty state.
    historical-diff-browser-regression:
      action: change
      reason: Reset the real fixture working tree, open the old transcript chip, and
        prove stored patch rendering plus modal focus/close behavior.
files:
  - packages/web-next/src/room/Transcript.tsx
  - packages/web-next/src/room/ContextPanel.tsx
  - packages/web-next/src/room/DiffViewer.tsx
  - packages/web-next/src/room/RunDiffDialog.tsx
  - packages/web-next/src/room/RunDiffDialog.spec.tsx
  - packages/web-next/src/styles/room.css
  - packages/web-next/tests/room19-gitdiff.e2e.spec.ts
verification: >-
  Run the focused RunDiffDialog component test, existing run presenter and
  Transcript units, and the room19 stored/live diff Playwright cases, plus the
  web-next TypeScript/production build. Run Harn unstaged and staged gates,
  apply the locked plan, and commit Phase 4 as one implementation transaction.
