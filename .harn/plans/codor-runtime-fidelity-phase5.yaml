id: codor-runtime-fidelity-phase5
title: Add a bounded Git history explorer to the live Diff panel
notes: >-
  Extend the existing read-only room Git boundary rather than introducing a
  general Git client. Working tree remains the default and only live mode
  revalidates after completed runs. A collapsed selector requests bounded pages
  of commits reachable from local branches plus HEAD, shows immutable commit
  identity/ref metadata, and selects a full hash. The daemon validates that hash
  and the requested cwd before using fixed execFile argument arrays to compare
  the root empty tree or first parent with the commit. File/patch output is
  bounded and reports merges, renames, deletes, and binary evidence honestly.
  No operation mutates Git state, invokes a shell, reads remotes, or changes the
  durable transcript dialog.
assumptions:
  retire:
    - id: room-git-state-read-only-from-known-cwds
      reason: The same safe room/cwd boundary now serves both live working state
        and bounded local commit history, so the live-only statement is no longer
        the complete review obligation.
  create:
    - id: room-git-inspection-read-only-from-known-cwds
      title: Room Git inspection is authorized, bounded, and read-only
      statement: The daemon must serve working state, local-branch history, and
        selected commit patches only behind room read authorization and only for
        a cwd exactly in the room's canonical known-directory set; every Git
        process uses execFile with a timeout, fixed arguments, bounded buffers
        and response limits, never shell interpolation or a mutating/remote Git
        operation, while non-repositories and command failures are represented
        honestly.
      reason: A browser may inspect repository evidence without gaining a path,
        command, mutation, or unbounded-output primitive on the daemon host.
    - id: git-history-pages-are-local-and-commit-addressed
      title: Git history pages expose bounded local ref truth and immutable selections
      statement: Git history must page a bounded newest-first union of commits
        reachable from local branches plus HEAD, carrying full hash, subject,
        author, authored timestamp, parents, and ref decoration; commit detail
        accepts only a full hexadecimal object id that resolves to a commit and
        compares the root empty tree or a merge's first parent to that exact
        commit, with bounded file and patch output and explicit rename, delete,
        binary, truncation, root, and merge evidence.
      reason: History navigation must remain deterministic and truthful without
        accepting arbitrary revision syntax or pretending every commit is a
        simple text change.
      depends_on:
        - room-git-inspection-read-only-from-known-cwds
    - id: diff-panel-separates-live-and-history-modes
      title: The Diff panel keeps live working state distinct from selected history
      statement: The Diff panel must open in Working tree / HEAD mode, place a
        collapsible paginated commit selector above the existing file list, keep
        an explicitly selected commit and file stable while history is viewed,
        render commit metadata and parent-to-commit files from the server, and
        resume live stale-while-revalidate behavior only when Working tree / HEAD
        is selected; loading, no-repository, no-commit, empty-commit, pagination,
        and failure states must describe the evidence actually available.
      reason: Operators need useful history in a clean tree without confusing an
        immutable commit with the automatically changing working directory.
      depends_on:
        - git-history-pages-are-local-and-commit-addressed
  reviewed:
    - id: modal-dialogs-layer-above-room-chrome
      outcome: unchanged
      reason: Phase 5 stays entirely inside the existing Diff panel and does not
        edit or reuse the transcript modal surface.
    - id: transcript-diffs-use-immutable-run-evidence
      outcome: unchanged
      reason: Historical transcript chips continue rendering only run-journal
        evidence and do not call either Git history endpoint.
anchors:
  room-git-state-read-only-from-known-cwds:
    room-git-state-contract:
      action: remove
      reason: Replace both live-only daemon/server anchors with the generalized
        authorized and bounded Git inspection contract.
  room-git-inspection-read-only-from-known-cwds:
    room-git-inspection-contract:
      action: change
      reason: Generalize the validated cwd and fixed read-only execution boundary
        from working state to bounded history and commit detail.
    room-git-inspection-server-regression:
      action: change
      reason: Prove authentication, authorization, cwd rejection, revision
        validation, paging bounds, and endpoint errors.
  git-history-pages-are-local-and-commit-addressed:
    git-history-daemon-regression:
      action: change
      reason: Prove local branch union, pagination, roots, first-parent merges,
        rename/delete/binary classification, output bounds, and no mutation.
    git-history-client-contract:
      action: change
      reason: Keep history and commit-detail query construction typed and encoded.
  diff-panel-separates-live-and-history-modes:
    git-history-panel-state:
      action: change
      reason: Add the collapsible selector and stable live/history mode rendering.
    git-history-browser-regression:
      action: change
      reason: Prove the default live mode, clean-tree commit usefulness, refs,
        selection stability, pagination, return to live mode, and honest states.
files:
  - packages/switchboard/src/daemon.ts
  - packages/switchboard/src/daemon.spec.ts
  - packages/switchboard/src/server.ts
  - packages/switchboard/src/server.spec.ts
  - packages/web-next/src/room/git-diff.ts
  - packages/web-next/src/room/git-diff.spec.ts
  - packages/web-next/src/room/ContextPanel.tsx
  - packages/web-next/src/styles/room.css
  - packages/web-next/tests/harness.mjs
  - packages/web-next/tests/room19-gitdiff.e2e.spec.ts
verification: >-
  Run focused switchboard daemon/server Git inspection tests, focused web-next
  Git client tests, and the room19 Diff panel browser file. Run switchboard and
  web-next TypeScript/production builds, Harn unstaged and staged gates, apply
  the locked plan, and commit Phase 5 as one implementation transaction.
