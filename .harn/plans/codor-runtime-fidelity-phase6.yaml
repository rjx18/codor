id: codor-runtime-fidelity-phase6
title: Add a configurable standards-based ACP compatibility adapter
notes: >
  Add one generic ACP v1 transport for additional harnesses while retaining
  native Claude Code and Codex. ACP is selectable as a configurable catalog
  entry rather than falsely installed: an admin supplies one executable and a
  bounded argv array, the daemon resolves an executable non-directory target
  without invoking a shell, and the secret launch record is persisted outside
  ordinary member projections. Each retained ACP process negotiates protocol
  and lifecycle support during initialize. A restored process must negotiate
  the same required resume/load mechanism before the existing session id is
  resumed; it never creates a replacement session. Catalog capabilities remain
  conservative and never claim live steering or global resume.
assumptions:
  retire:
    - id: built-in-adapters-require-daemon-path
      reason: Native harnesses still require their canonical executable on daemon
        PATH, but the generic ACP transport is intentionally configurable before
        its per-agent provider executable is known and therefore cannot honestly
        use the former all-built-ins rule.
    - id: agent-model-and-thinking-are-durable
      reason: Model and thinking remain durable, but ACP additionally requires a
        private structured launch record and negotiated lifecycle evidence to
        restore the same agent truthfully.
    - id: new-agent-requests-require-installed-harness
      reason: Native providers still require installed availability, while ACP
        is a configurable transport whose concrete executable is validated from
        the authorized request; the installed-only statement is no longer complete.
  create:
    - id: adapter-catalog-distinguishes-installed-and-configurable
      title: Adapter selection distinguishes installed providers from configurable transports
      statement: Native built-in adapters are installed only when their
        registry-owned executable resolves on daemon PATH, loaded third-party
        modules remain installed by their loading contract, and the generic ACP
        transport is catalogued explicitly as configurable rather than installed;
        unlocked selection surfaces may offer installed or configurable entries,
        while every concrete provider executable is still validated by the daemon
        before a member can be created or restored.
      reason: Operators must be able to configure an ACP provider without the
        catalog pretending that an unknown executable is already installed.
      depends_on:
        - adapter-registry-sole-harness-source
    - id: durable-agent-runtime-configuration
      title: Agent runtime configuration survives restart without leaking launch secrets
      statement: Model and thinking overrides and, for ACP only, the structured
        executable/argv launch record plus exact negotiated load/resume support
        must persist server-side and rebuild the same session after restart;
        ordinary room/member projections, prompts, logs, and errors never expose
        raw ACP argv, and a restoration that cannot renegotiate its required
        lifecycle mechanism fails rather than silently creating a new session.
      reason: Restart must preserve agent identity and authority while private
        provider launch arguments remain outside collaboration-visible state.
      depends_on:
        - canonical-spawn-controls-enforced
    - id: acp-launch-is-structured-authorized-and-bounded
      title: ACP launch configuration is structured, authorized, and shell-free
      statement: Only manage_agents authority may submit an ACP executable and
        argv array; the daemon rejects empty, control/NUL-bearing, oversized, or
        over-count arguments, resolves the executable on each spawn and rebuild
        to an executable non-directory file, and starts it with shell false and
        no user-supplied environment override or interpolation.
      reason: Generic compatibility must not become a shell or secret-exfiltration
        primitive on the daemon host.
      depends_on:
        - durable-agent-runtime-configuration
        - adapter-catalog-distinguishes-installed-and-configurable
    - id: acp-v1-events-and-capabilities-are-negotiated
      title: ACP v1 sessions normalize only negotiated protocol truth
      statement: The generic ACP adapter must negotiate protocol v1 on initialize,
        retain the provider process for ordinary turns, normalize streamed text,
        thought/plan, tool calls and results, file diffs, terminal references,
        permissions, usage, stop reasons, failures, and cancellation into Codor
        events, and advertise no live steering or global lifecycle support;
        negotiated load or stable resume is persisted per session and used only
        when that exact support is present again after rebuild.
      reason: ACP compatibility is useful only when its behavior is faithful to
        protocol evidence rather than inferred from a product name.
      depends_on:
        - normalized-run-item-payload-contract
        - normalized-agent-usage-telemetry-with-estimates
        - acp-launch-is-structured-authorized-and-bounded
    - id: new-agent-requests-require-available-harness
      title: New agents require truthful native or configurable availability
      statement: New member and starting-agent requests must reject a native
        adapter that is unavailable before persistence, while ACP requests must
        carry authorized valid structured launch configuration whose executable
        resolves on the daemon host; failures after either preflight retain the
        established room-creation behavior.
      reason: Stale clients cannot bypass native installation checks and generic
        ACP cannot bypass its per-provider executable check.
      depends_on:
        - adapter-catalog-distinguishes-installed-and-configurable
        - acp-launch-is-structured-authorized-and-bounded
        - canonical-spawn-controls-enforced
        - channel-creation-derived-and-seeded
  reviewed:
    - id: adapter-registry-sole-harness-source
      outcome: unchanged
      reason: The registry remains the sole composition source and adds exactly
        one built-in compatibility transport, not a provider plugin system.
    - id: canonical-spawn-controls-enforced
      outcome: unchanged
      reason: ACP declares unsupported thinking and honest null policy mappings;
        existing policy/thinking validation remains authoritative.
    - id: adapter-wrappers-preserve-the-whole-contract
      outcome: unchanged
      reason: The registry wrapper continues forwarding the complete adapter
        interface including the new negotiation hook.
    - id: normalized-run-item-payload-contract
      outcome: unchanged
      reason: ACP maps into the existing permissive canonical payload shapes.
    - id: normalized-agent-usage-telemetry-with-estimates
      outcome: unchanged
      reason: ACP-reported usage maps only fields actually supplied by the agent.
    - id: interaction-state-machine-persisted
      outcome: unchanged
      reason: ACP permission requests use the existing durable ask/approval flow
        and settle the native request only through respondInteraction.
    - id: roles-gate-human-acts-not-agents
      outcome: unchanged
      reason: Existing role rules remain; the REST and WebSocket spawn boundaries
        additionally require manage_agents when ACP launch configuration appears.
    - id: agent-selection-catalog-is-refreshable
      outcome: unchanged
      reason: The shared catalog still refreshes native installation truth while
        retaining the configurable ACP entry and existing selection reconciliation.
      depends_on:
        - adapter-refresh-is-authorized-and-incremental
        - adapter-catalog-distinguishes-installed-and-configurable
    - id: adapter-refresh-is-authorized-and-incremental
      outcome: unchanged
      reason: Refresh still rescans only canonical native executables and starts
        discovery only for newly installed native providers; ACP remains configurable.
      depends_on:
        - adapter-catalog-distinguishes-installed-and-configurable
        - model-catalogs-reach-a-browser-that-arrives-early
        - roles-gate-human-acts-not-agents
    - id: member-config-is-changed-not-respawned
      outcome: unchanged
      reason: Model, thinking, and policy configuration still replaces only the
        next-turn session settings; ACP executable/argv is fixed at creation and
        deliberately absent from Configure Agent.
      depends_on:
        - durable-agent-runtime-configuration
        - canonical-spawn-controls-enforced
    - id: harness-declares-supported-thinking-levels
      outcome: unchanged
      reason: ACP reports no standardized thinking controls while every native
        adapter retains its existing declared thinking-level contract.
    - id: channel-create-request-contract
      outcome: unchanged
      reason: Channel creation retains its existing validated request boundary;
        the optional starting-agent shape only gains ACP's structured launch data.
    - id: live-inbox-capability-is-evidence-backed-v2
      outcome: unchanged
      reason: ACP truthfully advertises no live inbox support and the evidence-backed
        native capability matrix remains unchanged.
    - id: channel-creation-derived-and-seeded
      outcome: unchanged
      reason: ACP preflight uses the existing derived room-creation path without
        changing room seeding or post-preflight persistence behavior.
    - id: adapters-own-their-model-catalog
      outcome: unchanged
      reason: Native adapters retain their model discovery ownership; generic ACP
        exposes no invented model catalog because ACP v1 does not standardize one.
    - id: working-directories-validated-before-spawn
      outcome: unchanged
      reason: ACP launch configuration does not bypass the daemon's existing cwd
        validation before a provider process starts.
    - id: attempt-start-evidence-persisted
      outcome: unchanged
      reason: ACP turns enter the same persisted attempt-start lifecycle as existing
        adapters.
    - id: attachments-are-capped-files-served-inert
      outcome: unchanged
      reason: ACP prompt delivery uses the existing bounded attachment contract and
        does not change attachment serving or storage.
    - id: unix-socket-same-protocol
      outcome: unchanged
      reason: ACP spawn data uses the same validated WebSocket protocol over TCP and
        Unix listeners.
anchors:
  built-in-adapters-require-daemon-path:
    builtin-executable-regression:
      action: remove
      reason: Re-anchor native executable truth and ACP configurable truth together.
    builtin-executable-registry:
      action: remove
      reason: Replace the all-built-ins statement with separate native-installed
        and configurable-transport catalog truth.
    daemon-adapter-availability:
      action: remove
      reason: Generalize daemon catalog state to installed versus configurable.
    daemon-adapter-availability-regression:
      action: remove
      reason: Re-anchor availability tests to the generalized catalog contract.
    custom-adapter-installation-regression:
      action: remove
      reason: Re-anchor unchanged module-loading installation truth.
  agent-model-and-thinking-are-durable:
    durable-agent-config-schema:
      action: remove
      reason: Replace the narrower durability statement while keeping its fields.
    durable-agent-config-storage:
      action: remove
      reason: Extend persistence with private ACP runtime configuration.
    durable-agent-config-rebuild:
      action: remove
      reason: Extend rebuild with ACP launch and lifecycle evidence.
    durable-agent-config-regression:
      action: remove
      reason: Re-anchor existing model/thinking tests with new ACP durability tests.
    durable-agent-config-remote:
      action: remove
      reason: Re-anchor unchanged remote model/thinking propagation under the
        broader runtime-configuration contract.
  new-agent-requests-require-installed-harness:
    new-agent-availability-regression:
      action: remove
      reason: Re-anchor preflight tests to native-or-configurable availability.
    new-agent-availability-preflight:
      action: remove
      reason: Replace installed-only preflight with native installed or ACP config validation.
  adapter-catalog-distinguishes-installed-and-configurable:
    adapter-catalog-registry:
      action: change
      reason: Register ACP as configurable and retain canonical executables for natives.
    adapter-catalog-daemon:
      action: change
      reason: Publish explicit configurable state without weakening native checks.
    adapter-catalog-regression:
      action: change
      reason: Prove native installed truth, configured modules, and ACP selection truth.
    configurable-adapter-client:
      action: change
      reason: Include configurable entries on unlocked selection surfaces.
  durable-agent-runtime-configuration:
    durable-agent-runtime-schema:
      action: change
      reason: Define private ACP launch and negotiated lifecycle records.
    durable-agent-runtime-storage:
      action: change
      reason: Persist launch and lifecycle atomically with ACP members.
    durable-agent-runtime-rebuild:
      action: change
      reason: Restore private configuration and require truthful negotiated resume/load.
    durable-agent-runtime-regression:
      action: change
      reason: Prove persistence, projection secrecy, restart restoration, and refusal.
    durable-agent-runtime-remote:
      action: change
      reason: Preserve existing model/thinking remote propagation under the wider contract.
  acp-launch-is-structured-authorized-and-bounded:
    acp-launch-schema:
      action: change
      reason: Bound the structured executable and argv contract.
    acp-launch-validation:
      action: change
      reason: Resolve executable files and spawn without a shell.
    acp-launch-rest-authorization:
      action: change
      reason: Require manage_agents and avoid leaking request secrets in errors.
    acp-launch-ui:
      action: change
      reason: Expose clear executable and one-argument-per-line controls.
    acp-launch-regression:
      action: change
      reason: Prove bounds, directories, shell text, authority, and secret projection.
  acp-v1-events-and-capabilities-are-negotiated:
    acp-adapter-runtime:
      action: change
      reason: Implement ACP v1 process, initialize, retained sessions, cancel, and restore.
    acp-event-normalization:
      action: change
      reason: Map content, plans, tools, diffs, permissions, usage, and outcomes.
    acp-fake-agent:
      action: change
      reason: Provide a hermetic protocol peer for runtime and daemon tests.
    acp-adapter-regression:
      action: change
      reason: Prove handshake, negotiation, streaming, permissions, failure,
        cancellation, and supported/unsupported restoration.
    acp-browser-regression:
      action: change
      reason: Prove configurable catalog presentation and structured add-agent payload.
  new-agent-requests-require-available-harness:
    new-agent-availability-preflight:
      action: change
      reason: Enforce native installation or validated ACP provider configuration.
    new-agent-availability-regression:
      action: change
      reason: Prove stale native rejection and configured ACP admission before persistence.
  harness-declares-supported-thinking-levels:
    adapter-thinking-level-contract:
      action: change
      reason: Extend the adapter contract with ACP runtime hooks while keeping thinking
        support declarations truthful and unchanged for native adapters.
    registry-thinking-level-regression:
      action: change
      reason: Add ACP's unsupported-thinking evidence without altering native cases.
    adapter-thinking-level-registry:
      action: change
      reason: Register ACP with no thinking levels while preserving native metadata.
  channel-create-request-contract:
    channel-create-request-schema:
      action: change
      reason: Validate ACP structured launch data only within the optional starting
        agent request.
  live-inbox-capability-is-evidence-backed-v2:
    builtin-live-inbox-matrix:
      action: change
      reason: Add ACP's truthful false capability to the existing matrix.
  canonical-spawn-controls-enforced:
    registry-spawn-control-validation:
      action: change
      reason: Reject ACP launch data for native adapters while retaining existing
        model, thinking, and policy validation.
  adapter-registry-sole-harness-source:
    configured-adapter-registry:
      action: change
      reason: Add the one generic ACP transport through the existing composition
        source without changing third-party module behavior.
  channel-creation-derived-and-seeded:
    derived-channel-creation:
      action: change
      reason: Preflight ACP launch configuration through the existing derived channel
        creation flow.
    create-room-rest-contract:
      action: change
      reason: Carry validated ACP starting-agent configuration without changing room
        seeding semantics.
  adapters-own-their-model-catalog:
    adapter-model-discovery:
      action: change
      reason: Keep model discovery native-only because generic ACP negotiates no model
        catalog.
  working-directories-validated-before-spawn:
    daemon-cwd-enforcement:
      action: change
      reason: Include ACP provider launch under the existing validated cwd boundary.
  attempt-start-evidence-persisted:
    attempt-start-evidence:
      action: change
      reason: Route ACP turns through the unchanged persisted attempt-start lifecycle.
  attachments-are-capped-files-served-inert:
    attachment-contract:
      action: change
      reason: Deliver existing bounded attachment references through ACP prompts.
  unix-socket-same-protocol:
    unix-websocket-listener:
      action: change
      reason: Carry the same validated ACP spawn act over the existing Unix listener.
