verification: Run focused ACP adapter translation/runtime tests, protocol schema,
  registry/store/daemon/server ACP tests, web catalog/agent-spec units, and the
  focused add-agent browser cases. Run protocol, ACP, switchboard, and web-next
  TypeScript/production builds plus Harn unstaged and staged gates, apply the
  plan, and commit Phase 6 as one implementation transaction.
