  - packages/cli/src/setup-flow.spec.ts
  - packages/cli/src/setup-ui.ts
  - packages/cli/src/setup-ui.spec.ts
  - packages/cli/src/setup-session.ts
  - packages/cli/src/setup-session.spec.ts
  - packages/cli/src/setup-pty.spec.ts
  - packages/cli/src/setup.ts
verification: >
  Pure state-machine gates (setup-flow.spec, asserted on values):

  - Entering a pending automatic step runs its work once and memoizes the
    result; a second enter of the same step does not run it again.

  - Next advances the cursor; Back moves the cursor to a previous step and that
    step's state and result are unchanged; advancing forward again over a
    completed step does not re-run it.

  - A failed step exposes Retry, and only Retry re-runs it; Retry is not offered
    on a pending, running, or done step.

  - A completed step's memoized result (including a pairing offer object) is the
    same object on re-view.

  Pure renderer gates (setup-ui.spec):

  - The active step renders expanded with its content and Back/Next; completed
    steps render as a one-line summary; future steps render as a collapsed
    numbered title. A running automatic step renders expanded.

  - A failure renders once inside the active step. The frame stays a
    primary-buffer repaint with no alternate-screen sequence, and the active
    step's actionable content stays visible at 80x10 and 40x24.

  - The word art, version and byline still render, and the compact header still
    drops the art on a short terminal.

  PTY gates (setup-pty.spec, real terminal via the existing script harness):

  - Navigation: driving Next through the steps reaches the ready summary and
    exits zero with the cursor restored.

  - Back then Next returns to a completed step and advances again without
    re-running it - asserted by the step not re-emitting its side-effect log.

  - Retry on a forced failure re-runs that step and then completes; the failure
    text appears once.

  - Constrained viewports (80x10, 40x24) keep the active step usable, and q /
    Ctrl-C restore the cursor.

  Session/regression gates (setup-session.spec): terminal teardown on normal
  exit, signal, and cancel is unchanged; navigation keys drive the flow; a
  recoverable failure does not rethrow out of the session.

  Preserved gates: the non-interactive linear path and the dry-run output are
  unchanged (their existing tests stay green), and no step re-runs on navigation
  - the token is written once, the service started once, one pairing code minted
  per invocation.

  Negative gates: removing the memoization must make a Back/Next re-run a step
  and fail the no-repeat test; making a recoverable failure rethrow must fail
  the render-error-once / no-double-print test.
