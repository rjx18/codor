id: codor-standalone-web-next
title: Make web-next the sole browser application and remove the legacy web workspace
notes: >-
  Phase 3. Move the nonvisual browser runtime, owned service worker, and their
  regression tests into packages/web-next; remove every @legacy source alias;
  prove the surviving PWA builds, pairs, reconnects, encrypts push payloads, and
  passes its browser suite; then delete packages/web. The older web assumptions
  remain true product contracts and are reviewed against the equivalent
  web-next runtime and browser coverage while their legacy anchor placements
  are removed. A new release audit prevents the deleted workspace or a source
  dependency on it from returning. packages/web-next remains Harn-ignored for
  this pre-release migration because it already contains duplicate historical
  anchor refs; the tracked release audit is the durable boundary until those
  presentation assumptions are consolidated separately.
assumptions:
  create:
    - id: supported-browser-is-standalone-web-next
      title: The supported browser application has no legacy workspace dependency
      statement: >-
        The release must contain one supported browser workspace,
        packages/web-next, whose production build, service worker, runtime
        imports, tests, and CLI static-root defaults resolve entirely within
        that workspace and shared published packages; packages/web must not
        exist, @legacy aliases must not exist, and a release audit must fail if
        either boundary returns, because an apparently unused legacy workspace
        previously remained a hidden compile-time dependency of every shipped
        browser.
      reason: The daemon already serves web-next, but its crypto, state, API,
        websocket, theme, notification, presentation, and service-worker code
        still compile directly from packages/web.
      depends_on:
        - client-syncs-by-seq
        - single-crypto-suite-libsodium
        - sw-injectmanifest-owned-worker
        - release-audits-enforce-codor-clean-break
  reviewed:
