anchors:
  normalized-agent-usage-telemetry:
    agent-usage-telemetry-schema:
      action: change
      reason: Define AgentUsage, usage_updated, the terminal snapshot, and
        Member.lastUsage.
    claude-usage-telemetry:
      action: change
      reason: Map fixture-pinned Claude live and terminal usage with curated and
        runtime windows.
    claude-usage-telemetry-regression:
      action: change
      reason: Prove cache-aware live usage and the runtime terminal window override
        from a fixture.
    codex-usage-telemetry:
      action: change
      reason: Forward Codex exec token and cached-token evidence without guessing
        context or cost.
    codex-usage-telemetry-regression:
      action: change
      reason: Prove the existing Codex fixture produces the supported normalized
        snapshot only.
  last-agent-usage-is-transient:
    last-usage-runtime-registry:
      action: change
      reason: Consume live and terminal telemetry into daemon memory without
        journaling live updates.
    last-usage-member-projection:
      action: change
      reason: Overlay lastUsage on member frames, details, and sync hydration.
    last-usage-daemon-regression:
      action: change
      reason: Prove broadcast updates, Store absence, restart absence, and next-turn
        repopulation.
  first-party-run-items-normalized:
    claude-normalized-run-items:
      action: change
      reason: Add live and terminal usage evidence inside Claude's native-event
        dispatch.
    codex-normalized-run-items:
      action: change
      reason: Add the terminal normalized snapshot inside Codex's native-event
        dispatch.
  codex-usage-tokens-only:
    usage-token-mapping:
      action: change
      reason: Preserve the legacy token-only accounting payload while adding a no-cost
        AgentUsage snapshot.
  live-agent-waits-are-transient:
    wait-member-projection:
      action: change
      reason: Preserve the wait overlay while composing the independent transient
        lastUsage overlay.
