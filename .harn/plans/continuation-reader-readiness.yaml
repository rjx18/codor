  - packages/web-next/tests/room24-upgrade.e2e.spec.ts
anchors:
  continuation-output-schema-is-reader-first:
    continuation-cli-format:
      action: change
      reason: Root headers remain exact while continuation rows format without a
        lifecycle summary and retain their own permanent id/body.
    continuation-cli-tail:
      action: change
      reason: The shared once/follow printer routes roots and continuations through
        the safe formatter without changing delivery-wait semantics.
    continuation-cli-regression:
      action: change
      reason: "A real Unix tail hydration proves #1/#2/#3 output order and no crash."
  cli-waits-consume-only-matching-deliveries:
    tail-wait-command:
      action: keep
      reason: The surrounding until/wait state machine must not change in this
        presentation-only round; the nested continuation reader owns its edits.
