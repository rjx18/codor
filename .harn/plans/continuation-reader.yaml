    message-id-allocation:
      action: change
      reason: The dormant fixture-capable postMessage insert carries optional
        run_parent_id without changing in-transaction allocation or exposing a
        writer.
  message-activity-drives-unread:
    message-activity-storage:
      action: change
      reason: Schema/insert round-trip the dormant parent column while current
        activity classification remains unchanged until the writer round.
  browser-protocol-epoch-blocks-only-stale-browser-ui:
