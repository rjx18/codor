      action: change
      reason: Protocol constants, subscribe metadata, and UpgradeRequired define the
        permanent browser-only compatibility handshake.
    browser-protocol-compatibility-rest:
      action: change
      reason: No-store preflight reports current/minimum epochs and observe-only
        receipt before any incompatible page constructs its room connector.
    browser-protocol-admission:
      action: change
      reason: Shared WebSocket admission observes browser epochs, optionally refuses
        only stale browser UI, sends no hydration, and closes 4406 without
        gating agents.
    browser-protocol-regression:
      action: change
      reason: Protocol/server tests pin observe-only, enforced browser refusal, close
        behavior, agent and Unix hydration, and absence of hydration on
        mismatch.
  continuation-output-schema-is-reader-first:
    continuation-message-schema:
      action: change
      reason: Optional root mode/result id and continuation parent id define durable
        rows.
    continuation-event-target-schema:
      action: change
      reason: Renderable journal events gain an optional permanent output-message
        target.
    continuation-message-storage:
      action: change
      reason: SQLite schema, idempotent migration, row mapping, and dormant insert
        support round-trip run_parent_id without activating the daemon writer.
    continuation-reader-regression:
      action: change
      reason: Schema/store/browser regressions prove migration, dual durable-history
        reading, chronological rows, journal targeting, grouping, paging, and
        permalinks.
