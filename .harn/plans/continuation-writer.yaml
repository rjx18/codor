anchors:
  runs-are-one-message:
    run-message-lifecycle:
      action: remove
      reason: The old exactly-one-message writer statement and comments are replaced.
  reply-is-finalized-run-message:
    finalize-and-route:
      action: remove
      reason: Finalization no longer routes from the persisted body of one row.
  continuation-output-schema-is-reader-first:
    continuation-event-target-schema:
      action: remove
      reason: Schema anchors migrate from the dormant reader contract to the active
        writer contract.
    continuation-message-schema:
      action: remove
      reason: Root/result/parent fields are now written by production.
    continuation-reader-regression:
      action: remove
      reason: Reader-only regressions become end-to-end writer regressions.
    continuation-message-storage:
      action: remove
      reason: Storage anchors migrate to the active writer contract.
    continuation-cli-format:
      action: remove
      reason: CLI reader anchors migrate without changing their behavior.
    continuation-cli-tail:
      action: remove
      reason: CLI reader anchors migrate without changing their behavior.
    continuation-cli-regression:
      action: remove
      reason: CLI regression now guards active production rows.
  turn-finalization-transactional:
    atomic-turn-finalization:
      action: remove
      reason: One-row atomicity is replaced by root-plus-output-row settlement.
  message-activity-drives-unread:
    message-activity-storage:
      action: remove
      reason: Activity storage migrates to per-output finalization semantics.
    message-activity-regression:
      action: remove
      reason: Regression expands to roots, continuations, acks, and abandoned rows.
  run-blobs-off-db:
    store-schema-no-blobs:
      action: remove
      reason: The off-database rule survives under a multi-output journal statement.
  turns-reuse-one-root-and-append-output-messages:
    run-message-lifecycle:
      action: change
      reason: Begin new turns in messages mode, preserve one root, and allocate later
        continuations only.
    continuation-root-regression:
      action: change
      reason: Prove one root, permanent interleaved chronology, and crash-root reuse.
  message-id-txn-allocation:
    message-id-allocation:
      action: change
      reason: Continuation ids use the existing in-transaction allocation and insert
        authority before any journal or broadcast can expose them.
  turn-start-transactional:
    atomic-turn-start:
      action: change
      reason: The single lifecycle root starts in messages output mode while the input
        delivery batch remains bound in the same transaction.
  continuation-writer-follows-journaled-output-ownership:
    continuation-event-target-schema:
      action: change
      reason: Existing optional output ids become the active writer's durable event
        contract.
    continuation-message-schema:
      action: change
      reason: Existing root/result/parent fields become active production identity.
    continuation-message-storage:
      action: change
      reason: Add transactional continuation creation, lookup, and abandoned-row
        settlement.
    continuation-segmentation-engine:
      action: change
      reason: Purely assign renderable events, tool pairs, compaction pairs, and
        completion to rows.
    continuation-segmentation-regression:
      action: change
      reason: Pin interleaving, nonallocating events, inheritance, reconstruction, and
        orphan detection.
    continuation-writer-engine:
      action: change
      reason: Insert before journal, annotate before append, then broadcast message
        before event.
    continuation-writer-regression:
      action: change
      reason: Exercise a real FakeAdapter turn live and from journal replay.
    daemon-journal-index-stamp:
      action: change
      reason: Stamp each event with both its immutable journal index and permanent
        output message id before append and fanout.
    compaction-journal-fanout:
      action: change
      reason: Keep compaction loading and completion on the same assigned output row.
    continuation-cli-format:
      action: change
      reason: Existing safe formatter now reads production continuation rows unchanged.
    continuation-cli-tail:
      action: change
      reason: Existing shared tail printer now consumes production continuation rows
        unchanged.
    continuation-cli-regression:
      action: change
      reason: Existing Unix regression now guards the active writer schema.
    continuation-protocol-documentation:
      action: change
      reason: Document the root, continuation, event ownership, and result identity
        contract.
  last-agent-usage-is-transient-and-seeded:
    last-usage-runtime-registry:
      action: change
      reason: Preserve transient usage handling while the following durable event is
        assigned to its output row.
  compaction-timeline-items-are-durable-run-evidence:
    compaction-journal-fanout:
      action: change
      reason: Compaction evidence keeps its durable fanout path and gains only stable
        output ownership.
  finalized-turn-routes-aggregate-from-terminal-output:
    finalize-and-route:
      action: change
      reason: Build a result-id synthetic aggregate for parsing and payload planning.
    aggregate-payload-resolution:
      action: change
      reason: Resolve continuation results through the lifecycle final_text and
        aggregate mentions.
    aggregate-routing-regression:
      action: change
      reason: Ordinary and collaboration recipients receive the full aggregate while
        result ids name the last row.
    exact-ack-finalization:
      action: change
      reason: Exact acknowledgements remain non-routable while the lifecycle root and
        its one visible terminal result keep consistent acknowledgement
        semantics.
  substantive-routing-excludes-acknowledgements:
    exact-ack-finalization:
      action: change
      reason: Detect acknowledgement from aggregate truth and keep every output row
        outside routing and unread activity.
  run-failure-evidence-is-surfaced:
    interrupted-error-evidence:
      action: change
      reason: Preserve native failure detail on the lifecycle root while output rows
        settle separately.
    round-result-error-evidence:
      action: change
      reason: Resolve a continuation result through its lifecycle root before
        surfacing failure evidence to peers.
  collaboration-round-release-is-one-barrier:
    group-payload-snapshot-integration:
      action: change
      reason: Resolve each terminal result fragment to its lifecycle aggregate before
        building the single ordered round payload.
    collaboration-barrier-engine:
      action: change
      reason: Preserve one release barrier while participant result ids may name
        continuation rows.
  turn-output-finalization-is-atomic:
    atomic-turn-finalization:
      action: change
      reason: Commit every output patch, result-id delivery, participant, accounting,
        and fanout together.
    collaboration-turn-finalization:
      action: change
      reason: Record the participant against result_message_id in the same transaction.
    collaboration-finalization-engine:
      action: change
      reason: Pass terminal output identity through the existing grouped settlement
        authority.
    finalization-repair-transaction:
      action: change
      reason: Failed-finalization repair settles referenced and abandoned output rows
        without routing.
    runtime-finalization-reconcile:
      action: change
      reason: Runtime passes reconstructed row truth into the shared repair.
    output-finalization-regression:
      action: change
      reason: Prove all-or-nothing commit, rollback, runtime repair, and idempotence.
  failed-finalization-reconciles-at-runtime:
    delivery-reconciliation-regression:
      action: change
      reason: Existing repair tests expand to continuation output rows.
    runtime-finalization-reconcile:
      action: change
      reason: Runtime reconstructs journal-owned rows before invoking the existing
        idempotent no-route repair.
    finalization-repair-transaction:
      action: change
      reason: Repair settles referenced output and tombstones unjournaled rows with
        custody and accounting.
  lifecycle-retries-only-live-collaboration-work:
    lifecycle-interruption-settlement:
      action: change
      reason: Retry eligibility is unchanged while partial output rows settle with the
        lifecycle root in one transaction.
  only-an-admissible-delivery-becomes-delivering:
    turn-admission-guard:
      action: change
      reason: The admitted root records messages output mode without changing delivery
        eligibility.
  substantive-output-messages-drive-unread:
    message-activity-storage:
      action: change
      reason: Defer new continuation activity until settlement and assign each
        substantive row its own seq.
    message-activity-regression:
      action: change
      reason: Count finalized roots/continuations while excluding live, ack, and
        abandoned rows.
  run-journals-own-evidence-across-output-messages:
    store-schema-no-blobs:
      action: change
      reason: Keep one root pointer and no event payload columns while allowing
        lightweight continuation rows.
  addressed-cold-hydration-is-strict-and-legacy-safe:
    addressed-hydration-contract:
      action: change
      reason: Bounded projection admits finalized continuation rows without adding
        correctness outliers or changing the agent branch.
  browser-protocol-epoch-blocks-only-stale-browser-ui:
    browser-protocol-epoch-contract:
      action: change
      reason: Raise the incompatible browser reader/writer contract to epoch 2.
    browser-protocol-regression:
      action: change
      reason: Pin epoch 2 plus stale-browser refusal and epochless agent hydration.
