title: Explain contribution and Harn expectations without blocking newcomers
notes: Add a short contributor guide that keeps the repository's merge-time Harn
  standard strict while allowing contributors to open ordinary pull requests
  without first learning or installing Harn. Maintainers may reconstruct a
