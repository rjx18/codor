id: ctx-guardrails-fix-round
title: Deep-review correctness fix round for the context-ceiling guardrails branch
notes: >-
  Apply the ten verified deep-review findings recorded in
  tmp/context-ceiling-guardrails/PROGRESS.md (2026-07-17 review over
  main...4b04702, re-checked against the 5b SDK rework in f300aaf). Correctness
  scope only; the below-cap cleanup list ships in a separate follow-up plan.

  Failure evidence becomes visible again everywhere: web-next and legacy web
  render run.error as a failure-evidence block when a settled run has no final
  text; codor tail prints it; the slack bridge egress falls back to it; quoted
  run references and collaboration round results carry it so agents receive the
  reason a referenced or participating run stopped. The daemon persists
  completion.error whenever the adapter reported it - including runs
  reclassified failed-to-interrupted by an operator interrupt - while reply
  routing continues to be suppressed exactly as before for failed runs. The
  load-bearing completion.error ?? completion.final_text fallback for
  legacy-shaped adapters is explicitly preserved.

  Claude translator: the legacy overflow guard matches only exact
  API-error-shaped text (trimmed, case-insensitive, optional trailing period) so
  legitimate replies that merely mention the phrase are never reclassified; a
  compact_boundary without post_tokens no longer clobbers the live used count
  and usage_updated is emitted only when a complete window pair exists; the
  terminal window override prefers the session's own model entry in modelUsage
  and ignores larger aux/subagent windows (fixing the ceiling inflation
  faithfully ported from paseo).

  Daemon lastUsage hygiene: rekey the registry by bare member id to match every
  sibling per-member map, sweep it on member removal, and skip the member
  re-broadcast when an incoming usage snapshot deep-equals the stored one.
  Web-next renders the ring through a memoized component so unrelated member
  frames stop re-animating every card.

  Web-next timeline: compaction markers interleave through a single stateful
  presenter pass so tool_call/tool_result pairing and prose coalescing survive
  across compaction boundaries; markers still upgrade loading-to-completed in
  place.

  Every fix lands with a regression test that fails without it. Fixture and
  in-memory coverage only; no live API calls, no deployment, no daemon restart.
assumptions:
  reviewed:
    - id: failed-run-details-never-route-as-replies
      outcome: unchanged
      reason: Reply-body suppression for failed runs is untouched; the fixes only add
        surfacing and persistence of the same error evidence.
    - id: claude-result-errors-follow-native-signals
      outcome: unchanged
      reason: Native signals stay primary; the secondary guard is narrowed to exact
        error-shaped text, which the statement already frames as a limited
        compatibility measure.
    - id: normalized-agent-usage-telemetry
      outcome: unchanged
      reason: The usage shape and event contract are untouched; fixes correct which
        values feed them.
    - id: claude-compaction-follows-native-system-events
      outcome: unchanged
      reason: Compaction events still derive solely from native system messages; the
        fix stops an incomplete boundary from erasing live usage.
    - id: last-agent-usage-is-transient
      outcome: unchanged
      reason: Usage stays in-memory and broadcast-only; keying, sweeping, and the
        duplicate-broadcast guard are lifecycle hygiene within the statement.
    - id: claude-sdk-message-contract-preserves-normalized-runs
      outcome: unchanged
      reason: The SDK message mapping is unchanged apart from the classification and
        window-selection corrections inside already-anchored regions.
    - id: web-compaction-markers-upgrade-in-place
      outcome: unchanged
      reason: Markers still upgrade in place; the reducer change only preserves
        presenter state across boundaries.
    - id: member-context-window-meter-derived-from-last-usage
      outcome: unchanged
      reason: Derivation, thresholds, and hidden states are untouched; the component
        is memoized only.
    - id: reply-is-finalized-run-message
      outcome: unchanged
      reason: One turn one message stands; failure evidence renders from run state on
        the same message.
    - id: delivery-payload-snapshotted
      outcome: unchanged
      reason: Snapshot mechanics are untouched; only the quoted ref body composed into
        the snapshot now falls back to labeled run error evidence.
  create:
    - id: run-failure-evidence-is-surfaced
      title: Run failure evidence reaches every consumer
      statement: When a run settles with error detail, the daemon must persist it as
        run.error for failed and operator-interrupted completions alike, quoted
        run references and collaboration round results must fall back to it when
        final text and body are empty, and web, web-next, the CLI tail, and
        bridge egress must render it as failure evidence, because a failure
        whose reason is invisible cannot be acted on by operators or agents.
      reason: The phase-3 restructuring moved failure detail out of reply bodies but
        left every consumer reading only final_text/body, making failures
        silently blank.
      depends_on:
        - failed-run-details-never-route-as-replies
    - id: context-ceiling-follows-main-model
      title: Context ceiling derives from the session's own model
      statement: The claude translator must select the terminal context-window
        override from the modelUsage entry matching the session's current model,
        falling back to the seeded window when no matching entry exists, and
        must never widen the ceiling from a different model's entry, because aux
        and subagent models with larger windows otherwise inflate the
        denominator while used tokens still reflect the main model.
      reason: Max-across-models (ported from paseo) under-reports context pressure
        exactly when subagents run, defeating the gauge's warning purpose.
      depends_on:
        - normalized-agent-usage-telemetry
