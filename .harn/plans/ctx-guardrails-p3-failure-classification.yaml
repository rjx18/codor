  - packages/adapters/claude-code/NOTES.md
  - packages/adapters/claude-code/test-fixtures/context-overflow.jsonl
  - packages/adapters/claude-code/src/translate.ts
  - packages/adapters/claude-code/src/translate.spec.ts
  - packages/protocol/src/events.ts
  - packages/protocol/src/message.ts
  - packages/protocol/src/schemas.spec.ts
  - packages/switchboard/src/fake-adapter.ts
  - packages/switchboard/src/daemon.ts
  - packages/switchboard/src/daemon.spec.ts
  - docs/PROTOCOL.md
anchors:
  failed-run-details-never-route-as-replies:
    failed-run-error-schema:
      action: change
      reason: Carry generic diagnostic detail separately on terminal events and run
        summaries and document the distinction from reply text.
    fake-failed-turn-detail:
      action: change
      reason: Let fixture-only daemon tests emit an explicit failed-run error.
    failed-run-finalization:
      action: change
      reason: Persist failure detail while keeping the message body and routing empty.
    failed-run-recovery:
      action: change
      reason: Preserve the same diagnostic-only finalization after journal recovery.
    failed-run-daemon-regression:
      action: change
      reason: Prove the error is durable, the member receives failed treatment, and
        the text never becomes a reply body or delivery.
  claude-result-errors-follow-native-signals:
    claude-result-error-contract:
      action: change
      reason: Record the locally pinned SDK result-error shape and its
        contract-derived overflow fixture.
    claude-result-failure-translation:
      action: change
      reason: Prefer native error signals and details, with a narrow secondary
        overflow-string compatibility guard.
    claude-result-failure-regression:
      action: change
      reason: Prove native subtype/is_error classification, absence of final_text, and
        the secondary legacy guard from fixture-only inputs.
  first-party-run-items-normalized:
    claude-normalized-run-items:
      action: change
      reason: Change Claude's terminal result mapping without altering normalized
        run-item evidence.
  normalized-agent-usage-telemetry:
    agent-usage-telemetry-schema:
      action: change
      reason: Add an orthogonal optional error field beside the existing terminal
        telemetry fields.
  reply-is-finalized-run-message:
    finalize-and-route:
      action: change
      reason: Preserve successful one-message reply routing while separating failed
        diagnostics from reply bodies.
  substantive-routing-excludes-acknowledgements:
    exact-ack-finalization:
      action: change
      reason: Compose failed empty-body parsing beside the unchanged exact-ack path.
  delivery-attempt-wal-reconcile:
    boot-reconcile:
      action: change
      reason: Replay the optional terminal error detail during crash recovery.
