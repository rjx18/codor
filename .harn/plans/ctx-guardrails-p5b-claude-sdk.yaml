anchors:
  claude-agent-sdk-query-is-the-session-runtime:
    claude-sdk-query-factory:
      action: change
      reason: Isolate the production query import behind the paseo-shaped injectable
        ClaudeQueryFactory.
    claude-sdk-session-lifecycle:
      action: change
      reason: Add the long-lived async input, sole message pump, resume recovery,
        identity-bound query replacement, and query.interrupt cleanup.
    claude-sdk-session-regression:
      action: change
      reason: Prove multi-turn single-query delivery, crash/exit resume recovery,
        option mapping, and interrupt routing with mock Query objects.
    adapter-runtime-contract:
      action: change
      reason: Generalize the adapter interface documentation from plain per-turn CLIs
        to either supervised CLI turns or supervised long-lived provider
        runtimes.
  claude-sdk-message-contract-preserves-normalized-runs:
    claude-sdk-message-translation:
      action: change
      reason: Accept SDK objects and retain fresh per-turn state with shared session
        and context telemetry only.
    claude-sdk-message-regression:
      action: change
      reason: Replay object fixtures for usage, compaction, failures, and ordinary run
        items without invoking query().
    claude-sdk-message-contract:
      action: change
      reason: Replace the raw driver contract notes with the typed SDK message
        contract and record the fixture-only verification boundary.
  claude-sdk-permissions-back-codor-interactions:
    claude-sdk-permission-callback:
      action: change
      reason: Park canUseTool callbacks behind Codor cards and settle them from
        respondInteraction with SDK PermissionResult values.
    claude-sdk-permission-regression:
      action: change
      reason: Prove ask, allow-once, allow-always, deny, and abort cleanup against a
        captured callback from mock Query Options.
  claude-sdk-hooks-are-authoritative:
    claude-sdk-hook-callbacks:
      action: change
      reason: Register SubagentStart/Stop and PostToolUse callbacks directly in query
        Options and delete the settings-file/HTTP hook endpoint.
    claude-sdk-hook-regression:
      action: change
      reason: Invoke captured SDK hooks and prove extension events plus parsed
        live-inbox context without a command or network call.
    claude-sdk-hook-contract:
      action: change
      reason: Document callback inputs/outputs and removal of the old hook transport.
  claude-control-protocol-pinned:
    claude-fixture-invariants:
      action: remove
      reason: Raw captures remain immutable historical fixtures but no longer anchor
        the active permission/lifecycle contract.
  extensions-hooks-authoritative:
    hooks-endpoint-settings:
      action: remove
      reason: Delete the generated settings file and ephemeral HTTP endpoint.
  interactions-answered-via-stdin-control:
    respond-interaction-stdin:
      action: remove
      reason: Delete control_response composition and writes to child stdin.
  interaction-ack-requires-stream-progress:
    interaction-progress-ack:
      action: remove
      reason: Delete stdout-sequence acknowledgement waiters; SDK callback settlement
        is the new acknowledgement.
  ask-normalization-blocks-run:
    control-request-normalization:
      action: remove
      reason: Replace stream control_request normalization with canUseTool callback
        normalization.
  adapter-process-lifecycle-supervised:
    cli-process-supervision:
      action: remove
      reason: Claude is no longer a CLI adapter; other CLI lifecycle anchors remain.
  canonical-spawn-controls-enforced:
    claude-spawn-control-mapping:
      action: change
      reason: Map the same policy/thinking vocabulary into SDK permissionMode,
        allowDangerouslySkipPermissions, thinking, effort, and ultracode
        settings.
  harness-declares-what-a-policy-becomes:
    adapter-policy-declarations:
      action: change
      reason: Retain the declared mapping while moving its enforcement from argv to
        SDK permissionMode.
  adapters-own-their-model-catalog:
    claude-code-model-catalog:
      action: change
      reason: Preserve the curated aliases while rewriting the adapter lifecycle.
    claude-code-model-catalog-notes:
      action: change
      reason: Restate the unchanged zero-spend catalog rationale in the SDK notes.
  codor-runtime-identity-is-a-clean-break:
    adapter-runtime-identity:
      action: change
      reason: Move the anchor from a generated codor hook filename to the exact codor
        inbox executable used by the SDK callback.
  adapter-children-inherit-session-env:
    claude-child-environment:
      action: change
      reason: Move the inherited/session overlay from child_process.spawn to SDK
        Options.env.
  live-inbox-capability-is-evidence-backed:
    claude-post-tool-use-hook:
      action: change
      reason: Keep the exact inbox command behind the SDK PostToolUse callback.
    claude-live-inbox-regression:
      action: change
      reason: Assert the injected inbox runner receives member cwd/env and its hook
        output is returned to Claude.
    claude-live-inbox-notes:
      action: change
      reason: Record the SDK callback channel as the evidence backing live_inbox.
  first-party-run-items-normalized:
    claude-normalized-run-items:
      action: change
      reason: Consume SDK message objects without changing normalized output evidence.
  normalized-agent-usage-telemetry:
    claude-usage-telemetry:
      action: change
      reason: Carry context state across SDK turns while retaining the approved shape.
    claude-usage-telemetry-regression:
      action: change
      reason: Parse fixture lines into SDK-shaped objects before translation.
  claude-compaction-follows-native-system-events:
    claude-compaction-translation:
      action: change
      reason: Route SDK compacting/boundary objects through the existing mapping.
    claude-compaction-regression:
      action: change
      reason: Replay contract-derived compaction objects under the SDK translator.
    claude-compaction-system-contract:
      action: change
      reason: Cite the SDK runtime contract rather than a future-process caveat.
  claude-result-errors-follow-native-signals:
    claude-result-failure-translation:
      action: change
      reason: Accept SDK result objects while preserving the native failure classifier.
    claude-result-error-contract:
      action: change
      reason: Record that SDK error results structurally omit reply text.
  attempt-start-evidence-persisted:
    adapter-turn-hooks:
      action: change
      reason: Clarify that SDK runtimes report accepted turn start without exposing a
        child PID and still report session ids immediately.
  member-config-is-changed-not-respawned:
    configure-member-daemon:
      action: change
      reason: Generalize the comment from fresh-per-turn processes to cached adapter
        runtimes that are replaced on the next turn while preserving resume
        identity.
