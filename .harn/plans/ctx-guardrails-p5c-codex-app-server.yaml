anchors:
  remaining-cli-adapters-use-supervised-subprocesses:
    copilot-cli-subprocess-driver:
      action: change
      reason: Re-anchor the unchanged Copilot per-turn CLI driver under the narrow
        replacement assumption.
    gemini-cli-subprocess-driver:
      action: change
      reason: Re-anchor the unchanged Gemini per-turn CLI driver under the narrow
        replacement assumption.
    opencode-cli-subprocess-driver:
      action: change
      reason: Re-anchor the unchanged OpenCode per-turn CLI driver under the narrow
        replacement assumption.
  codex-app-server-contract-is-pinned-to-0-144-5:
    codex-app-server-transport:
      action: change
      reason: Implement ordered JSONL JSON-RPC requests, notifications, server
        requests, stderr/exit handling, and deterministic disposal.
    codex-app-server-fake:
      action: change
      reason: Provide a Paseo-shaped in-memory child/process harness for all adapter
        lifecycle tests without executing Codex.
    codex-app-server-contract-notes:
      action: change
      reason: Record the installed 0.144.5 camelCase shapes and explicit divergences
        from Paseo's historical compatibility shims.
  codex-app-server-is-the-member-runtime:
    codex-app-server-session-lifecycle:
      action: change
      reason: Own one process per member, initialize once, start/resume the thread,
        span multiple turns, recover after exit/mismatch, and route interrupt
        RPC.
    codex-app-server-session-regression:
      action: change
      reason: Prove persistence, resume recovery, identity replacement, environment,
        option mapping, failure, and interrupt behavior against fake children.
  normalized-agent-usage-and-context-telemetry:
    claude-usage-telemetry:
      action: change
      reason: Move unchanged Claude usage anchors to the replacement shared contract.
    claude-usage-telemetry-regression:
      action: change
      reason: Move unchanged Claude regression evidence to the replacement contract.
    codex-usage-telemetry:
      action: change
      reason: Map app-server token usage to the shared live and terminal shape.
    codex-usage-telemetry-regression:
      action: change
      reason: Assert native context used/max pairing and absence of fabricated cost.
    agent-usage-telemetry-schema:
      action: change
      reason: Move the unchanged protocol/member schema anchors to the honest shared
        replacement assumption.
  codex-app-server-usage-is-context-aware-and-uncosted:
    codex-app-server-usage-mapping:
      action: change
      reason: Convert exact 0.144.5 camelCase tokenUsage fields and preserve the
        latest snapshot across process and turn boundaries.
    codex-app-server-usage-regression:
      action: change
      reason: Prove live and terminal context telemetry, pair guards, and no cost.
  codex-app-server-compaction-follows-native-events:
    codex-app-server-compaction-translation:
      action: change
      reason: Normalize item and thread completion channels with paired counters.
    codex-app-server-compaction-regression:
      action: change
      reason: Replay both arrival orders and prove one loading/completed timeline pair.
  adapters-cli-only-no-sdk:
    cli-subprocess-driver:
      action: remove
      reason: Delete the per-turn codex exec driver.
    copilot-cli-subprocess-driver:
      action: remove
      reason: Re-anchor unchanged Copilot code under the narrow replacement.
    gemini-cli-subprocess-driver:
      action: remove
      reason: Re-anchor unchanged Gemini code under the narrow replacement.
    opencode-cli-subprocess-driver:
      action: remove
      reason: Re-anchor unchanged OpenCode code under the narrow replacement.
  codex-event-contract-pinned:
    codex-fixture-invariants:
      action: remove
      reason: Keep raw exec captures immutable but mark them historical rather than
        normative for the active adapter.
  codex-usage-tokens-only:
    usage-token-mapping:
      action: remove
      reason: Replace turn.completed-only mapping with native app-server usage
        notification mapping.
  normalized-agent-usage-telemetry:
    claude-usage-telemetry:
      action: remove
      reason: Move to the replacement shared telemetry assumption.
    claude-usage-telemetry-regression:
      action: remove
      reason: Move to the replacement shared telemetry assumption.
    codex-usage-telemetry:
      action: remove
      reason: Replace the exec-limited mapping with app-server context telemetry.
    codex-usage-telemetry-regression:
      action: remove
      reason: Replace the old absence assertion with app-server context evidence.
    agent-usage-telemetry-schema:
      action: remove
      reason: Move the unchanged schema anchors to the replacement shared assumption.
  adapter-process-lifecycle-supervised:
    cli-process-supervision:
      action: remove
      reason: Codex is no longer a per-turn CLI adapter; the other supervision anchors
        remain and Codex gets a JSON-RPC-specific lifecycle anchor.
  first-party-run-items-normalized:
    codex-normalized-run-items:
      action: change
      reason: Consume canonical app-server item objects while preserving bounded
        normalized payloads.
  canonical-spawn-controls-enforced:
    codex-spawn-control-mapping:
      action: change
      reason: Replace argv construction with app-server sandbox, approval, model, and
        effort parameters.
  harness-declares-what-a-policy-becomes:
    adapter-policy-declarations:
      action: change
      reason: Declare app-server sandbox mode names rather than exec flag spelling.
    adapter-policy-regression:
      action: change
      reason: Assert declared policy values equal the thread/turn RPC parameters.
  adapter-children-inherit-session-env:
    codex-child-environment:
      action: change
      reason: Merge the member environment into the persistent app-server spawn.
    codex-env-regression:
      action: change
      reason: Inspect the injected factory context rather than executing a script.
  attempt-start-evidence-persisted:
    adapter-turn-hooks:
      action: change
      reason: Clarify that provider runtimes report the accepting persistent process
        and native thread id rather than only per-turn child discovery.
