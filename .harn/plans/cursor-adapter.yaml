  - packages/adapters/cursor/src/translate.ts
  - packages/adapters/cursor/src/translate.spec.ts
  - packages/adapters/cursor/src/index.ts
  - packages/adapters/cursor/src/index.spec.ts
  - packages/adapters/cursor/src/fixtures.spec.ts
  - packages/switchboard/src/adapter-registry.ts
  - packages/switchboard/src/adapter-registry.spec.ts
anchors:
  harness-declares-what-a-policy-becomes:
    cursor-policy-native-mapping:
      action: change
      reason: The adapter's POLICY_NATIVE map is where cursor answers what each
        canonical policy becomes; it carries the anchor so the declaration
        cannot drift from the assumption that requires it.
    adapter-policy-registry-validation:
      action: keep
      reason: Registry-side policy validation is unchanged; cursor simply has to pass
        it.
  canonical-spawn-controls-enforced:
    cursor-spawn-control-mapping:
      action: change
      reason: The argv builder refuses unsupported thinking levels and maps model and
        policy onto native flags.
    registry-spawn-control-validation:
      action: keep
      reason: The shared spawn validation is untouched.
  adapter-children-inherit-session-env:
    cursor-env-regression:
      action: change
      reason: A regression pins that the spawned child receives the session env.
  adapter-registry-sole-harness-source:
    configured-adapter-registry:
      action: change
      reason: The builtin factory map gains cursor; the registry stays the sole source.
