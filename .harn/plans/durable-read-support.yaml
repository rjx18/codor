anchors:
  cold-hydration-is-bounded-and-atomic:
    bounded-cold-hydration-contract:
      action: remove
      reason: Migrate the server and legacy staging anchors to the conditional
        strict-addressed/legacy-safe contract that states support is separate.
  rail-summary-served-not-guessed:
    rooms-summary-rest:
      action: remove
      reason: Replace caller-cursor-only REST truth with durable primary plus explicit
        legacy fallback.
    rooms-summary-store-queries:
      action: remove
      reason: Replace message-id-only unread arithmetic with activity/read seq queries
        and the shared support summary builder.
  message-activity-drives-unread:
    message-activity-storage:
      action: change
      reason: Schema, migration, message insert/finalization, and unread query
        maintain content activity independently from unrelated seq changes.
    message-activity-regression:
      action: change
      reason: Store and migration tests pin every eligible and excluded class.
  human-room-read-cursors-are-durable-and-monotonic:
    durable-room-read-storage:
      action: change
      reason: Schema/migration, human seeding, monotonic advance, future-seq guard,
        and visible-inbox clearing define durable shared read state.
    mark-room-read-contract:
      action: change
      reason: Protocol act, daemon operation, authorization row, and server dispatch
        expose the human-only monotonic transition.
    durable-room-read-regression:
      action: change
      reason: Protocol/store/daemon/server/auth tests prove migration, authorization,
        concurrency, and multi-device convergence.
  room-support-is-bounded-recipient-scoped-state:
    room-support-protocol:
      action: change
      reason: New summary, inbox item, support schemas and room_support frame are
        additive protocol surfaces.
    room-support-projection:
      action: change
      reason: Store/daemon build and redact the bounded recipient projection from
        durable truth, never the transcript cache.
    room-support-fanout:
      action: change
      reason: Server caches and change-only streams support per socket-room-human.
    room-support-regression:
      action: change
      reason: Protocol/store/daemon/server tests prove scope, redaction, live updates,
        and suppression of unchanged support.
  actionable-inbox-clears-on-read-or-reply:
    actionable-inbox-projection:
      action: change
      reason: Projection filters explicit work, enriches previews, and excludes read
        or formally replied sources.
    actionable-inbox-regression:
      action: change
      reason: Tests cover mentions, default routes, cards, read, reply, and bounds.
  addressed-cold-hydration-is-strict-and-legacy-safe:
    addressed-hydration-contract:
      action: change
      reason: Store strict branch, legacy branch, support snapshot, and client staging
        comments encode the independently deployable cutover.
    addressed-hydration-regression:
      action: change
      reason: Store/server tests reproduce every outlier and prove exact N versus
        byte-compatible legacy and lossless warm sync.
  durable-room-summaries-stream-and-fallback:
    durable-room-summary:
      action: change
      reason: One builder supplies support streams and durable REST while retaining
        the explicit legacy cursor mode.
    durable-room-summary-regression:
      action: change
      reason: Server/store tests pin unread semantics, inactive live flow, REST
        compatibility, and authorization.
  changelog-is-sync-cursor:
    ws-subscribe-cursor:
      action: keep
      reason: Subscribe cursor schema is unchanged; new act/frame fields live outside
        the since_seq contract.
  sync-cursor-commits-after-hydration:
    consistent-sync-snapshot:
      action: change
      reason: Sync options select strict addressed mode and include support in the
        same synchronous snapshot while warm replay stays exhaustive.
    sync-complete-frame:
      action: keep
      reason: Addressed sync_complete already carries room and floor; its schema does
        not need another change.
  multiplexed-subscriptions-identify-their-room:
    room-addressed-live-fanout:
      action: change
      reason: Per-room subscription state gains viewer identity and support cache, and
        relevant room frames schedule a coalesced support refresh.
    room-addressed-hydration:
      action: change
      reason: Addressed human hydration requests strict/support mode and sends its
        support snapshot before sync_complete.
    room-addressed-frame-contract:
      action: keep
      reason: Existing room addressing fields and opt-in flag stay unchanged.
  roles-gate-human-acts-not-agents:
    role-matrix-source:
      action: change
      reason: Add observer-minimum mark_room_read beside mark_read.
    role-matrix-integration:
      action: change
      reason: Prove humans may mark their room while the agent matrix refuses it.
  redaction-before-fanout:
    redacted-frame-emit:
      action: keep
      reason: Existing emit/project implementation is reused unchanged.
    redaction-projection:
      action: keep
      reason: Redaction engine patterns are unchanged.
  default-recipient-fallback-chain:
    substantive-default-recipient:
      action: keep
      reason: Existing latest finalized agent query is reused unchanged by support.
  substantive-routing-excludes-acknowledgements:
    exact-ack-finalization:
      action: keep
      reason: Existing ack classification remains the activity exclusion source.
  history-cursor-tracks-only-the-contiguous-tail:
    contiguous-history-state:
      action: keep
      reason: Client pagination logic is unchanged in this server prerequisite.
  agent-sync-hydrates-only-own-queued-inbox:
    agent-own-queued-sync-overlay:
      action: keep
      reason: Legacy agent overlay remains byte-identical.
  unix-socket-same-protocol:
    unix-websocket-listener:
      action: change
      reason: Shared bindProtocol dispatches the additive act/support behavior on both
        transports while legacy CLI traffic remains unchanged.
