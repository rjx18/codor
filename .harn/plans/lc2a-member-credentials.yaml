id: lc2a-member-credentials
title: LC2a - an agent speaks as itself through one narrow room-scoped credential
assumptions:
  create:
    - id: agent-member-credentials-stay-secret
      title: An agent receives a credential, never a reusable secret in the transcript
      statement: A daemon-owned agent session must receive a cryptographically random
        member credential through Session.env together with the exact local
        socket, channel, and member identity it belongs to. Only a one-way hash
        may be persisted on the member row; the raw token may live only on the
        in-memory Session, and every path that acquires a new daemon-owned
        session - initial spawn, revive or adoption, and lazy reconstruction
        after restart - must rotate it. The server may resolve the hash only to
        that active agent member and room, because a transcript, member frame,
        payload, journal, log, or old revived process must never become a
        reusable credential.
      reason: LC2/L1/L2. An agent cannot collaborate mid-turn until its child process
        can address the switchboard as itself, but persisting or projecting the
        raw token would turn ordinary run evidence into an authentication
        database.
      depends_on:
        - a-session-carries-the-environment-its-children-need
        - server-token-required
        - redaction-before-fanout
    - id: agent-network-authority-is-narrow
      title: An agent credential grants a small explicit matrix in one channel
      statement: An authenticated agent principal must be bound to exactly one member
        and one channel and must be authorized by a separate agent capability
        matrix, never by a human role. It may read and subscribe to its own
        channel, post only as itself, search that channel, consume only its own
        deliveries, register and clear only its own wait, and read member status
        in that channel. Every global operation, every other channel, every
        management act, and especially configure must be forbidden, because an
        agent that can raise its own permission has crossed the boundary the
        operator set around it.
      reason: LC2/L2 and the binding A4 forward-note. The member token is useful only
        if it carries enough authority for live collaboration, and safe only if
        its exclusions are structural and exhaustively tested.
      depends_on:
        - agent-member-credentials-stay-secret
        - roles-gate-human-acts-not-agents
  reviewed:
    - id: a-session-carries-the-environment-its-children-need
      outcome: unchanged
      reason: LC1 established the optional Session.env contract. This sub-plan is the
        switchboard producer of that environment; LC3 remains the adapter
        consumer.
    - id: server-token-required
      outcome: unchanged
      reason: The owner token still must be non-empty and still fails closed. A hashed
        daemon-issued member credential becomes a fourth explicit principal
        branch, not an unauthenticated fallback.
    - id: roles-gate-human-acts-not-agents
      outcome: unchanged
      reason: Human principals continue through the existing exhaustive role matrix.
        Agent principals gain a separate matrix and can never borrow a human
        role.
    - id: redaction-before-fanout
      outcome: unchanged
      reason: Serving redaction remains the same projection. A regression proves the
        existing generic TOKEN rule recognizes the new environment assignment,
        while the raw credential is never added to a persisted payload or
        journal in the first place.
    - id: working-directories-validated-before-spawn
      outcome: unchanged
      reason: The cwd is still normalized and validated before adapter.spawn. After
        the member exists, the returned session receives its scoped environment.
    - id: run-blobs-off-db
      outcome: unchanged
      reason: The members table gains one credential-hash column; no run evidence or
        raw credential enters SQLite.
    - id: attach-custody-lease-tracks-child-pid
      outcome: unchanged
      reason: Attach leases are unchanged. Their neighbouring members schema gains a
        credential-hash column that is rotated when daemon custody resumes.
    - id: unix-socket-same-protocol
      outcome: unchanged
      reason: Local operator connections retain filesystem authentication and the same
        frame protocol. A member token supplied on that same socket resolves to
        the narrow agent principal instead of the operator owner.
anchors:
  agent-member-credentials-stay-secret:
    member-credential-storage:
      action: change
      reason: Add a nullable unique hash, an idempotent legacy migration, rotation,
        revocation-by-replacement, and hash lookup without exposing it through
        Member.
    member-session-environment:
      action: change
      reason: Generate the raw credential only after the member exists, persist only
        its hash, and set CODOR_SOCKET, CODOR_CHANNEL, CODOR_MEMBER_ID, and
        CODOR_MEMBER_TOKEN on every newly acquired daemon-owned session.
    agent-principal-resolution:
      action: change
      reason: Extend owner, configured-human, and browser-session resolution with the
        daemon-backed member-token branch for both REST bearer and WebSocket
        query auth.
    member-credential-store-regression:
      action: change
      reason: Prove hash-only persistence, replacement, reopen durability, and absence
        from the public Member projection.
    member-session-environment-regression:
      action: change
      reason: Prove complete env composition, rotation across revive and lazy rebuild,
        and absence from member frames, payloads, blobs, and stored run
        evidence.
    agent-principal-resolution-regression:
      action: change
      reason: Prove the fourth resolver branch works over REST, network WebSocket and
        the Unix socket while remaining bound to its one member and room.
    member-credential-redaction-regression:
      action: change
      reason: Derive a random token in the test and prove the generic TOKEN projection
        removes a CODOR_MEMBER_TOKEN assignment without recording a fixed
        secret.
  agent-network-authority-is-narrow:
    agent-capability-matrix:
      action: change
      reason: Define the exhaustive agent capability set separately from human roles;
        configure is deliberately absent.
    agent-capability-regression:
      action: change
      reason: Prove the declared matrix is exact, every existing management act is
        excluded, and configure is named explicitly as forbidden.
    agent-room-authorization:
      action: change
      reason: Dispatch authorization by principal kind, bind agent reads and posts to
        its credential room, attribute posts to itself, and reject global or
        cross-room access.
    agent-authz-regression:
      action: change
      reason: Prove every allowed capability and every exclusion, explicitly including
        configure and all other wire acts, plus other-room and global denial.
    agent-interim-post-ingress:
      action: change
      reason: Let an authenticated live agent post an ordinary chat message as itself;
        LC2c adds the routing and awaiting-reply refinements around that
        ingress.
  working-directories-validated-before-spawn:
    daemon-cwd-enforcement:
      action: change
      reason: The spawn path assigns the member-scoped environment after the existing
        cwd and canonical option validation has completed.
  run-blobs-off-db:
    store-schema-no-blobs:
      action: change
      reason: The members table gains one nullable credential-hash column; it remains
        free of run blobs and raw secrets.
  attach-custody-lease-tracks-child-pid:
    attach-lease-store:
      action: change
      reason: The members table beside the unchanged lease table gains the hash column.
  unix-socket-same-protocol:
    unix-websocket-listener:
      action: change
      reason: The shared listener authorizes by principal kind and accepts a token on
        the Unix URL when the member-aware CLI lands; tokenless local use
        remains owner.
