id: lc3-adapters
title: LC3 - inherit member environment and declare live inbox truth
assumptions:
  create:
    - id: adapter-children-inherit-session-env
      title: Every adapter child inherits the member session environment
      statement: Every first-party adapter subprocess must receive the inherited
        process environment with session.env merged over it, so daemon-issued
        CODOR member identity reaches the child without dropping ordinary
        runtime variables.
      reason: L1 makes member-scoped CLI calls possible while preserving the native
        harness environment.
    - id: live-inbox-capability-is-evidence-backed
      title: Live inbox capability matches an adapter-owned delivery channel
      statement: Claude Code alone must declare live_inbox true and generate an exact
        PostToolUse command hook for codor inbox --new --consume --format hook;
        every other first-party adapter must declare false and document the
        missing first-party hook channel and probe date.
      reason: L9 lets briefing and later acceptance distinguish automatic
        tool-boundary delivery from adapters that require explicit polling.
      depends_on:
        - adapter-children-inherit-session-env
        - extensions-hooks-authoritative
  reviewed:
    - id: canonical-spawn-controls-enforced
      outcome: unchanged
      reason: Capability declarations and child environment composition do not alter
        model, policy, or thinking validation and mapping.
    - id: adapter-process-lifecycle-supervised
      outcome: unchanged
      reason: Each existing supervised child keeps the same argv, cwd, stdio, process
        group, and exit handling; only its environment is composed.
    - id: adapters-cli-only-no-sdk
      outcome: unchanged
      reason: Codex, Copilot, Gemini, and OpenCode remain direct CLI subprocess
        drivers with no SDK or server integration.
    - id: extensions-hooks-authoritative
      outcome: unchanged
      reason: SubagentStart and SubagentStop remain the authoritative extension hooks
        while PostToolUse adds an independent inbox command.
    - id: harness-declares-what-a-policy-becomes
      outcome: unchanged
      reason: Exhaustive capability snapshots gain live_inbox without changing any
        native policy declaration.
