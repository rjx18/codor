id: m0-acceptance
title: P0.10 M0 live acceptance - real claude to codex handoff writes an artifact
assumptions:
  retire: []
  create:
    - id: m0-live-acceptance-chain
      title: M0 accepts only on a real routed claude-to-codex chain with artifacts
      statement: The acceptance spec must drive REAL claude and codex CLIs through
        the daemon - temp git repo fixture, codex member policy
        workspace-write, one human post, no manual routing - and assert that
        the handoff chain fired from claude's finalized run message, that the
        codex turn is exactly ONE finalized message, and that hello.md exists
        on disk with the planned shape, because M0's dial tone is done only
        when live harnesses complete an end-to-end routed chain.
      reason: PLAN-M0 P0.10 finding 8; this is the gate the milestone review
        reads, and its transcript (tmp/build/ACCEPT-M0.md) is the acceptance
        record.
      depends_on:
        - reply-is-finalized-run-message
        - adapters-cli-only-no-sdk
  reviewed:
    - id: runs-are-one-message
      outcome: unchanged
      reason: The acceptance asserts one run message per live turn - consuming
        the invariant, not changing it.
    - id: delivery-payload-template-exact
      outcome: unchanged
      reason: Live payloads are composed by the pinned template; the transcript
        records them verbatim.
    - id: interactions-answered-via-stdin-control
      outcome: unchanged
      reason: The live chain runs unattended; no interaction path is modified.
anchors:
  m0-live-acceptance-chain:
    acceptance-live-chain:
      action: change
      reason: Create the gated live acceptance spec driving both real adapters
        through the daemon.
files:
  - packages/switchboard/package.json
  - pnpm-lock.yaml
  - packages/switchboard/src/acceptance.spec.ts
  - docs/SETUP.md
