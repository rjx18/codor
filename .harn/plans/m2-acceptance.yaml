id: m2-acceptance
title: P2.5 deterministic long-lines milestone acceptance
assumptions:
  retire: []
  create: []
  reviewed:
    - id: dht-topic-from-line-secret
      outcome: unchanged
      reason: Acceptance exercises the existing exact line discovery on both an isolated testnet and the real DHT without changing topic derivation.
    - id: peer-auth-challenge-before-traffic
      outcome: unchanged
      reason: Both acceptance topologies pair the two switchboards before authenticated conversation traffic and reject the revoked peer afterward.
    - id: revocation-rotates-room-keys
      outcome: unchanged
      reason: Acceptance verifies the existing revoke path rotates the room generation, drops the active peer, and prevents reauthentication.
    - id: room-home-single-authority
      outcome: unchanged
      reason: Deterministic FakeAdapter conversations retain ids, finalization, routing, and blobs at the home while the resident only executes its local turn.
    - id: resident-attempt-journal-reconciles
      outcome: unchanged
      reason: Acceptance consumes the already-tested resident journal path without changing its disconnect boundary semantics.
    - id: ledger-home-only-refs-travel
      outcome: unchanged
      reason: The acceptance prompt cites a home ledger note and verifies the remote FakeAdapter receives its snapshotted body without a resident vault.
    - id: single-crypto-suite-libsodium
      outcome: unchanged
      reason: A test-only raw Noise transport capture proves a known application plaintext marker does not occur in encrypted stream bytes; no crypto variant is introduced.
