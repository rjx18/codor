id: m2fix-ledger-write-containment
title: M2 review fix for contained and validated ledger writes
assumptions:
  retire: []
  create: []
  reviewed:
    - id: ledger-home-only-refs-travel
      outcome: unchanged
      reason: Runtime type validation and resolved-path containment enforce the existing home-only vault boundary for local and transported writes.
    - id: ledger-writes-audited-in-room
      outcome: unchanged
      reason: Transport writes retain supplied member attribution but reject the reserved direct-filesystem operator identity and malformed inputs.
    - id: room-home-single-authority
      outcome: unchanged
      reason: Authenticated peers still route writes to the home, which now validates the request before touching its filesystem.
anchors:
  ledger-home-only-refs-travel:
    home-ledger-vault:
      action: change
      reason: Single-source note type and write schemas, validate runtime writes, and require the resolved destination to remain inside the room vault.
  ledger-writes-audited-in-room:
    ledger-change-audit:
      action: change
      reason: Parse ledger_add payloads with zod and return an error result for malformed, traversal, empty-author, or forged-operator requests.
files:
  - packages/switchboard/package.json
  - packages/switchboard/src/ledger/vault.ts
  - packages/switchboard/src/ledger/watch.ts
  - packages/switchboard/src/ledger/ledger.spec.ts
  - packages/cli/src/program.ts
  - packages/cli/src/index.spec.ts
  - pnpm-lock.yaml
  - tmp/build/PROGRESS.md
