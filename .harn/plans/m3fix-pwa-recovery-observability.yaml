id: m3fix-pwa-recovery-observability
title: M3 review fix for cold-launch recovery and observable push delivery
assumptions:
  retire: []
  create:
    - id: pwa-cold-launch-restores-local-auth
      title: Installed PWA cold launches from paired local access
      statement: The web entrypoint must store an explicitly supplied bearer token in
        Wireroom IndexedDB, remove it from browser-visible URLs, and recover it in
        memory for later same-origin PWA launches, settings navigation, and notification
        clicks, because the manifest starts at a tokenless URL and paired access must
        survive a cold launch without leaking credentials through history or referrers.
      reason: The M3 adversarial review found that manifest cold launches always used
        an empty token even though the paired token was already stored for the worker.
      depends_on:
        - server-token-required
        - unpair-purges-all-browser-state
    - id: push-configuration-and-failures-are-visible
      title: Push configuration truth and delivery failures are operator-visible
      statement: Push must report enabled only when relay URL, VAPID key, and paired
        subscription storage are all configured; invalid relay URLs must fail startup,
        and background delivery failures must reach an operator-visible diagnostic
        callback without logging subscription secrets, because silent safety-notification
        loss is indistinguishable from success.
      reason: The M3 adversarial review found that settings could report enabled without
        a relay and every relay or producer failure was swallowed.
      depends_on:
        - push-only-for-human-targeted-events
        - relay-stateless-subscription-in-request
  reviewed:
    - id: server-token-required
      outcome: unchanged
      reason: REST and WebSocket requests still require the same non-empty configured
        bearer; only the paired browser's local retrieval and URL handling change.
    - id: unpair-purges-all-browser-state
      outcome: unchanged
      reason: Moving bearer persistence into entrypoint bootstrap retains IndexedDB
        ownership and the existing full local purge boundary.
    - id: push-only-for-human-targeted-events
      outcome: unchanged
      reason: Delivery result reporting observes the existing human-targeted trigger
        list without creating another push source.
    - id: push-previews-redacted-pad-then-sealed
      outcome: unchanged
      reason: Early relay URL validation does not alter preview redaction, padding,
        room-key encryption, device wrapping, or request signatures.
    - id: push-decrypts-on-device-only
      outcome: unchanged
      reason: Notification clicks recover same-origin access in the page entrypoint;
        push content still opens only inside the paired service worker.
    - id: relay-stateless-subscription-in-request
      outcome: unchanged
      reason: Trusted-proxy-aware bounded rate limiting adds no relay persistence,
        subscription database, queue, or mailbox.
    - id: notify-signed-by-allowlisted-switchboard
      outcome: unchanged
      reason: Open-mode address limiting moves before signature verification, while
        sender limiting remains after a valid Ed25519 signature and allowlist mode is
        unchanged.
    - id: permalink-ids-stable
      outcome: unchanged
      reason: Removing bearer query parameters preserves room and message fragments and
        does not change permanent message identifiers.
    - id: spend-meter-always-on
      outcome: unchanged
      reason: Tokenless settings links retain the existing always-visible header meter.
anchors:
  pwa-cold-launch-restores-local-auth:
    paired-access-bootstrap:
      action: change
      reason: Resolve explicit or stored same-origin access before rendering and strip
        the bearer from browser-visible URLs.
  push-configuration-and-failures-are-visible:
    push-delivery-diagnostics:
      action: change
      reason: Validate relay configuration at construction and surface failed producer
        results through the daemon's background-error callback.
  push-previews-redacted-pad-then-sealed:
    producer-pad-seal-sign:
      action: change
      reason: Precompute and validate the configured relay endpoint before any push is
        queued while leaving encryption and signing unchanged.
  push-only-for-human-targeted-events:
    push-target-dispatch:
      action: change
      reason: Convert failed push result records into sanitized background diagnostics.
  relay-stateless-subscription-in-request:
    notify-subscription-request:
      action: change
      reason: Bound expired rate-limit entries and support explicitly trusted proxy
        addresses without retaining request or subscription state.
  push-decrypts-on-device-only:
    sw-push-notification-handler:
      action: change
      reason: Navigate notification clicks without copying the locally stored bearer
        into URL history.
  permalink-ids-stable:
    message-history-surface:
      action: change
      reason: Accept the in-memory bootstrapped bearer and omit it from room links while
        retaining fragments and history behavior.
    message-permalink-rendering:
      action: change
      reason: Omit the bearer from the settings URL while preserving permanent message
        links.
  spend-meter-always-on:
    meter-settings-surface:
      action: change
      reason: Keep the meter intact while making its settings navigation tokenless.
  unpair-purges-all-browser-state:
    settings-unpair-action:
      action: change
      reason: Surface remote revoke and local purge failures rather than leaving rejected
        promises or falsely claiming cleanup completed.
files:
  - relay/src/server.ts
  - relay/src/server.spec.ts
  - relay/src/index.ts
  - relay/src/index.spec.ts
  - relay/README.md
