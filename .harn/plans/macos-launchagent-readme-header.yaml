id: macos-launchagent-readme-header
title: Put the branded install path first and make `codor setup` install a real
  background user service on both Linux and macOS
notes: >-
  Richard rejected the README's foreground-only macOS path and asked for the
  supplied Codor mark to lead the document with installation at the top. macOS
  has a native per-user service manager: launchd loads user-owned agents from
  ~/Library/LaunchAgents. The setup wizard must therefore select systemd on
  Linux and a LaunchAgent on Darwin rather than telling Mac operators to keep a
  terminal open.

  The LaunchAgent is generated from already-resolved absolute paths so nvm and
  shell-only harness installs work outside a login shell. It carries explicit
  ProgramArguments, WorkingDirectory, CODOR_TOKEN and PATH, decimal umask 63,
  background process type, stdout/stderr under ~/.codor/logs, RunAtLoad, and
  KeepAlive only after unsuccessful exit. The plist is mode 600 because it
  contains the owner token. `launchctl bootout` is attempted idempotently before
  `bootstrap gui/<uid>`, then the job is enabled and kickstarted. Dry-run prints
  the same plist with a redacted token and makes no filesystem or launchctl
  changes.

  This follows Apple's user-agent boundary: ~/Library/LaunchAgents belongs to
  the logged-in user, and current launchctl uses bootstrap/bootout plus
  enable/kickstart rather than the legacy load/unload commands. Codor remains a
  user agent, not a root LaunchDaemon, because it must retain that user's
  project files and harness credentials.

  The README begins with a centered responsive light/dark mark, centered name,
  one-line product statement and badges. The complete install section follows
  immediately. Product explanation and screenshot move below installation; no
  install command or product claim is removed.
assumptions:
  retire:
    - id: cli-setup-wizard-preserves-service-environment
      reason: Its statement hard-codes a checked-in systemd unit plus environment file
        as the setup service. macOS needs an equivalent generated LaunchAgent
        whose environment lives in its mode-600 plist, so the old cross-platform
        claim would contradict the new supported path.
  create:
    - id: cli-setup-wizard-installs-platform-user-service
      title: Setup installs a private native user service on Linux and macOS
      statement: The setup command must confirm every mutation, create private
        configuration and data plus a mode-600 owner token, resolve the absolute
        current Node path and every detected harness CLI directory, install and
        start either the checked-in systemd user unit plus mode-600 environment
        file on Linux or a mode-600 per-user LaunchAgent with equivalent
        arguments, environment, umask, failure restart and private logs on
        macOS, optionally publish Tailscale Serve, and render the exact platform
        service with its token redacted under side-effect-free dry-run; because
        neither systemd nor launchd inherits an interactive shell's nvm or
        harness PATH and Codor must run persistently without root.
      reason: The previous wizard was Linux-only despite the public prerequisites
        claiming macOS. A native per-user LaunchAgent supplies the same durable,
        least-privilege service behavior on Mac without a foreground terminal.
      depends_on:
        - fresh-clone-install-proven-by-script
        - tailnet-auto-pairing-explicit-trust
  reviewed:
    - id: fresh-clone-install-proven-by-script
      outcome: unchanged
      reason: Clone, build, loopback boot, web-next, CLI smoke, and teardown remain
        unchanged; platform service generation is covered in deterministic CLI
        tests rather than requiring macOS in the clean-clone runner.
    - id: operator-launches-serve-web-next
      outcome: unchanged
      reason: The generated LaunchAgent directly serves packages/web-next/dist,
        extending the existing one-client invariant to the new platform path.
    - id: global-cli-install-is-idempotent
      outcome: unchanged
      reason: Both platform services continue to invoke the same built CLI and the
        README retains the install script as the primary command installation.
    - id: tailnet-auto-pairing-explicit-trust
      outcome: unchanged
      reason: macOS background service support does not change explicit pairing or the
        opt-in identity-header trust boundary.
    - id: human-facing-surfaces-call-rooms-channels
      outcome: unchanged
      reason: The product explanation moves below installation and is lightly reshaped
        around the branded header without changing channel terminology.
