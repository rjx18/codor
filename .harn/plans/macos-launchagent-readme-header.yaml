    setup-regression:
      action: remove
      reason: Replace Linux-only setup coverage with Linux plus macOS dry-run and
        installation regressions.
    setup-command-surface:
      action: remove
      reason: Move the public setup command marker to the replacement assumption.
  cli-setup-wizard-installs-platform-user-service:
    setup-runtime:
      action: change
      reason: Select systemd or launchd, generate the secure LaunchAgent, install
        platform files, start the user service, and preserve pairing/Tailscale.
    setup-regression:
      action: change
      reason: Pin Linux behavior and prove macOS dry-run redaction, plist contents,
        permissions, launchctl lifecycle, paths, logs, and pairing.
    setup-command-surface:
      action: change
      reason: The same command now advertises a platform-native local service.
  operator-launches-serve-web-next:
    readme-current-web-client:
      action: change
      reason: Put installation first and replace the Mac foreground-only path with the
        platform-aware wizard plus optional development foreground command.
    selfhost-current-web-client:
      action: change
      reason: State that both installed user services serve web-next directly.
    launchd-current-web-client:
      action: change
      reason: The generated LaunchAgent pins packages/web-next/dist in its absolute
        ProgramArguments.
  human-facing-surfaces-call-rooms-channels:
    public-docs-channel-terminology:
      action: change
      reason: Move the explanation and screenshot below the new top installation
