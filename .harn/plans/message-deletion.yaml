      reason: The act schema, store purge, daemon authorization and delivery
        cancellation, and server dispatch define the deletion contract.
  roles-gate-human-acts-not-agents:
    role-matrix-source:
      action: change
      reason: CAPABILITY_MINIMUM_ROLE is a total record over HumanCapability, so the
        new act forces a delete_message row (minimum role admin) inside this
        anchor. The gate rule itself is unchanged.
  unix-socket-same-protocol:
    unix-websocket-listener:
      action: change
      reason: The entire act dispatch lives inside this anchor, so the delete_message
        branch necessarily touches it. Both transports keep the identical
        protocol.
  collaboration-groups-are-durable-state:
    collaboration-store-schema:
      action: change
      reason: The messages CREATE TABLE gains deleted INTEGER NOT NULL DEFAULT 0 next
        to pinned; the migration ALTER outside the anchor covers pre-existing
        databases.
  message-id-txn-allocation:
    message-id-allocation:
      action: change
      reason: The postMessage INSERT names the new deleted column with a constant 0,
        mirroring pinned; allocation logic is untouched.
