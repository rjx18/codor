id: mirrored-join-adopt
title: P1.3 mirrored TUI join, turn feed, and explicit adoption
assumptions:
  retire: []
  create:
    - id: mirrored-deliveries-queue
      title: Mirrored members never receive daemon-driven turns
      statement: A member whose persisted custody is mirrored must keep inbound
        deliveries in its durable FIFO without calling adapter.deliver, expose
        the queued count and a room nudge, and remain held until an explicit
        adoption transition, because the live native TUI is the sole writer to
        that harness session.
      reason: PLAN-M1 P1.3 and ARCHITECTURE session ownership prohibit two concurrent
        writers to one native session.
      depends_on:
        - one-inflight-turn-per-member
        - delivery-fifo-has-durable-sequence
    - id: mirror-one-message-per-native-turn
      title: Each native TUI turn becomes one deduplicated run message
      statement: A Claude Stop or Codex agent-turn-complete feed must persist at most
        one finalized run message per member and native turn id, authored by
        that mirrored member with its assistant text, parse mentions and
        references from that same finalized body, and route it normally, because
        mirrored speech must obey the same one-turn-one-message and
        onward-routing semantics as daemon-owned speech without double sourcing.
      reason: PLAN-M1 P1.3 specifies hooks or notify as the authoritative turn sources
        and native turn ids as the durable dedupe key.
      depends_on:
        - runs-are-one-message
        - reply-is-finalized-run-message
        - routing-eligibility-nonempty-finalized
    - id: adoption-explicit-or-sessionend
      title: Adoption is explicit except for Claude SessionEnd
      statement: A mirrored member may transfer to owned custody only through an
        explicit CLI or web adopt action, except that a Claude Code SessionEnd
        hook may trigger the same transition automatically; Codex file or notify
        inactivity must never infer exit, because quiescence is not proof that
        the operator stopped driving the session.
      reason: PLAN-M1 P1.3 pins explicit adoption and permits auto-adoption only from
        Claude's authoritative SessionEnd lifecycle event.
      depends_on:
        - revive-via-session-ref
  reviewed:
    - id: one-inflight-turn-per-member
      outcome: unchanged
      reason: The pump adds mirrored custody to its existing paused/dead guard; owned
        members retain one in-flight batched turn.
    - id: delivery-fifo-has-durable-sequence
      outcome: unchanged
      reason: Mirrored queues use the existing queue_seq ordering and adoption drains
        the complete ordered batch through the normal pump.
    - id: runs-are-one-message
      outcome: unchanged
      reason: Mirrored native turns insert one finalized run row and never a separate
        chat reply or duplicate message.
    - id: reply-is-finalized-run-message
      outcome: unchanged
      reason: Native assistant text is stored as the mirrored run's body and
        final_text and routes from that same permanent message id.
    - id: routing-eligibility-nonempty-finalized
      outcome: unchanged
      reason: Mirrored run messages pass through the existing eligibility and
        recipient resolver, including the empty-body no-route guard.
    - id: run-blobs-off-db
      outcome: unchanged
      reason: Mirrored run events are journaled in the ordinary JSONL blob and SQLite
        stores only events_ref plus the native-turn dedupe mapping.
    - id: revive-via-session-ref
      outcome: unchanged
      reason: Adoption uses adapter.attach with the persisted session reference, cwd,
        and policy but is a distinct mirrored-to-owned transition.
    - id: unix-socket-same-protocol
      outcome: unchanged
      reason: Join, mirror feed, and adopt add shared JSON frames handled by the same
        local and remote protocol dispatcher.
    - id: changelog-covers-every-visible-entity
      outcome: unchanged
      reason: Custody and state transitions mutate members through updateMember and
        mirrored run messages use normal message changes.
    - id: client-syncs-by-seq
      outcome: unchanged
      reason: The web adopts custody from ordinary member frames and keeps its
        existing sequence cursor and by-id upserts.
    - id: adapters-cli-only-no-sdk
      outcome: unchanged
      reason: Join detection reads native session files and hook payloads while
        adoption calls the existing CLI adapter interface; no SDK is added.
anchors:
  mirrored-deliveries-queue:
    mirrored-custody-hold:
      action: change
      reason: Persist mirrored custody and stop the daemon pump while showing queued
        work and the first-delivery nudge.
  mirror-one-message-per-native-turn:
    mirrored-turn-dedupe-route:
      action: change
      reason: Create the persistent native-turn mapping and finalized mirrored run
        insertion plus normal routing path.
  adoption-explicit-or-sessionend:
    mirrored-adoption-transition:
      action: change
      reason: Create join, explicit adopt, and Claude-only SessionEnd adoption
        lifecycle methods.
  run-blobs-off-db:
    store-schema-no-blobs:
      action: change
      reason: Add member custody and a compact native-turn-to-message dedupe table
        while continuing to keep event payloads out of SQLite.
  one-inflight-turn-per-member:
    inflight-guard:
      action: change
      reason: Add mirrored custody to the states that hold the FIFO.
  unix-socket-same-protocol:
    unix-websocket-listener:
      action: change
      reason: Dispatch join/adopt and session-keyed mirror lifecycle frames
        identically on Unix and network WebSockets.
