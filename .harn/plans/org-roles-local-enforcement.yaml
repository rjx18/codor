id: org-roles-local-enforcement
title: Enforce the protocol role matrix at every local human boundary
assumptions:
  retire: []
  create:
    - id: roles-gate-human-acts-not-agents
      title: Roles gate authenticated human acts rather than agent execution
      statement: Every network post, act, and mutating REST request must derive its
        human actor from the authenticated principal and enforce the PROTOCOL section
        1 observer, member, admin, and owner matrix, including targeted interaction
        answers, own-inbox read state, owner-only devices and role changes, and
        admin-authorized peer-to-room ledger writes, while internal agent execution
        remains governed by harness policy instead of a human role.
      reason: Client-supplied authors and a process-wide bearer previously acted as the
        owner everywhere, so schema roles existed without being an authorization
        boundary and any enrolled switchboard could write any home ledger.
      depends_on:
        - server-token-required
        - owner-and-system-members-seeded
        - interaction-state-machine-persisted
        - ledger-writes-audited-in-room
  reviewed:
    - id: server-token-required
      outcome: unchanged
      reason: Bearer authentication remains mandatory and now resolves a server-side
        principal before any room role is evaluated.
    - id: owner-and-system-members-seeded
      outcome: unchanged
      reason: The default token continues to resolve to each room's seeded owner.
    - id: interaction-state-machine-persisted
      outcome: unchanged
      reason: Role enforcement adds target validation without changing pending,
        answered, acknowledged, or orphaned persistence.
    - id: unpair-purges-all-browser-state
      outcome: unchanged
      reason: Revocation remains complete but is now restricted to an owner principal.
    - id: unix-socket-same-protocol
      outcome: unchanged
      reason: The private local socket keeps the same frames and resolves to the local
        operator owner rather than bypassing authorization dispatch.
    - id: ledger-writes-audited-in-room
      outcome: unchanged
      reason: Accepted writes retain their audit notice while unauthorized peers and
        authors fail before a vault mutation.
    - id: resident-attempt-journal-reconciles
      outcome: unchanged
      reason: A terminal per-RPC acknowledgement bounds completed home indexes only
        after the resident proves it received the final event acknowledgement.
    - id: client-syncs-by-seq
      outcome: unchanged
      reason: A non-cursor self-identity frame identifies the authenticated human while
        entity hydration and cursor commit semantics remain unchanged.
    - id: web-room-rail-creates-owner-room
      outcome: unchanged
      reason: Room creation stays functional for owners and is absent for lower roles.
    - id: web-settings-controls-preserve-product-truth
      outcome: unchanged
      reason: Existing controls retain their behavior but privileged controls are not
        rendered for roles that cannot invoke them.
    - id: web-room-visual-hierarchy-matches-glass-reference
      outcome: unchanged
      reason: Read-only and lower-role variants preserve the established glass room
        hierarchy while omitting unauthorized commands.
    - id: permalink-ids-stable
      outcome: unchanged
      reason: Principal checks wrap history endpoints and self identity state without
        changing stable message ids, pagination, or permalink resolution.
    - id: sw-caches-shell-only-no-message-data
      outcome: unchanged
      reason: Role-aware timeline commands remain memory-only and add no message or
        authorization data to the service-worker cache.
    - id: custody-uncertain-never-double-writes
      outcome: unchanged
      reason: The attach command remains truthful and is now shown only to an admin or owner.
    - id: run-context-selects-and-follows-live-evidence
      outcome: unchanged
      reason: Capability props pass through the context rail without altering selected-run
        evidence fetching or live follow behavior.
    - id: web-glass-theme-accessible-modes
      outcome: unchanged
      reason: The observer status bar uses the existing semantic glass tokens in both modes.
    - id: adapter-registry-sole-harness-source
      outcome: unchanged
      reason: The home residency launcher and resident outpost both consume the same validated
        adapter registry while the home gains its deferred transport wiring.
anchors:
  roles-gate-human-acts-not-agents:
    role-matrix-source:
      action: change
      reason: Implement one executable role matrix and principal-derived actor checks.
    role-matrix-integration:
      action: change
      reason: Exercise every act by every role plus target and device boundaries.
    role-aware-web-controls:
      action: change
      reason: Hide post, agent, room, brake, pairing, and device commands by self role.
  server-token-required:
    token-validation:
      action: change
      reason: Resolve valid tokens to principals without weakening fail-closed startup.
  unpair-purges-all-browser-state:
    device-revoke-rest:
      action: change
      reason: Require owner authority before subscription removal, revoke, and rekey.
    settings-unpair-action:
      action: change
      reason: Omit device revoke and unpair controls entirely for non-owner roles.
  unix-socket-same-protocol:
    unix-websocket-listener:
      action: change
      reason: Feed both TCP and trusted local sockets through principal-aware dispatch.
  ledger-writes-audited-in-room:
    ledger-change-audit:
      action: change
      reason: Reject remote writes unless peer, room, and attributed member are authorized.
  resident-attempt-journal-reconciles:
    resident-attempt-wal:
      action: change
      reason: Add terminal acknowledgement retries and backpressure-bounded home state.
  client-syncs-by-seq:
    store-upsert-in-place:
      action: change
      reason: Store the self identity frame outside the room change cursor.
  permalink-ids-stable:
    message-history-rest:
      action: change
      reason: Authorize history and search reads before preserving existing pagination.
    paged-message-cache:
      action: change
      reason: Store self identity beside, not inside, the stable message cache.
  sw-caches-shell-only-no-message-data:
    page-memory-message-cache:
      action: change
      reason: Hide answer controls by target while keeping the timeline memory-only.
  custody-uncertain-never-double-writes:
    attach-custody-web-hint:
      action: change
      reason: Restrict the attach command affordance to agent managers.
  run-context-selects-and-follows-live-evidence:
    selected-live-run-context:
      action: change
      reason: Pass agent-management capability through the unchanged run context rail.
  web-glass-theme-accessible-modes:
    semantic-glass-theme:
      action: change
      reason: Style the read-only role status with existing semantic mode tokens.
    glass-theme-regression:
      action: change
      reason: Wait for the authoritative owner role before exercising mobile Settings scroll.
  adapter-registry-sole-harness-source:
    registry-cli-composition:
      action: change
      reason: Compose optional home transport and residency from the already-loaded registry.
  web-room-rail-creates-owner-room:
    room-rail-create-action:
      action: change
      reason: Render Create room only for the authenticated owner.
  web-room-visual-hierarchy-matches-glass-reference:
    glass-room-visual-hierarchy:
      action: change
      reason: Pass role capabilities through the responsive room composition.
  web-shell-responsive-three-pane:
    responsive-room-shell:
      action: change
      reason: Preserve all pane variants while removing unauthorized rail commands.
  web-settings-controls-preserve-product-truth:
    glass-settings-surface:
      action: change
      reason: Keep truthful settings content while hiding mutating role-restricted controls.
  web-settings-desktop-focuses-one-category:
    focused-settings-category:
      action: change
      reason: Filter focused navigation and content to categories reachable by the role.
