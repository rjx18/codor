id: p3c1-guard-and-floors
title: V5 P3 closure 1/4 - a genuinely closed, property-scoped CSS/TSX token
  guard, the complete tokenisation of every raw value the real guard catches (17
  dirty regions, not 12), the closed-className TSX fixes, and the static 44px
  floors.
notes: >-
  First of four review-closure plans. Closes review blocker 1 (the guard is
  still

  open) and the CSS half of blocker 2 (sub-44 controls). No codor.service
  restart.


  CLOSED CSS GUARD (modeled on the hardened primitive guard in
  v5/primitives.spec):

  the room detector stops blacklisting bad values and instead CLASSIFIES EVERY

  declared property into exactly one discipline - paint / background / paint-

  shorthand / shadow / space / radius / type / motion / a closed layout-neutral

  allowlist - and REJECTS any unclassified property (so a raw colour can never
  ride

  in on scrollbar-color, -webkit-tap-highlight-color, caret-color,
  background-image

  or the like; scrollbar-color and -webkit-tap-highlight-color join paint,

  scrollbar-width joins layout-neutral). It fixes the five confirmed bypasses of
  the

  current detector: (1) colour is a CLOSED allowlist (token / safe keyword /

  color-mix over tokens), no named-colour blacklist; (2) it RECURSES into

  calc/min/max/clamp/env and checks each numeric leaf instead of stripping the

  function (the room legitimately uses env() for safe-area insets), so a raw
  10px

  hidden in calc/max is caught; (3) shadows must be fully token-composed - every

  offset/blur/spread a 0 or a token and the colour a token, so a raw
  2px/3px/12px

  ring beside a var() token fails; (4) motion rejects raw time in BOTH s and ms,
  the

  easing keywords (ease/ease-in/out/in-out/linear/step-start/step-end), steps()
  and

  raw cubic-bezier() unless a --cd-ease-* token; (5) a spacing leaf must be a

  --cd-space-* token or {0, auto} with NO generic % permission, and any
  surviving

  fixed-geometry exception is scoped to a specific SELECTOR + PROPERTY + VALUE
  (never

  a blanket set and never merely per-property), and outline-offset is classified
  as

  spacing. The full detector runs over EVERY room region (not 3), with

  negative fixtures for every former bypass (calc-hidden unit, token-bearing
  shadow

  ring, raw seconds, easing keyword, steps(), blanket 64px, outline-offset,
  unknown

  property, off-allowlist named colour, colour on scrollbar-color) plus positive

  fixtures (color-mix over tokens, max(token, env()), --cd-elevate-* shadow,

  tokenised animation).


  REAL DIRTY INVENTORY (closed detector, verified by a throwaway postcss probe
  that

  reproduced the old "12" exactly): 17 dirty, 4 clean. The 4 clean regions

  (composer-single-row, timeline-row-crush-resistance,
  control-fits-narrow-surface,

  effective-mention-style) are reviewed-only. 5 regions FLIP clean->dirty vs the
  old

  count, including two the old test claimed to guard: soft-editorial-room-style
  (37

  offenders incl. calc/max-hidden 10px, four token-bearing 3px shadow rings,

  outline-offset 2px, unclassified colour props), room-action-error-style (gap
  10px),

  channel-create-style (shadow 2px, outline-offset 3px, spacing/radius),

  spawn-dialog-style (padding 10px), channel-accent-rail (token-bearing 2px+4px

  shadow). Every raw value is resolved to a --cd-* token. Any surviving
  fixed-geometry

  exception is scoped to a specific SELECTOR + PROPERTY + VALUE (never a global
  set,

  never merely per-property) and only where the approved fixed shell geometry is

  explicitly named; other off-scale spacing aligns to the nearest existing
  --cd-space-*

  token, and shadow ring widths become a --cd-space-* token. Aligning controls
  onto the

  token scale means rendering is NOT byte-identical - MINOR visual alignment
  shifts on

  those controls are acknowledged rather than claimed away.


  CLOSED TSX GUARD: classFragments/tsxOffenders stop silently skipping
  non-literal

  className expressions and emit an offender for a bare identifier, a
  member/element

  (map/object) lookup, a call, or a non-literal template span (while explicitly

  permitting undefined/null empty branches so idiomatic `cond ? 'wr-x' :
  undefined`

  passes). The four current hard violations are rewritten to statically
  inspectable

  literal branches (EXPLICIT ternary/switch inside the existing anchors - never
  a

  class map, indexed lookup, helper call, or moved unanchored constant, since an

  indexed map is itself the uninspectable member-access the guard rejects):

  components.tsx:1142 (MemberRail - an inline ternary over the variant union
  yielding

  literal wr-member-rail-* classes, and dropping the open className passthrough
  for an

  enumerated prop), components.tsx:1436 (run.status - an inline ternary yielding

  literal is-* classes),

  shell.tsx:543 (tone -> a ternary whose branches are full literal classes),

  shell.tsx:669 (ContextRail - drop the open className passthrough for an
  enumerated

  prop). Closing the two passthrough props ripples to their literal call sites

  (shell.tsx:702, App.tsx:778/879), which switch to the enumerated prop.


  FLOORS (static, border-box >=44px, visible mark preserved): .wr-run-row-button

  42->44 and .wr-run-event-list li 42->44 (the li rule is in unanchored CSS),

  .wr-run-earlier 32->44, .wr-folder-row 42->44, .wr-folder-breadcrumb button

  32->44, .wr-preset-list button 34->44.


  Gate: build -> test (0 act warnings; the room guard spec is a unit spec with
  its

  new negative/positive fixtures) -> e2e -> harn check. p3c2 re-touches

  soft-editorial-room-style/-visual-hierarchy after this lands, so this commits

  first.
