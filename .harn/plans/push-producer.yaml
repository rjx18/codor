id: push-producer
title: P3.2b human-targeted switchboard push producer and device subscriptions
assumptions:
  retire: []
  create:
    - id: push-only-for-human-targeted-events
      title: Push production is limited to events requiring human attention
      statement: The switchboard must produce pushes only for unread human inbox
        deliveries, ask or approval cards targeting a human, turn or spend brake
        holds, and newly stalled runs, must select only active paired browser
        devices with registered subscriptions, and must make no relay request
        when relay_url is absent, because push is an optional human doorbell and
        never a transcript mirror or agent-event stream.
      reason: PLAN-M3 P3.2b and PRIVACY Tier 2 define the complete v1 push trigger
        allowlist and require the feature to disappear without relay
        configuration.
      depends_on:
        - relay-stateless-subscription-in-request
    - id: push-previews-redacted-pad-then-sealed
      title: Push previews are redacted and padded before room-key encryption
      statement: Each human-targeted event must become a preview with room, msg_id,
        kind, and at most 120 redaction-filtered characters, serialize with an
        authenticated length prefix into the smallest fitting 512 or 2048 byte
        bucket, then encrypt that complete padded bucket with libsodium
        XChaCha20- Poly1305 under the room key before the switchboard signs and
        sends the request, because the relay and browser push service may
        observe only fixed- bucket ciphertext and delivery metadata.
      reason: PLAN-M3 P3.2b, PRIVACY Tier 2, and the single-suite decision require
        redact then pad then seal, with no relay-side crypto.
      depends_on:
        - push-only-for-human-targeted-events
        - sealed-room-keys-per-enrollee
        - notify-signed-by-allowlisted-switchboard
  reviewed:
    - id: single-crypto-suite-libsodium
      outcome: unchanged
      reason: Producer encryption and signing use the existing sodium-native room key
        and Ed25519 identity without a WebCrypto or custom envelope variant.
    - id: redaction-before-fanout
      outcome: unchanged
      reason: Push previews call the same switchboard redaction filter before any
        truncation, padding, encryption, or network request.
    - id: stall-flags-never-kills
      outcome: unchanged
      reason: The existing watchdog still only flags stalled runs; it now also
        schedules a human notification without interrupting the member.
    - id: relay-opaque-forwarder-no-crypto
      outcome: unchanged
      reason: The relay byte ceiling is corrected for the nonce and AEAD tag around a
        2048-byte padded plaintext, but the relay still only validates size and
        forwards exact opaque bytes.
anchors:
  push-only-for-human-targeted-events:
    push-target-dispatch:
      action: change
      reason: Hook the exact inbox, ask/approval, brake-hold, and stall transitions
        and no other daemon events into the optional producer.
    paired-device-subscriptions:
      action: change
      reason: Persist full Web Push subscriptions only against active paired device
        ids and expose authenticated register/remove REST routes.
  push-previews-redacted-pad-then-sealed:
    producer-pad-seal-sign:
      action: change
      reason: Implement preview redaction/truncation, 512/2048 random padding,
        XChaCha20-Poly1305 sealing, canonical Ed25519 signing, and relay
        posting.
  stall-flags-never-kills:
    run-stall-watchdog:
      action: change
      reason: Schedule an optional human push when the existing non-killing stall flag
        is first applied.
files:
  - relay/src/seal.ts
  - relay/src/server.spec.ts
  - packages/switchboard/src/push/subscriptions.ts
  - packages/switchboard/src/push/producer.ts
