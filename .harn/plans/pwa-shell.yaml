id: pwa-shell
title: P3.1 responsive installable pocket PWA with an app-shell-only worker
assumptions:
  retire: []
  create:
    - id: sw-injectmanifest-owned-worker
      title: The PWA builds a source-owned service worker through injectManifest
      statement: The web production build must use vite-plugin-pwa in injectManifest
        mode to compile and register a service worker owned in the web source
        tree, with an installable mobile manifest and update lifecycle under
        Wireroom's control, because push decryption and notification actions
        must extend that same worker in P3.3 without replacing an autogenerated
        worker.
      reason: PLAN-M3 P3.1 and ARCHITECTURE Stack decisions pin injectManifest and a
        custom worker from the first PWA phase.
      depends_on: []
    - id: sw-caches-shell-only-no-message-data
      title: Offline storage contains the app shell and never room data
      statement: The service worker must precache only build-time app-shell assets and
        satisfy offline navigation from that shell, must register no runtime
        cache for REST, WebSocket, POST, message, or run data, and room messages
        must remain only in the page's bounded in-memory zustand state, because
        an offline reload may reveal the shell but must not persist readable
        room content in CacheStorage.
      reason: PLAN-M3 P3.1 and PRIVACY browser storage rules require an offline shell
        without turning the worker cache into another message store.
      depends_on:
        - sw-injectmanifest-owned-worker
  reviewed:
    - id: permalink-ids-stable
      outcome: unchanged
      reason: The timeline becomes responsive and mobile-scrollable while retaining
        the existing room-local ids, history merge behavior, and fragment
        targets.
    - id: spend-meter-always-on
      outcome: unchanged
      reason: The compact mobile header keeps the always-visible room turn, token, and
        cost meter while making room navigation thumb reachable.
    - id: implied-recipient-visible-before-send
      outcome: unchanged
      reason: The sticky mobile composer preserves the live recipient resolution
        indicator while enlarging controls to touch-safe dimensions.
    - id: extensions-not-addressable-v1
      outcome: unchanged
      reason: Compact mobile run cards preserve the existing nested extension
        rendering and never expose extension members as room recipients.
    - id: custody-uncertain-never-double-writes
      outcome: unchanged
      reason: Touch-safe member controls preserve the same custody gate and keep
        attach actions hidden for mirrored, dead, or uncertain sessions.
anchors:
  sw-injectmanifest-owned-worker:
    vite-pwa-owned-worker:
      action: change
      reason: Configure the install manifest, injectManifest source, registration,
        update behavior, and app icons in Vite.
    owned-worker-lifecycle:
      action: change
      reason: Add the source-owned worker lifecycle and Workbox precache manifest
        consumption that P3.3 will extend with push handling.
  sw-caches-shell-only-no-message-data:
    app-shell-precache-only:
      action: change
      reason: Precache only the injected build asset list and add no runtime routes
        for API, WebSocket, POST, messages, or run data.
    page-memory-message-cache:
      action: change
      reason: Keep the responsive timeline fed by the existing in-memory zustand
        snapshot and test that no rendered message content enters CacheStorage.
  permalink-ids-stable:
    message-history-surface:
      action: change
      reason: Reshape the room surface into a mobile drawer and fixed composer while
        preserving all history and permalink behavior.
    message-permalink-rendering:
      action: change
      reason: Give permanent message links touch-safe hit areas without changing their
        visible
  spend-meter-always-on:
    meter-settings-surface:
      action: change
      reason: Make the header compact and responsive without hiding usage metering.
  implied-recipient-visible-before-send:
    composer-implied-recipient:
      action: change
      reason: Make the composer sticky and touch-safe without changing recipient
        parsing or pre-send visibility.
  extensions-not-addressable-v1:
    extension-run-rendering:
      action: change
      reason: Make run expansion thumb-safe and visually compact while retaining the
        existing nested, non-addressable extension lifecycle.
  custody-uncertain-never-double-writes:
    attach-custody-web-hint:
      action: change
      reason: Enlarge the copy control inside the existing custody-safe attach hint
        without broadening when attach is offered.
