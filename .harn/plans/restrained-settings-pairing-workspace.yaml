id: restrained-settings-pairing-workspace
title: Implement restrained Settings and browser pairing
assumptions:
  retire:
    - id: web-settings-desktop-focuses-one-category
      reason: The focus behavior remains useful, but its v2 design-system dependency is
        superseded by the approved v4 row-based Settings workspace.
  create:
    - id: web-settings-pairing-match-restrained-reference
      title: Settings and pairing match the restrained operational references
      statement: Desktop Settings must use matte full-height room, category, and
        row-based detail panes while mobile Settings becomes one linear native-like
        scroll, and browser pairing must use a compact action-and-disclosure workspace
        with sparse functional glass and no marketing composition, because the approved
        v4 references require calm operational tools without inventing product behavior.
      reason: The operator approved the corrected v4 desktop/mobile Settings and pairing
        mockups for faithful implementation.
      depends_on:
        - restrained-design-system-guides-responsive-surfaces
        - web-settings-controls-preserve-product-truth
        - pairing-discloses-browser-and-relay-boundaries
        - pairing-offer-token-remains-qr-only
  reviewed:
    - id: restrained-design-system-guides-responsive-surfaces
      outcome: unchanged
      reason: The implementation consumes v4 panes, row geometry, tokens, and sparse glass.
    - id: web-settings-controls-preserve-product-truth
      outcome: unchanged
      reason: Existing theme, notification, brake, relay, device, and privacy handlers remain real.
    - id: web-theme-choice-stays-local
      outcome: unchanged
      reason: Only the visual treatment of the existing local segmented control changes.
    - id: unpair-purges-all-browser-state
      outcome: unchanged
      reason: Device actions and unpair error handling are restyled without changing purge logic.
    - id: pairing-discloses-browser-and-relay-boundaries
      outcome: unchanged
      reason: The two-column and linear layouts preserve the exact storage and relay disclosure.
    - id: pairing-offer-token-remains-qr-only
      outcome: unchanged
      reason: The enrollment route keeps all offer and bearer authority out of visible text.
    - id: web-glass-theme-accessible-modes
      outcome: unchanged
      reason: Settings and pairing use the same accessible neutral modes and functional fallback.
anchors:
  web-settings-desktop-focuses-one-category:
    focused-settings-category:
      action: remove
      reason: Replace the v2 category workspace marker with the v4 contract.
    focused-settings-regression:
      action: remove
      reason: Move focus and mobile-linear assertions under the v4 reference.
  web-settings-pairing-match-restrained-reference:
    restrained-settings-pairing-surface:
      action: change
      reason: Bind Settings and pairing render trees to the approved v4 hierarchy.
    restrained-settings-pairing-regression:
      action: change
      reason: Prove row-based panes, linear mobile fit, sparse glass, and honest copy.
  web-settings-controls-preserve-product-truth:
    glass-settings-surface:
      action: change
      reason: Reframe real controls without changing their handlers or promises.
    glass-settings-regression:
      action: change
      reason: Extend behavioral coverage with restrained computed-style assertions.
  web-theme-choice-stays-local:
    settings-theme-control:
      action: change
      reason: Restyle the same system, dark, and light segmented control.
  unpair-purges-all-browser-state:
    settings-unpair-action:
      action: change
      reason: Reflow device and unpair rows without changing remote revoke or local purge.
  pairing-discloses-browser-and-relay-boundaries:
    pairing-boundary-workspace:
      action: change
      reason: Present the exact boundary as plain rows in desktop and mobile layouts.
  pairing-offer-token-remains-qr-only:
    glass-pairing-surface:
      action: change
      reason: Simplify pairing composition while keeping offer authority non-textual.
  web-glass-theme-accessible-modes:
    semantic-glass-theme:
      action: change
      reason: Apply the same restrained pane and functional-glass rules to these routes.
files:
  - packages/web/src/SettingsPage.tsx
  - packages/web/src/pairing.tsx
  - packages/web/src/styles.css
  - packages/web/tests/crypto.e2e.spec.ts
  - packages/web/tests/e2e.spec.ts
  - packages/web/tests/m3-acceptance.e2e.spec.ts
  - tmp/build/PROGRESS.md
