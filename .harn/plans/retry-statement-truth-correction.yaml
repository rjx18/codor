id: retry-statement-truth-correction
title: Correct the retry assumption truth to carry the auto-revive clause.
notes: "Bookkeeping correction, no behavior change. The run-retry round
  implemented (and fable approved) auto-revive: a failed run leaves its author
  dead, so retryRun revives the agent before redelivering - otherwise the
  re-queue can never run and \"retry a failed run\" is fiction. The plan's
  created statement predates that decision, so the recorded truth lacks the
  clause the code and tests enforce. The stale assumption retires and the
  contract returns under retried-runs-revive-and-redeliver with the clause. The
  only source change is the two anchor comment lines in daemon.ts renaming the
  assumption id; the anchor ref (retry-run-contract) and the code are
  untouched."
assumptions:
  retire:
    - id: retried-runs-are-fresh-deliveries
      reason: The statement predates the approved auto-revive behavior; the contract
        continues under retried-runs-revive-and-redeliver with the clause
        included.
  create:
    - id: retried-runs-revive-and-redeliver
      title: Retrying a terminal failed or interrupted run revives its dead author if
        needed and re-queues its surviving bound deliveries into a new run
      statement: retry_run applies only to run-kind messages in failed or interrupted
        status and only for human owners or admins; it revives the run's author
        when a failed run left that agent dead (an unmodified reviveMember call
        at the same admin gate level), then re-queues the deliveries bound to
        that run through the ordinary redeliver path, skipping deliveries whose
        trigger message was deleted and refusing when none survive, so the agent
        receives the same instructions as a fresh turn producing a new run
        message while the original failed run remains in history unchanged.
      reason: "Truth correction: auto-revive is what makes retrying a failed run real;
        the recorded statement must say so."
      depends_on: []
files:
  - packages/switchboard/src/daemon.ts
anchors:
  retried-runs-are-fresh-deliveries:
    retry-run-contract:
      action: remove
      reason: The old-id anchor comments disappear as they rename to the recreated
        assumption; the code inside is untouched.
  retried-runs-revive-and-redeliver:
    retry-run-contract:
      action: change
      reason: The anchor comment lines in daemon.ts rename the assumption id to the
        recreated one; the code inside is untouched.
