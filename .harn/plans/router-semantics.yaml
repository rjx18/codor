id: router-semantics
title: P0.5 pure router - eligibility, grammar, recipients, payloads, brakes
assumptions:
  retire: []
  create:
    - id: routing-eligibility-gate
      title: Only human/agent/bridge chat and finalized runs ever route
      statement: The router must route only chat messages authored by human, agent,
        or bridge members and run messages whose status is no longer running,
        and must never route system messages, ask/approval cards, anything
        authored by the system member, or chat replies to a card (audit
        replies), because a routed message queues an agent turn and none of
        those sources may ever trigger one.
      reason: "PROTOCOL SS3 'routing eligibility comes first'; P0.8 posts cards,
        audit replies, and system notices through the same store, so the gate
        is the only thing standing between them and runaway turns."
      depends_on: []
    - id: whole-message-delivery
      title: Every recipient receives the identical full message payload
      statement: Fan-out must produce one delivery payload per recipient that is
        byte-identical across recipients except for the you= field - the full
        body plus all resolved references, never per-mention segments - because
        messages have cross-recipient dependencies and agents are trusted to
        read the whole message like humans in a group chat.
      reason: PROTOCOL SS3 rule 5 and invariant 1; P0.8 delivers these payloads
        verbatim and the acceptance transcript asserts their shape.
      depends_on: []
    - id: delivery-payload-template-exact
      title: The delivery payload template is pinned byte-exact
      statement: "composePayload must emit exactly the pinned template: a two-line
        wireroom header (room, msg id, from with author kind, to list, you),
        blank line, full body, one referenced block per ref (id, author handle,
        minute-precision UTC ts, verbatim body with run refs using final_text,
        closed by end reference), and the optional single-line conventions
        trailer, because sessions parse and pay tokens for every byte and the
        goldens in router.spec.ts are the normative shape."
      reason: PROTOCOL SS3 delivery payload section; changing a byte changes what
        every agent in every room sees and invalidates the payload goldens.
      depends_on:
        - whole-message-delivery
    - id: default-recipient-latest-finalized
      title: Mentionless defaults - latest FINALIZED agent for humans, trigger author for agents
      statement: A human- or bridge-authored message with zero valid mentions must
        default to the author of the latest FINALIZED agent message (running
        placeholders never count; none ever finished means room commentary
        delivered to nobody), and an agent-authored message must default to the
        author of the delivery that triggered its run (the LAST delivery of a
        batch), because untargeted replies must flow back to whoever is
        actually in the conversation, not to a still-running placeholder.
      reason: PROTOCOL SS3 rule 4 as amended by codex pass-2 (latest-FINALIZED);
        P0.8 supplies trigger context per run, so both sides depend on this
        exact rule.
      depends_on: []
    - id: human-deliveries-are-inbox-records
      title: Humans get inbox records, never turns
      statement: resolveRecipients must split recipients into agents and humans and
        human recipients must never produce an adapter turn - the daemon
        materializes them as inbox records with read lifecycle - because humans
        answer on their own time and a turn at a human is meaningless.
      reason: PROTOCOL SS1 humans-are-members; P0.8 fans humans out as WS inbox
        frames + unread counts and the humans-never-turn spec pins it.
      depends_on: []
    - id: brakes-opt-in-hold
      title: Brakes hold deliveries only when explicitly configured
      statement: evaluateBrakes must return hold only when the room explicitly set
        turn_brake (consecutive agent-to-agent deliveries with no human message
        reaching the limit) or spend_brake_usd (daily cost reaching the
        threshold), and must never hold with the default null config, because
        agent chains run until the work is done by default and a hold is an
        opt-in checkpoint, not a leash.
      reason: PROTOCOL SS3 visibility-and-brakes; depends on brakes-default-off
        schema defaults; P0.8 turns hold=true into held deliveries + system
        message + push.
      depends_on:
        - brakes-default-off
  reviewed:
    - id: mention-spans-survive-renames
      outcome: unchanged
      reason: parseBody produces exactly these spans (member ids + offsets) as its
        mention output; the schema contract is consumed, not changed.
    - id: reserved-handles-rejected
      outcome: unchanged
      reason: The parser treats reserved tokens as plain text (never addressable,
        never unresolved-typo) consistent with the schema-level reservation.
anchors:
  routing-eligibility-gate:
    eligibility-gate:
      action: change
      reason: Create isRoutable in router.ts - the gate every message passes before
        any recipient work.
  whole-message-delivery:
    payload-fanout:
      action: change
      reason: Create composeDeliveryPayloads fan-out producing identical payloads
        differing only in you=.
  delivery-payload-template-exact:
    payload-template:
      action: change
      reason: Create composePayload with the pinned byte-exact template.
  default-recipient-latest-finalized:
    default-recipient:
      action: change
      reason: Create the mentionless-default logic in resolveRecipients.
  human-deliveries-are-inbox-records:
    recipient-split:
      action: change
      reason: Create the agents/humans split in resolveRecipients.
  brakes-opt-in-hold:
    brake-evaluation:
      action: change
      reason: Create evaluateBrakes over RoomConfig + chain stats.
files:
  - packages/switchboard/src/index.ts
  - packages/switchboard/src/router.ts
  - packages/switchboard/src/router.spec.ts
