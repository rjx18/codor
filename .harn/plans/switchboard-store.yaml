id: switchboard-store
title: P0.4 switchboard store - sqlite room store with change log
assumptions:
  retire: []
  create:
    - id: run-blobs-off-db
      title: Run event streams live on disk, never in sqlite
      statement: The store must persist run messages with only the
        RunSummary.events_ref path pointer and must have no table or column
        holding run event payloads, because run streams are unbounded JSONL
        blobs journaled by the daemon on disk and the DB must stay small with
        one-message-per-run structural.
      reason: ARCHITECTURE room-store pins JSONL blobs on disk; P0.8 journals events
        and reconciles against the blob, so moving events into the DB changes
        crash reconcile and storage shape for every consumer.
      depends_on: []
    - id: message-id-txn-allocation
      title: Message ids allocate dense and monotonic inside the insert transaction
      statement: Message ids must be computed per-room (MAX+1) and assigned INSIDE the
        same synchronous store transaction that inserts the row, because
        PROTOCOL invariant 2 makes ids dense, monotonic, and permanent (#N refs)
        and allocation outside the transaction could race or leave gaps.
      reason: PLAN-M0 P0.4; the router, refs, and acceptance assertions all point at
      depends_on: []
    - id: owner-and-system-members-seeded
      title: Room creation seeds the owner human and the system member atomically
      statement: createRoom must atomically seed BOTH the owner human member (role
        owner, the authenticated principal's author identity) and the
        non-addressable system member holding the reserved handle switchboard,
        because system messages need an author from the first message on and
        deliveries to humans need the owner row to exist before any routing.
      reason: PLAN-M0 P0.4 and PROTOCOL SS1; P0.5 eligibility (system never routes)
        and P0.8 auth-principal mapping both assume these two rows exist in
        every room.
      depends_on:
        - reserved-handles-rejected
    - id: changelog-covers-every-visible-entity
      title: Every client-visible mutation appends exactly one change-log row
      statement: Every store mutation of a client-visible entity - message insert and
        in-place finalize, member create/update, human inbox record create/read,
        meter upsert, room create/config change - must append exactly one
        changes(room_id, seq, entity, entity_id) row with a per-room monotonic
        seq allocated in the same transaction, because sync hydrates exclusively
        from this log and a missed append is an invisible client desync.
      reason: PLAN-M0 P0.4; builds directly on changelog-is-sync-cursor; P0.8 fanout
        and P0.9 delta-sync read only this log.
      depends_on:
        - changelog-is-sync-cursor
  reviewed:
    - id: changelog-is-sync-cursor
      outcome: unchanged
      reason: The store implements this contract physically (changes table + per-room
        seq) without altering the schema-level cursor semantics.
    - id: interaction-state-machine-persisted
      outcome: unchanged
      reason: pending_interactions persists exactly the schema's state machine
        columns; no semantic change.
    - id: mention-spans-survive-renames
      outcome: unchanged
      reason: Mentions are stored as span JSON verbatim from the schema; the store
        never persists handle text for mentions.
anchors:
  run-blobs-off-db:
    store-schema-no-blobs:
      action: change
      reason: Create the sqlite DDL - messages persist events_ref only, no event
        payload storage anywhere.
  message-id-txn-allocation:
    message-id-allocation:
      action: change
      reason: Create postMessage with in-transaction MAX+1 id allocation.
  owner-and-system-members-seeded:
    room-seeding:
      action: change
      reason: Create createRoom seeding owner human + system member atomically.
  changelog-covers-every-visible-entity:
    changelog-append:
      action: change
      reason: Create the internal appendChange used by every mutating method.
files:
