id: u1-fresh-default
title: U1 route fresh-channel drafts to the effective default agent
assumptions:
  retire:
    - id: default-recipient-latest-substantive
      reason: Mentionless routing now has starting-agent and sole-live-agent fallbacks
        when no substantive agent turn has finalized.
    - id: literal-draft-recipient-visible-before-send
      reason: The literal draft destination now materializes the full effective
        default chain rather than only a finalized-agent default.
  create:
    - id: channel-starting-agent-handle-persisted
      title: Channels persist the starting agent handle
      statement: A channel created with a starting agent must persist that requested
        handle in RoomConfig before the spawn attempt, because fresh-channel
        routing needs a stable preferred handle even when creation and adapter
        startup complete in separate steps.
      reason: R7 requires the starting agent to be a well-defined first fallback.
      depends_on:
        - channel-create-request-contract
        - channel-creation-derived-and-seeded
    - id: default-recipient-fallback-chain
      title: Mentionless human messages use one effective default chain
      statement: A mentionless human or bridge message must prefer the latest
        finalized non-ack active agent, then the configured starting agent when
        live, then the sole live agent, and otherwise remain commentary, while
        agent replies still prefer their trigger author and running or
        acknowledgement runs never become substantive defaults, because fresh
        channels need a reachable recipient without changing established
        turn-chain precedence.
      reason: R7 fixes the first-run dead end while preserving substantive and
        acknowledgement routing rules.
      depends_on:
        - channel-starting-agent-handle-persisted
        - substantive-routing-excludes-acknowledgements
        - removed-members-remain-attribution-tombstones
    - id: literal-draft-effective-recipient-visible
      title: The composer materializes the effective default before send
      statement: The composer must materialize the effective default agent as one
        editable literal @handle mention on the first non-@ input into an empty
        draft, never reinsert it within that draft after deletion, retain the
        parser-backed keyboard and touch mention popup, and show a no-recipient
        hint only for a nonempty draft that would truly route to nobody, because
        the operator must see and control the exact routing outcome before
        sending.
      reason: R7 makes the server fallback visible and restores an honest commentary
        warning only when needed.
      depends_on:
        - default-recipient-fallback-chain
        - body-parser-shared-across-router-and-web
        - removed-members-remain-attribution-tombstones
  reviewed:
    - id: substantive-routing-excludes-acknowledgements
      outcome: unchanged
      reason: Running placeholders and exact acknowledgement completions remain
        excluded from substantive routing and defaults.
    - id: channel-create-request-contract
      outcome: unchanged
      reason: The existing optional starting-agent request supplies the handle
        persisted into additive room metadata.
    - id: channel-creation-derived-and-seeded
      outcome: unchanged
      reason: Creation still derives and seeds the channel before attempting the
        optional adapter spawn.
    - id: body-parser-shared-across-router-and-web
      outcome: unchanged
      reason: The commentary hint uses the shared parser to match server recipient
        resolution.
    - id: removed-members-remain-attribution-tombstones
      outcome: unchanged
      reason: Removed agents remain historical only and are excluded from both
        fallback and popup candidates.
    - id: client-syncs-by-seq
      outcome: unchanged
      reason: The client still upserts frames and caches finalized substantive author
        identity by sequence.
    - id: roles-gate-human-acts-not-agents
      outcome: unchanged
      reason: App passes only already-authorized room state into the composer; posting
        permissions do not change.
    - id: human-facing-surfaces-call-rooms-channels
      outcome: unchanged
      reason: New visible copy continues to use channel terminology.
    - id: web-room-visual-hierarchy-matches-restrained-reference
      outcome: unchanged
      reason: The existing shell hierarchy is preserved while its composer receives
        the effective default.
    - id: web-glass-theme-accessible-modes
      outcome: unchanged
      reason: The inline commentary hint uses existing semantic theme tokens and focus
        behavior.
