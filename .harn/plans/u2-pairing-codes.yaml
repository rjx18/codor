      action: change
      reason: Keep exact QR/link output while inserting the separate code line.
    pairing-qr-regression:
      action: change
      reason: Update output positions and prove the QR payload remains exact.
  adapter-registry-sole-harness-source:
    registry-cli-composition:
      action: change
      reason: Review the byte-identical downstream CLI registry regression that Harn
        classifies as touched by the required pairing-output test insertion.
  unpaired-browser-always-has-enrollment-path:
    unpaired-pairing-workspace:
      action: change
      reason: Add code entry while preserving trusted progress and link fallback.
    pairing-gate-browser-regression:
      action: change
      reason: Update the unpaired-screen regression for code-first ordering.
  pairing-offer-token-remains-qr-only:
    glass-pairing-surface:
      action: change
      reason: Exchange codes without rendering the returned token.
    pairing-token-visibility-regression:
      action: change
      reason: Verify both code and Settings flows keep token authority invisible.
  pairing-discloses-browser-and-relay-boundaries:
    pairing-boundary-workspace:
      action: change
