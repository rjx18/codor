    pairing-code-redaction-regression:
      action: change
      reason: Prove synthetic codes are removed from text and nested payloads, and
        prove as a property that UUID and ULID identifiers and ordinary
        hyphenated prose survive the projection byte-identical.
    pairing-code-selfhost-docs:
      action: change
      reason: Document entropy, expiry, burn, normalization, and rate limiting.
  redaction-before-fanout:
