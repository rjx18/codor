id: v5-p1-token-layer
title: V5 Phase 1 - stand up the soft-editorial token layer and open a fresh
  browser in light, without restyling a single consumer
assumptions:
  create:
    - id: soft-editorial-design-system-guides-responsive-surfaces
      title: Surfaces migrated to v5 derive from the soft-editorial design system
      statement: Every Codor web surface or forward-looking native concept migrated to
        v5 must derive its visual hierarchy, semantic colour, typography,
        spacing, radius, elevation, responsive layout, accessibility and motion
        from the v5 soft-editorial design system and the tracked contract that
        states it, because the product must read as a calm editorial tool -
        warm, rounded, generous with type, content before chrome - and a
        direction that lives only in a mockup is a direction the next
        contributor cannot follow. Surfaces and concepts not yet migrated
        continue to derive from the v4 restrained system, so the two foundations
        coexist for the length of the migration and nothing answers to both at
        once.
      reason: Scoped to migrated surfaces on purpose. A blanket claim that the app
        derives from v5 would be false the moment it was created - Phase 1
        restyles nothing, and the restrained foundation stays active until Phase
        6, by which time the last surface that depends on it has moved. The v4
        contract forbids exactly what v5 requires - it rules out floating cards
        and mandates full-height matte panes and compact system type - so the
        foundation is replaced rather than amended, but the replacement takes
        effect surface by surface.
      depends_on: []
    - id: web-theme-accessible-modes
      title: The theme layer offers accessible light and dark modes
      statement: The web theme layer must offer semantic light and dark tokens that
        hold AA-readable contrast for every text and status role on every
        surface that role is legal on, keep keyboard focus visible, fall back to
        opaque colour wherever transparency is unavailable or reduced, and
        disable nonessential movement for reduced-motion users, because
        accessibility must be a property of the token layer itself rather than
        something each surface is trusted to rediscover. A role reserved for
        decoration is not a text role and carries no contrast promise; it must
        never be spent on text.
      reason: Replaces web-glass-theme-accessible-modes, whose statement requires
        "glass tokens" - a material v5 does not use. Its four obligations carry
        forward unchanged; only the material and the vocabulary move. The
        statement says the layer OFFERS accessible tokens because Phase 1 is
        inert and no surface consumes them yet; consumption becomes true in
        Phase 3 and is reviewed there. The final clause exists because v5 keeps
        exactly one decorative role, --cd-mark-faint, for separator rules,
        disabled glyphs and ornamental borders. An axe scan of the shipped v4 UI
        found contrast failures of exactly two kinds, and both are the same
        underlying mistake - a colour spent as text on a surface it cannot hold
        4.5:1 against. The faint neutral was one; a semantic status colour,
        light emerald, was the other. Both are repaired at the token in Phase
        0a, and v5 prevents the recurrence structurally by making every text and
        status role clear 4.5 on every surface it is legal on, and by reserving
        exactly one role for decoration that may never be spent on text.
      depends_on:
        - soft-editorial-design-system-guides-responsive-surfaces
    - id: web-theme-choice-stays-local-v5
      title: A theme choice never leaves the browser that made it
      statement: A theme choice must be stored on the browser that made it, applied
        immediately, survive reload, be offered in Settings as system, light or
        dark, and be purged with the rest of this browser's state when the
        browser is unpaired, because the theme is a preference of the device in
        front of the operator and never an account fact the product keeps about
        them.
      reason: Replaces web-theme-choice-stays-local, unchanged in substance. It moves
        only because its dependency does - it hung off the glass theme, retired
        in Phase 3 - and Harn has no rewrite action. Its non-design dependency
        on unpair-purges-all-browser-state is preserved.
      depends_on:
        - web-theme-accessible-modes
        - unpair-purges-all-browser-state
    - id: web-first-run-color-mode-is-light
      title: A fresh browser opens Codor in light
      statement: A browser with no stored theme choice must paint the light palette
        before React renders, while an explicit system or dark choice remains
        local, immediate, persistent and available in Settings, because the v5
        identity is a warm editorial surface that reads as paper rather than as
        a control room - and because a first paint that disagrees with the
        resolved choice is a flash the operator sees every single time they open
        the app.
      reason: Replaces web-first-run-color-mode-is-dark. Dark-first was part of the v4
        identity; v5 leads in light, and Richard chose light-first explicitly.
        Control is not removed - system and dark remain, and the choice stays
        local. Painting before React renders is why the stylesheet's base :root
        block becomes the light palette, with dark moving to an explicit
        prefers-color-scheme block and the data-theme='dark' block; today :root
        is dark, so a light default would flash dark then light on every load.
      depends_on:
        - web-theme-choice-stays-local-v5
  retire:
    - id: web-first-run-color-mode-is-dark
      reason: Superseded by web-first-run-color-mode-is-light. Nothing depends on it.
    - id: web-theme-choice-stays-local
      reason: Superseded by web-theme-choice-stays-local-v5, which carries the same
        statement and preserves unpair-purges-all-browser-state. Its only
        dependent, web-first-run-color-mode-is-dark, is retired in this same
        plan.
  reviewed:
    - id: web-glass-theme-accessible-modes
      outcome: unchanged
      reason: "Still true and still active - every surface still consumes the glass
        tokens, because this phase repoints no consumer. Its token block gains
        the --cd-* layer beside the existing tokens and is restructured so the
        base block is light rather than dark, with every existing token keeping
        its value in every theme. The two grey pseudo-colour names are renamed
        to the neutral roles they actually fill. It also gains the axe gate: the
        accessibility contract that is live today is the one that should own the
        scan of the UI that is live today. Both the assumption and the gate move
        to web-theme-accessible-modes in Phase 3. The visual baseline for this
        phase is commit 95d6609 - Phase 0a, not Phase 0, because 0a deliberately
        moved three token values to hold AA. Forcing light and forcing dark must
        render pixel-identical to it, since this phase repoints no consumer; the
        only two visual changes permitted are a fresh unstored profile resolving
        to light instead of dark, and the browser chrome that follows it."
    - id: design-references-preserve-wireroom-semantics
      outcome: unchanged
      reason: Unchanged and deliberately not retired - it binds the v5 references
        exactly as it binds the v4 ones. It gains an anchor over the new v5
        contract, so the tracked references must keep depicting the real
        one-member run model, permanent message ids, visible meters, recipient
        preview, role and brake rules, the accountless local product, the
        browser privacy boundary and stateless push, without inventing
        orchestration, retention, account or relay behaviour.
    - id: sw-injectmanifest-owned-worker
      outcome: unchanged
      reason: The worker is still the one Vite owns and injects. Two font assets enter
        its precache so the installed app renders its own typeface with no
        network, and the manifest colours move to the light canvas now that a
        fresh browser opens light. Nothing about the worker's lifecycle or
        ownership changes.
    - id: web-spawn-dialog-exposes-canonical-agent-controls
      outcome: unchanged
      reason: The spawn dialog is untouched. One rule inside its style region spends a
        renamed pseudo-colour token, at the identical computed value.
    - id: normalized-run-items-presented-live
      outcome: unchanged
      reason: Run presentation is untouched. Two rules inside its style region spend a
        renamed pseudo-colour token, at the identical computed value.
    - id: normalized-run-evidence-inspector
      outcome: unchanged
      reason: The evidence inspector is untouched. Two rules inside its style region
        spend a renamed pseudo-colour token, at the identical computed value.
    - id: web-motion-is-purposeful-and-reduced-motion-safe
      outcome: unchanged
      reason: Motion is untouched. One rule inside its style region spends a renamed
        pseudo-colour token, at the identical computed value.
    - id: pairing-code-enrollment-surfaces
      outcome: unchanged
      reason: Pairing enrollment is untouched. Two rules inside its style region spend
        a renamed pseudo-colour token, at the identical computed value.
    - id: web-waits-are-visible-across-live-surfaces
      outcome: unchanged
      reason: Live waits are untouched. One rule inside its style region spends a
        renamed pseudo-colour token, at the identical computed value.
    - id: posted-message-mentions-alone-look-effective
      outcome: unchanged
      reason: Mention rendering is untouched. Two rules inside its style region spend
        a renamed pseudo-colour token, at the identical computed value.
    - id: web-room-visual-hierarchy-matches-restrained-reference
      outcome: unchanged
      reason: The restrained visual hierarchy is untouched - no matte pane, glass
        surface or pinned turn changes. Its regression opens with no stored
        theme and asserts the drawer's dark glass material, which was correct
        only because dark was the default; this phase makes light the default,
        so with nothing stored the drawer now renders the light glass and the
        assertion fails on a colour it never meant to pin. The regression is
        forced to dark before its first navigation, so it keeps asserting the
        exact v4 material contract it was written for. The new light default is
        owned and proven by light-first-theme-regression, not by this test.
