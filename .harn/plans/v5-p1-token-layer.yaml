anchors:
  web-first-run-color-mode-is-dark:
    dark-first-theme-choice:
      action: remove
      reason: The dark-first default goes with the assumption; theme.ts resolves an
        unstored choice to light under the replacement's anchor.
    dark-first-theme-regression:
      action: remove
      reason: The regression proving a fresh browser opens dark is replaced by one
        proving it opens light, under the replacement's anchor in the same file.
  web-theme-choice-stays-local:
    local-theme-preference:
      action: remove
      reason: Storage and apply behaviour is unchanged; the anchor moves onto
        web-theme-choice-stays-local-v5 over the same region of theme.ts.
    settings-theme-control:
      action: remove
      reason: Settings still offers system, light and dark; only the assumption it
        hangs off is replaced. The anchor moves to the replacement.
    theme-choice-regression:
      action: remove
      reason: The regression is unchanged; its anchor moves to the replacement.
  soft-editorial-design-system-guides-responsive-surfaces:
    soft-editorial-responsive-contract:
      action: change
      reason: The v5 contract states the system every later phase derives from -
        surfaces, the four-step text ramp, the decorative-only mark-faint role,
        one semantic token per role per theme with its measured ratio, radius,
        type, elevation, spacing, breakpoints, motion, the mobile exceptions and
        the channel-accent projection rule. It is tracked under
        tmp/build/design/v5 beside the v4 contract, which is force tracked
        despite tmp being ignored, because a design contract that is not in the
        repository cannot be Harn truth.
  design-references-preserve-wireroom-semantics:
    v5-product-fidelity:
      action: change
      reason: The product-fidelity constraint that governs the v4 references is placed
        over the v5 ones. The tracked references must depict the protocol the
        product actually has, and must not invent orchestration, retention,
        account or relay behaviour that a mockup can make look real.
  web-theme-accessible-modes:
    soft-editorial-token-layer:
      action: change
      reason: Declare the v5 token layer - radius, spacing, type scale, font,
        elevation, z-index and both semantic palettes - beside the existing
        tokens, consumed by nothing. Every text and status role clears 4.5:1 on
        every surface it is legal on, including each role's own tinted fill;
        because 4.5 implies 3, those roles need no separate mark token. The
        single exception is --cd-mark-faint, which is decorative only -
        separator rules, disabled glyphs, ornamental borders - carries no
        contrast promise and must never be spent on text. Declaring the layer
        without repointing a consumer is what lets this phase restyle nothing.
    token-resolution-regression:
      action: change
      reason: Replace the regex CSS scan with structured parsing - postcss for the
        stylesheet and postcss-value-parser for values, both added as direct
        devDependencies rather than borrowed transitively - so a declaration
        inside a comment or a string can no longer satisfy a reference. Every
        var() must resolve through the declaration and alias graph or carry a
        fallback, walked transitively so a dead or recursive alias fails.
        Fixtures cover the commented-out declaration and the in-string
        declaration that the regex scan would have accepted.
    theme-contrast-matrix:
      action: change
      reason: "Assert the measured contract: every v5 text and status role against
        every surface it is legal on, in both themes, including tinted fills -
        and assert that --cd-mark-faint is never spent as a text colour."
  web-first-run-color-mode-is-light:
    light-first-theme-choice:
      action: change
      reason: A browser with no stored choice resolves to light. The base :root block
        becomes the light palette so the first paint is light before React runs,
        with dark moving to an explicit prefers-color-scheme block and the
        data-theme='dark' block. A system choice still follows the operating
        system in both directions.
    light-first-theme-regression:
      action: change
      reason: Prove a fresh profile paints light, that the paint precedes React rather
        than flashing, and that an explicit dark or system choice still wins.
  web-theme-choice-stays-local-v5:
    local-theme-preference:
      action: change
      reason: The choice is read from and written to this browser's storage and
        applied by setting data-theme, unchanged in substance. The anchor moves
        off the retired assumption onto its replacement.
    settings-theme-control:
      action: change
      reason: Settings still offers system, light and dark, unchanged. The anchor
        moves onto the replacement.
    theme-choice-regression:
      action: change
      reason: The regression that the choice is stored locally, applied immediately,
        survives reload and is purged on unpair is unchanged. Its anchor moves
        onto the replacement.
  web-glass-theme-accessible-modes:
    semantic-glass-theme:
      action: change
      reason: "The existing token block gains the --cd-* layer beside it and is
        restructured so the base block is light rather than dark; every existing
        token keeps its value in every theme. The two grey pseudo-colour names
        are renamed to the neutral roles they actually fill. --wr-cyan and
        --wr-violet are both #a0a2a9 in dark and #4e5156 in light - the same
        neutral, never a hue - so both collapse into --wr-neutral-strong, and
        --wr-cyan-soft becomes --wr-neutral-soft. That is 61 cyan and 4 violet
        exact references, 9 soft references, and 6 primary and 3 soft
        declarations. Renaming now, while nothing else moves, is what keeps the
        Phase 3 diff readable: 61 call sites quietly rely on --wr-cyan being
        neutral and would light up the moment it was given a hue. A grep gate
        asserts no legacy pseudo-colour name survives anywhere in the package.
        Every token keeps the value Phase 0a left it with."
    axe-accessibility-gate:
      action: change
      reason: "Install the axe scan as an exact zero-violation gate with no waivers
        and no allowlist, over the same twenty-five states in both themes that
        the read-only inventory covered: the room at baseline, with history and
        a pending ask, offline, read-only, searching, with the inbox open, and
        with the mention popup open; the spawn, create-channel, folder-picker
        and remove-member dialogs; the mobile drawer and the mobile context
        sheet; the ledger graph with a docked inspector, with an overlay
        inspector, and with a note dialog; all six settings categories; pairing;
        and finally the two states that mutate the room - a held delivery and a
        bridged channel - each of which needs a fresh room to reach. The gate
        can be exact because Phase 0a repaired all six violation classes that
        inventory found. A gate that ships with a waiver teaches the next
        contributor that the waiver list is where failures go, and a gate that
        only visits the states nobody broke is not a gate at all: two of those
        six classes were invisible until the removal dialog and the ledger graph
        were actually driven."
  sw-injectmanifest-owned-worker:
    vite-pwa-owned-worker:
      action: change
      reason: Precache Geist-Variable.woff2 and GeistMono-Variable.woff2 so the
        installed app renders its own typeface with no network, and move the
        manifest colours to the light canvas now that a fresh browser opens
        light.
    offline-font-regression:
      action: change
      reason: Prove both font assets are present in CacheStorage, that
        document.fonts.load resolves for Geist and Geist Mono with the network
        offline, and that the FontFaceSet holds loaded faces for both families -
        cache presence alone would not prove the @font-face rules point at the
        precached assets.
  web-spawn-dialog-exposes-canonical-agent-controls:
    spawn-dialog-style:
      action: change
      reason: One rule spends the renamed neutral token, at the identical computed
        value.
  normalized-run-items-presented-live:
    run-stream-responsive-style:
      action: change
      reason: Two rules spend the renamed neutral token, at the identical computed
        value.
  normalized-run-evidence-inspector:
    inspector-contained-scroll:
      action: change
      reason: Two rules spend the renamed neutral token, at the identical computed
        value.
  web-motion-is-purposeful-and-reduced-motion-safe:
    motion-token-style:
      action: change
      reason: One rule spends the renamed neutral token, at the identical computed
        value.
  pairing-code-enrollment-surfaces:
    pairing-code-surface-style:
      action: change
      reason: Two rules spend the renamed neutral token, at the identical computed
        value.
  web-waits-are-visible-across-live-surfaces:
    live-collaboration-style:
      action: change
      reason: One rule spends the renamed neutral token, at the identical computed
        value.
  posted-message-mentions-alone-look-effective:
    effective-mention-style:
      action: change
      reason: Two rules spend the renamed neutral token, at the identical computed
        value.
  web-room-visual-hierarchy-matches-restrained-reference:
    restrained-room-visual-regression:
      action: change
      reason: Force the theme to dark before the regression's first navigation, so it
        asserts the dark glass material it was written to check rather than
        whatever the default now resolves to. The material contract - matte
        panes, sparse functional glass, a pinned latest turn - is unchanged;
        only the test's implicit reliance on dark-being-the-default is made
        explicit.
