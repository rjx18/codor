id: v5-p3-review-fixes
title: V5 Phase 3 review fixes - one accessible accent union with an explicit
  theme input, real v5 primitive adoption with every Tailwind utility migrated
  across the room's anchored controls, a structurally-closed room-token guard,
  the real 390 axe matrix, a dedicated 44x44 room-target invariant, the mobile
  run with its tool rows collapsed behind a summary, one shared viewport
  listener, and the 34px avatar the contract names.
notes: >-
  Closes the review blockers against the applied v5-p3-room. The Harn contracts
  are unchanged; the implementation and its tests are corrected to actually meet
  them - several tests asserted weaker substitutes. No codor.service restart;
  isolated e2e daemons only. Gate, in order, all green: build -> test (0 act
  warnings) -> e2e (expanded axe/target matrix) -> harn check.

  1. ACCENT UNION: projectAccent takes ONE ordered union of every adjacent
     background plus an explicit `theme` input on ProjectAccentInput (fallback no
     longer doubles as theme); the same opaque colour renders on the rail dot,
     header chip and selected picker candidate. The unit regression compares all
     three surfaces across explicit and system theme change; channel-create.e2e
     compares the three in the browser.
  2. PRIMITIVE ADOPTION: the room imports and consumes v5/primitives.tsx per an
     adoption matrix - IconButton for the header/rail icon controls and message
     Copy, Button for the member-card actions and spawn/create controls, Input
     for the message and search fields, SegmentedTabs for the context Members/Run
     tabs, CodeChip for the attach hint, Badge/Pill for status chips, Avatar for
     the member-rail avatar (the 34px MESSAGE avatar is a room element, NOT the
     primitive Avatar, so the 38px primitive is unchanged); TypingIndicator for
     announcing the existing truthful active-member working state (e.g. "@alpha is
     working") - NOT an invented typing protocol. Input gains a forwardable ref +
     caller id; SegmentedTabs gains per-tab id, aria-controls and a disabled tab.
     Every Tailwind utility (px-3, text-xs, gap-2, p-5, scroll-mt-16, ...) is
     removed from App.tsx, shell.tsx and components.tsx - 0 of any kind remain.
  3. CLOSED GUARD: room-style.spec.ts names the exact migrated Harn CSS regions,
     asserts each marker exists exactly once, and parses only those regions with
     PostCSS/value-parser, rejecting raw colour/type/spacing/line-height/
     letter-spacing/radius/shadow, and explicitly EXCLUDING the v4 pairing region.
     The TSX guard is an AST with a CLOSED allowed-class policy - only wr-*, cd-*,
     sr-only and explicitly named semantic state classes; NEVER a Tailwind utility
     - rejecting any other class and any non-literal style prop.
  4. 390 AXE MATRIX: both-theme 390 scans for baseline/history (speaker grouping
     + collapsed tools), pending ask, hold, drawer, context sheet.
  5. 44x44 TARGET: a NEW dedicated assumption; a rendered-DOM sweep asserts
  every
     interactive room target (search, mention popup, inbox, spawn, create-channel,
     folder-picker, ask, hold, drawer, context, removal, meter, swatches, message
     actions, composer) has a >=44x44 hit box on the phone; the 30px swatch keeps
     its visual size but gains a 44px hit box.
  6. MOBILE RUN: the run card unframes on mobile like a message; the running
  turn
     and non-tool live prose stay EXPANDED, but the tool rows are inert behind one
     summary line until tapped. Spec: initial mobile, tap-to-reveal, desktop
     expansion, live 719/720 reflow.
  7. ONE LISTENER: room-presentation.ts uses a module-level subscriber store - N
     mounted surfaces share one native resize listener, removed after the last.
  8. AVATAR: the desktop message avatar is 34px (CSS corrected from 38px).

  Also removes the dead [class~='bg-zinc-*'] utility-bridge selectors. Refreshes
  the six captures.
assumptions:
  create:
    - id: web-room-targets-meet-minimum-hit-size
      title: Every interactive room target meets the 44x44 minimum on a phone
      statement: Every interactive target in the room - the header and rail icon
        buttons, the search, inbox, network and settings triggers, the channel
        create and folder-picker controls, the colour swatches, the mention
        control, the composer field and send, the message Copy and permalink,
        the member-card actions, the spawn and removal controls, the ask and
        hold actions, the drawer and context triggers, and the spend meter -
        must present a hit box of at least 44 by 44 CSS pixels on the installed
        phone, even where its visible mark is smaller, so a 30px colour swatch
        keeps its visual size but carries a 44px target; because a touch target
        below 44px fails the mobile accessibility contract, and this must be
        proven by a rendered-DOM sweep over every enumerated mobile room state
        rather than isolated assertions for a few controls.
      reason: The applied room shipped a keyboard-focusable spend meter at 362x28 and
        30px colour swatches, so a target-size invariant distinct from
        controls-fit-the-surface (which governs containment, not hit size) is
        needed, checked by a rendered sweep that no isolated per-control
        assertion can substitute for.
      depends_on:
        - web-room-visual-hierarchy-matches-soft-editorial-reference
        - controls-fit-the-surface-they-sit-on
  reviewed:
    - id: channel-create-dialog-renders-an-accessible-accent
      outcome: unchanged
      reason: The projection contract is unchanged and now holds - one opaque colour
        per channel per theme computed from a single ordered union of every
        adjacent background with an explicit theme input, reused byte-identical
        on the rail dot, header chip and selected swatch, compared on all three
        across explicit and system theme change in unit and browser.
    - id: web-room-visual-hierarchy-matches-soft-editorial-reference
      outcome: unchanged
      reason: The soft-editorial contract is unchanged; the room is brought into line
        - it adopts the v5 primitives, the desktop message avatar is 34px,
        mobile run cards unframe with tool rows collapsed behind a summary, and
        the live width hook shares one listener.
    - id: web-v5-primitives-consume-only-tokens
      outcome: unchanged
      reason: The primitive contract is unchanged; the room now imports and consumes
        the library per the adoption matrix. Input gains a forwardable ref and a
        caller id (to keep the fixed room-search id), and SegmentedTabs gains
        per-tab id, aria-controls and a disabled tab (for the disabled Run tab);
        these are additive, tokenised APIs. The 38px primitive Avatar geometry
        is untouched - the 34px message avatar is a distinct room element - and
        TypingIndicator announces the existing truthful active-member working
        state, not an invented typing protocol.
    - id: web-theme-accessible-modes
      outcome: unchanged
      reason: The theme contract is unchanged; the real both-theme 390 axe matrix is
        implemented over every enumerated mobile state.
    - id: controls-fit-the-surface-they-sit-on
      outcome: unchanged
      reason: Containment is unchanged; the narrow-surface controls now also satisfy
        the new explicit 44x44 target invariant.
    - id: spend-meter-always-on
      outcome: unchanged
      reason: The meter stays always on; it becomes a 44x44 target rather than 362x28.
    - id: normalized-run-items-presented-live
      outcome: unchanged
      reason: Run items still stream live; the mobile run unframes and its tool rows
        collapse behind a summary while the running prose stays expanded.
    - id: compact-one-line-tool-rows
      outcome: unchanged
      reason: Tool rows stay one line; on mobile they collapse behind a single summary
        line until tapped.
    - id: web-spawn-dialog-exposes-canonical-agent-controls
      outcome: unchanged
      reason: The spawn controls keep their canonical form while their utilities
        migrate to primitives and tokens.
    - id: member-config-is-changed-not-respawned
      outcome: unchanged
      reason: Member config stays a change; its control utilities migrate to
        primitives and tokens.
    - id: removing-an-agent-is-one-deliberate-step
      outcome: unchanged
      reason: Removal stays one deliberate step; its control utilities migrate.
    - id: custody-uncertain-never-double-writes
