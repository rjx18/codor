      reason: Member config stays a change, not a respawn, in the restyled member card.
    - id: removing-an-agent-is-one-deliberate-step
      outcome: unchanged
      reason: Removing an agent stays one deliberate step in the restyled control.
    - id: controls-fit-the-surface-they-sit-on
      outcome: unchanged
      reason: Controls keep fitting their surface at every width.
    - id: web-spawn-dialog-exposes-canonical-agent-controls
