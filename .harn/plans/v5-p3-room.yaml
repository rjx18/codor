id: v5-p3-room
title: >-
  V5 Phase 3 - THE ROOM. The atomic soft-editorial redesign of the room shell,
  conversation timeline and context rail, the accessible culori accent
  projection, and the 43-utility Tailwind migration, wiring the shipped v5
  primitives and presentation model into every live surface at once.
notes: >-
  Atomic phase: the room ships as one commit because Harn truth must match the
  shipped UI, so there is no partial landing.

  Operational constraint: NEVER restart the shared Codor backend (codor.service)
  during this phase - it kills every agent in the channel, worker included; only
  isolated per-spec e2e test daemons may run. Exact gate commands, in order, all
  green: `pnpm --filter @codor/web build` (runs tsc --noEmit then vite build) ->
  `pnpm --filter @codor/web test` -> `pnpm --filter @codor/web e2e` -> `harn
  check v5-p3-room`. culori is pinned as a production dependency at ^4.0.2 (MIT),
  added to dependencies not devDependencies, imported tree-shakeably, with
  pnpm-lock.yaml recording the exact resolved version, the license recorded, and
  the bundle/build verified.

  Acceptance:
  - Zero React act warnings across the FULL unit run; the migrated wait test and
    every new components.spec.tsx block set and restore IS_REACT_ACT_ENVIRONMENT
    locally.
  - Zero palette utilities: `grep -oE '(zinc|sky|emerald|red)-[0-9]{2,3}'
    packages/web/src/components.tsx | wc -l` is 0 (down from 43) - necessary but
    NOT sufficient.
  - A CLOSED structural room-token guard over the migrated regions of App.tsx,
    shell.tsx, components.tsx and styles.css: no palette or off-token
    presentation utility (text-white, bg-black, and arbitrary text-[...] or any
    bracket utility included), no legacy --wr-* token in the v5 room region, and
    tokenized colour, type, spacing, line-height, radius, elevation and motion;
    only the projected accent and a closed geometry set are allowed as runtime
    data styles.
  - Responsive geometry, corrected: single column plus drawer below 1024,
    two-pane from 1024 to 1359, and three-pane at and above 1360 (a two-to-three
    transition); the 720 content breakpoint unframes the ordinary message, run
    and tool surfaces. Assert the boundaries at 719/720, 1023/1024 and 1359/1360,
    and
    assert the approved desktop geometry: 10px inset and gaps, a 288px rail, a
    400px context rail, a 760px timeline, 18px floating panels and the v5 card
    radii.
  - At 390: no horizontal overflow and every interactive target at least 44x44.
  - Axe clean in both themes on desktop AND, enumerated at 390px in both themes,
    the redesigned timeline unobscured for baseline and history with speaker
    grouping and collapsed tools, a pending ask, a hold, the open drawer, and the
    context sheet.
  - Six as-built captures {1440,1024,390} x {light,dark} committed under
    tmp/build/design/v5/ with the v5-product-fidelity reference refreshed.

  Progress is tracked in the force-added tmp/build/design/v5/ROOM-PHASE.md, not
  the ignored tmp/design-overhaul tree. Quote and More message actions are NOT
  shipped in this phase; only a functional Copy (copies message.body) and the
  existing independent permalink are, and Quote/More return only under a
  separately specified functional contract.
assumptions:
  create:
    - id: web-room-visual-hierarchy-matches-soft-editorial-reference
      title: The room surface matches the soft-editorial references
      statement: >-
        The web room must match the approved soft-editorial references - a warm
        neutral canvas, three floating rounded panels for the channel rail, the
        centered timeline and the context rail on desktop, a centered timeline
        about 760px wide with the day's messages full-bleed, message rows with a
        34px avatar and per-message actions limited to a functional Copy control
        that copies the message body and announces success, or a clipboard
        failure, in a live region, and the existing independent permalink, both
        reachable by keyboard and touch, run, tool and ask cards on the v5 radius
        scale,
        and a rounded composer with a typing peek. All eight adopted surfaces -
        message, run, tool, ask, hold, composer, member and channel-row - consume
        the presentation model with adoption true and resolve their frame live,
        subscribing to viewport width after mount so that crossing the 720px
        content breakpoint reframes them, with every listener removed on unmount.
        On a phone the ordinary message, run and tool surfaces render as an
        unframed prose timeline with no message cards, no per-message avatars, an
        author header only on speaker change and tool calls collapsed to one
        tappable line, behind a header and off-canvas drawer, while ask, hold,
        composer, member and channel-row stay framed at every width. The Copy
        control is offered only on ordinary chat message rows; run, ask and hold
        bodies may be empty and do not carry Copy unless separately specified. Decorative Quote and
        More affordances are not shipped and require a separately specified
        functional contract. This holds because the approved v5 references define
        a calm, content-first editorial tool rather than the restrained matte
        control surface it replaces.
      reason: >-
        The operator approved the soft-editorial desktop room, centered timeline,
        mobile prose and drawer direction; anchoring it now lets the atomic room
        build compose the shipped v5 primitives and presentation model rather
        than re-derive hierarchy, colour and touch size a component at a time,
        and it ships only actions that actually work rather than mockup buttons.
      depends_on:
        - soft-editorial-design-system-guides-responsive-surfaces
        - web-shell-responsive-three-pane
        - web-theme-accessible-modes
        - web-v5-primitives-consume-only-tokens
        - web-presentation-model-defaults-to-v4-until-adopted
    - id: timeline-rows-are-never-crushed-v5
      title: A row in a scrolling list is content, not flexible space
      statement: >-
        No row in the message timeline may be rendered shorter than its own
        content. The timeline is a column flex container that scrolls, and a flex
        item is normally protected from being crushed because its automatic
        minimum size is its content size - but a row that establishes a scroll
        container, by setting any overflow other than visible, has an automatic
        minimum size of ZERO and becomes the only child the flex algorithm is
        permitted to crush. The approval card does exactly that, to clip its
        accent bar to its rounded corner, and so in any channel whose content
        overflows the viewport it was crushed to a twenty-four pixel sliver with
        its own overflow hiding the remains. Every row type must therefore be
        crush-resistant - not merely the one that was observed to break - and any
        regression that asserts the geometry or the visibility of timeline
        content must use a fixture long enough to OVERFLOW the viewport at phone
        width, because a fixture that does not overflow cannot shrink anything and
        such a test can never fail.
      reason: >-
        The crush invariant is unchanged by the redesign and carries forward
        verbatim; the soft-editorial timeline still scrolls as a column flex
        container, so every row - including the newly rounded cards - must stay
        crush-resistant.
      depends_on:
        - web-room-visual-hierarchy-matches-soft-editorial-reference
    - id: web-motion-is-purposeful-and-reduced-motion-safe-v5
      title: Motion is purposeful and reduced-motion safe
      statement: >-
        The web surface must use the shared v5 motion and easing tokens for row,
        dialog, popup, run-reveal, tab, typing-peek and running-state feedback,
        animate only transform and opacity except for the sanctioned run-collapse
        grid track, remove the shimmer at finalization, and replace motion with
        instant transitions plus a static accent when reduced motion is
        requested, because live activity should be legible without jank or
        vestibular cost.
      reason: >-
        The redesign restyles every animated surface to the v5 motion tokens
        (cdDot, cdPulse, cdPeek), which requires adding --cd-* motion and easing
        tokens to the token layer; the reduced-motion and transform-or-opacity
        discipline is unchanged and must hold across the new room.
      depends_on:
        - normalized-run-items-presented-live
        - web-theme-accessible-modes
    - id: web-waits-are-visible-across-live-surfaces-v5
      title: Agent waits stay visible wherever live work is summarized
      statement: >-
        While an agent has a running turn with wait metadata, its member card
        must identify the peer and tick the elapsed wait, its run header must
        replace the running animation with a static waiting treatment, and the
        timeline foot must distinguish waiting agents from other working agents,
        in the soft-editorial room and its unframed mobile prose alike.
      reason: >-
        Wait visibility is unchanged in substance; the redesign re-expresses it in
        the v5 member card, run header and timeline foot, including the unframed
        mobile prose surface.
      depends_on:
        - live-agent-waits-are-transient
        - web-motion-is-purposeful-and-reduced-motion-safe-v5
        - web-room-visual-hierarchy-matches-soft-editorial-reference
    - id: live-collaboration-contract-is-public-v5
      title: The live collaboration contract is public
      statement: >-
        Public docs must describe member-attributed interim and blocking posts,
        direct-reply waits and renewal, consuming inbox hooks, transient wait
        visibility, member status, and bounded redacted run-evidence search,
        including the exact conventions trailer behavior agents receive.
      reason: >-
        The public contract text is unchanged; its anchors migrate to the -v5
        assumption alongside the room redesign so the documented collaboration
        surface keeps a live owner.
      depends_on:
        - collaboration-briefing-is-capability-aware
        - cli-waits-consume-only-matching-deliveries
        - run-evidence-search-is-bounded-and-redacted
        - web-waits-are-visible-across-live-surfaces-v5
    - id: bridged-room-wears-banner-v5
      title: Bridged rooms permanently disclose their external content boundary
      statement: >-
        A room with any enabled Slack or Telegram bridge must persist a bridged
        config flag and render a permanent plain-language external-platform
        privacy banner on room, settings and ledger surfaces, in the
        soft-editorial visual system, because readable room content deliberately
        leaves the local trust boundary until the bridge is disabled.
      reason: >-
        The disclosure invariant is unchanged; the banner is restyled to the
        soft-editorial system while remaining permanent and plain-language on
        every surface it sits on.
      depends_on:
        - soft-editorial-design-system-guides-responsive-surfaces
        - web-room-visual-hierarchy-matches-soft-editorial-reference
    - id: channel-create-dialog-renders-an-accessible-accent
      title: The channel create dialog and rail render an accessible accent projection
      statement: >-
        The channel create dialog, the room rail and the room header must render
        an accessible projection of a channel's accent computed by one pure
        function of four inputs: the raw stored room.config.color string, the
        channel roomId, the active theme, and the ordered set of opaque
        background colours the accent meets in that theme - the rail row
        background and its hover and selected states, the header chip background,
        and the picker candidate background and its hover and selected states. The
        stored value accepts any non-empty string, invalid CSS and alpha-bearing
        values such as transparent included, and it is the value that persists;
        the projection is render-only and is tested separately from persistence.
        The function first derives a seed colour: the parsed value, or - when the
        value is unparseable - deriveRoomColor(roomId) with its CHANNEL_ACCENTS
        palette imported from the protocol package, never a duplicated hash or
        hex; and when the parsed value carries alpha the seed is that value
        composited over the worst-contrast background in the set, retaining the
        source alpha only for that composite, so the seed is always well defined.
        Holding the seed's OKLCH hue and chroma, the function walks lightness
        outward from the seed lightness in fixed steps, gamut-clamps each
        candidate to an opaque sRGB colour, re-measures contrast on that emitted
        opaque colour rather than any OKLCH intermediate or alpha-bearing value,
        and accepts the first candidate whose contrast is at least 3:1 against
        every background in the set; ties in step distance resolve
        deterministically toward the darker candidate, and if the lightness bounds
        exhaust without a passing candidate it falls back to the --cd-agent token,
        which itself clears the set. The unparseable fallback passes through this
        same search. The single accepted opaque colour is reused on the rail dot,
        the header chip and the selected picker candidate - per-surface
        normalization is forbidden - and every projection re-computes on an
        explicit theme change and on a live system-theme change so that no stale
        inline colour survives, so the selected swatch, the rail dot and the
        header chip always match.
      reason: >-
        Projecting the stored colour for contrast makes the prior "render the
        persisted colour" statement false, so it is retired and replaced with an
        accessible-projection contract; one per-theme projection reused across
        surfaces, defined as an executable pure function, is what prevents one
        channel from rendering as three different colours or going stale on a
        theme change.
      depends_on:
        - channel-creation-derived-and-seeded
        - local-directory-listing-home-contained
        - web-room-rail-creates-owner-room
        - web-theme-accessible-modes
        - every-channel-has-a-visible-accent
    - id: starting-agent-name-derives-one-valid-identity-v5
      title: A channel's starting-agent name derives exactly one valid identity
      statement: >-
        A channel's optional starting-agent name must be preserved as
        display_name while one shared protocol helper derives the lowercase ASCII
        assignable handle preview and request value; unsupported runs become
        separators, length is bounded, empty or too-short derivations use a stable
        valid fallback, reserved output is rejected, and identity errors are shown
        at the name field before any room is created, because a human-facing Name
        control must not leak the strict handle grammar or blame the project
        folder.
      reason: >-
        The identity derivation runtime is unchanged; its anchor comments migrate
        to the -v5 assumption because it depended on the retired
        authoritative-result contract, and it is re-homed onto the accessible
        accent replacement instead.
      depends_on:
        - reserved-handles-rejected
        - channel-create-request-contract
        - channel-creation-derived-and-seeded
        - channel-create-dialog-renders-an-accessible-accent
  retire:
    - id: starting-agent-name-derives-one-valid-identity
      reason: Replaced by the -v5 assumption; its anchor comments migrate unchanged in runtime.
    - id: channel-create-dialog-uses-authoritative-result
      reason: Retired for channel-create-dialog-renders-an-accessible-accent; projecting the stored colour makes the render-the-persisted-colour statement false.
    - id: live-collaboration-contract-is-public
      reason: Replaced by the -v5 assumption; the public contract text is unchanged and its doc anchors migrate.
    - id: web-waits-are-visible-across-live-surfaces
      reason: Replaced by the -v5 assumption; wait visibility is re-expressed in the soft-editorial surfaces.
    - id: web-motion-is-purposeful-and-reduced-motion-safe
      reason: Replaced by the -v5 assumption; motion moves to the v5 tokens.
    - id: timeline-rows-are-never-crushed
      reason: Replaced by the -v5 assumption; the crush invariant carries forward verbatim.
    - id: bridged-room-wears-banner
      reason: Replaced by the -v5 assumption; the banner is restyled to the soft-editorial system.
    - id: web-room-visual-hierarchy-matches-restrained-reference
      reason: Superseded by the soft-editorial reference; the restrained matte hierarchy is replaced wholesale.
    - id: web-glass-theme-accessible-modes
      reason: Superseded by web-theme-accessible-modes; its accessibility anchors migrate and its glass CSS marker is removed.
  reviewed:
    - id: web-theme-accessible-modes
      outcome: unchanged
      reason: The token contract is unchanged but the layer is expanded - it gains the --cd-* motion and easing tokens the v5 motion contract needs and becomes the single theme-accessibility owner as the glass axe and contrast anchors migrate onto it.
    - id: design-references-preserve-wireroom-semantics
      outcome: unchanged
      reason: The reference-fidelity contract is unchanged; the v5 as-built captures are refreshed to the shipped soft-editorial room.
    - id: every-channel-has-a-visible-accent
      outcome: unchanged
      reason: The accent stays a filled coloured mark; the projection keeps it filled and coloured, and deriveRoomColor is reused unmodified.
    - id: room-action-errors-are-visible
      outcome: unchanged
      reason: Room-action errors stay visible while their surface and style are restyled.
    - id: empty-and-offline-are-shown-not-blank
      outcome: unchanged
      reason: Empty and offline states stay shown, not blank, in the new timeline.
    - id: normalized-run-items-presented-live
      outcome: unchanged
      reason: Normalized run items still stream live while the run surface is restyled.
    - id: normalized-run-evidence-inspector
      outcome: unchanged
      reason: The evidence inspector keeps typed rows and selection while its panel is restyled.
    - id: literal-draft-effective-recipient-visible
      outcome: unchanged
      reason: The effective recipient stays visible while the composer popup is restyled.
    - id: interaction-cards-stay-readable-on-phone
      outcome: unchanged
      reason: Ask and hold cards stay framed and readable on a phone.
    - id: compact-one-line-tool-rows
      outcome: unchanged
      reason: Tool rows stay one compact line in the restyled run surface.
    - id: the-composer-is-one-row
      outcome: unchanged
