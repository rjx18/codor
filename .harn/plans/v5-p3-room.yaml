      reason: A closed structural guard over the migrated regions of App.tsx, shell.tsx, components.tsx and styles.css - no palette or off-token presentation utility (text-white, bg-black and any arbitrary text-[...] or bracket utility included), no legacy --wr-* token in the v5 room region, and tokenized colour, type, spacing, line-height, radius, elevation and motion, allowing only the projected accent and a closed geometry set as runtime data styles.
