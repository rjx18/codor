id: v5-p4-settings-pairing
title: V5 Phase 4 - migrate Settings and browser Pairing to the soft-editorial
  system while preserving every operational, enrollment, privacy, and local
  browser-state contract.
notes: >-
  Derived design: the references contain no Settings or Pairing screen, so this
  phase composes only the shipped v5 foundation and primitives. Settings becomes
  a quiet operational workspace on the warm canvas: at desktop the existing room
  rail and category navigation remain separate top-level regions while every
  permitted category is a directly-scrolling 18px section panel; below 1024px
  the rail and category navigation collapse and the same sections become one
  linear, uncluttered scroll. Rows stay flat inside their section (no nested
  card dashboard), the theme remains a three-choice radio-style segmented
  control, brakes remain visibly opt-in, the stall flag still never kills,
  device rows and their confirmations stay functional, and the relay disclosure
  remains truthful with roadmap material visually subordinate and never
  presented as an account or billing control.

  Pairing becomes an editorial two-column desktop workspace: the enrollment and
  authority flow is the primary column, the browser/relay boundary disclosure is
  the secondary column, and an offer adds a dedicated, unfiltered white QR paper
  with a real quiet zone and adjacent Codor identity. The manual state retains
  the eight-cell code and concealed-link forms. Code cells use the 11px control
  radius; they stay eight across on desktop and wrap to four by two on a phone
  so every input remains at least 44x44 without horizontal overflow. Below
  1024px all Pairing regions become one ordered linear flow. The 1023/1024
  boundary is a tested contract: Settings changes from hidden navigation plus
  linear sections to visible category navigation plus the desktop workspace, and
  Pairing changes from one ordered column to its editorial columns at exactly
  that boundary.

  Both surfaces use Geist, zero letter spacing, the warm --cd-* light/dark
  palettes, v5 spacing/radius/elevation, Lucide icons, and the existing v5
  Button, IconButton and Input primitives where their semantics fit. The theme
  control keeps radiogroup/radio semantics rather than misusing tab semantics.
  Functional QR paper is the sole fixed-white paint exception. A new anchored
  structural unit guard parses exactly the migrated Settings/Pairing CSS and TSX
  regions. It rejects every --wr-* reference, Tailwind utility token, raw
  presentation value, inline style, nonliteral className and non-Lucide SVG
  bypass; Lucide sizes remain restricted to the v5 icon set. Its only raw-paint
  exception is `.wr-qr-paper||background||#fff`, an exact
  selector/property/value tuple shared by the two QR images. No protocol,
  switchboard, stored-data, service-worker, vite.config.ts, or shared
  codor.service behavior is changed.

  Acceptance is build -> unit -> full isolated e2e -> harn check. In addition to
  the full suite, run pwa.e2e.spec.ts, push.e2e.spec.ts, crypto.e2e.spec.ts and
  motion-pairing.e2e.spec.ts through isolated test daemons. Browser coverage
  proves explicit 1023/1024 geometry assertions and no-overflow checks at 390
  and 1023. The 44x44 sweep runs at both 390 and 1023 from state-specific named
  inventories; it first asserts every named control exists, so an omitted
  control cannot make the sweep vacuously pass.

  The exact-zero axe matrix runs every state in light and dark at both 1440 and
  390. Settings states are: Appearance; Brakes; expanded Relay; Devices with a
  minted offer; device revoke confirmation; Privacy; and Browser unpaired.
  Pairing states are: manual code/link entry; QR offer; and a visible validation
  error. Every matrix entry asserts its distinguishing heading, selector,
  expanded state, offer, confirmation, or alert before axe runs. Each entry uses
  a fresh browser context, and every mutating state uses a fresh room, device,
  or offer fixture as applicable, so revoke, unpair, enrollment, and offer state
  cannot leak between themes or matrix entries.

  Both QR generators use qrcode `margin: 4`. Direct dev dependencies jsqr, pngjs
  and @types/pngjs make scannability executable outside the page DOM: the test
  decodes each raster buffer to the exact expected offer URL, computes the QR
  module count, locates the non-white module bounds, and proves at least four
  module widths of opaque white quiet border on all four sides. Decoder success
  alone is insufficient. Existing tests still prove theme persistence and unpair
  purge; the second-device round trip is extended through revoke; and brakes,
  manual enrollment, hidden offer authority, and both relay disclosure
  headings/copy remain exercised.

  The existing `capture` command remains byte-for-byte unchanged. A separate
  `capture:settings-pairing` command runs a tracked build-first isolated script
  that writes and freshness/dimension-checks exactly eight images under
  tmp/build/design/v5: Settings Appearance and Pairing QR-offer at 1440 and 390
  in explicit light and dark themes. Manual Pairing remains covered by axe and
  e2e.
assumptions:
  create:
    - id: web-settings-pairing-match-soft-editorial-reference
      title: Settings and pairing match the soft-editorial design system
      statement: The web Settings and browser Pairing surfaces must derive from the v5
        soft-editorial system in both themes - Geist with zero letter spacing,
        warm tokenised surfaces, 18px section panels, 11px controls, restrained
        elevation and Lucide icons - while Settings presents flat operational
        rows, a segmented local theme choice, truthful opt-in brakes, relay
        disclosure and device authority, and Pairing presents an editorial
        two-column desktop enrollment with a scannable QR pane plus manual code
        and concealed-link forms. Below 1024px both surfaces must become a
        linear uncluttered flow with no horizontal overflow and every
        interactive target at least 44x44, because the approved references omit
        these product-specific screens and they must be derived from the common
        v5 language without inventing a marketing, account, billing, or
        nested-card interface.
      reason: The v4 restrained assumption requires matte panes and row-only detail
        while Phase 4 adopts the already-shipped warm, rounded v5 foundation;
        one replacement contract records the derivation and keeps product truth
        ahead of absent mockup content.
      depends_on:
        - soft-editorial-design-system-guides-responsive-surfaces
        - web-theme-accessible-modes
        - web-v5-primitives-consume-only-tokens
        - web-settings-controls-preserve-product-truth
        - pairing-discloses-browser-and-relay-boundaries
        - pairing-offer-token-remains-qr-only
  retire:
    - id: web-settings-pairing-match-restrained-reference
      reason: Superseded by the v5 soft-editorial Settings and Pairing contract; its
        two source/regression markers migrate to the replacement while all
        operational and privacy behavior remains unchanged.
  reviewed:
    - id: web-theme-accessible-modes
      outcome: unchanged
      reason: Settings and Pairing consume the existing accessible v5 semantic
        light/dark tokens and focus treatment unchanged; the new axe matrix
        nests under this theme contract and adds no token or contrast exception.
    - id: web-settings-controls-preserve-product-truth
      outcome: unchanged
      reason: Notification, paired-device, brake, stall and relay controls keep their
        existing bindings and truthful copy; the phase changes hierarchy and
        presentation only and adds no fake account, billing, retention or
        approval setting.
    - id: web-theme-choice-stays-local-v5
      outcome: unchanged
      reason: The existing system/dark/light radio control, immediate application,
        local persistence and unpair purge remain unchanged while its segmented
        presentation moves to v5 tokens.
    - id: unpair-purges-all-browser-state
      outcome: unchanged
      reason: Device-row and confirmation presentation changes do not alter remote
        revocation, push unsubscribe,
        service-worker/cache/IndexedDB/localStorage purge, room reset or failure
        disclosure.
    - id: unpaired-browser-always-has-enrollment-path
      outcome: unchanged
      reason: The trusted non-mutating status probe, progress state, manual code and
        concealed link paths remain actionable while their responsive hierarchy
        is restyled.
    - id: pairing-offer-token-remains-qr-only
      outcome: unchanged
      reason: The offer continues to exist only inside the QR/enrollment request and
        never as visible text or a plaintext DOM attribute; scannability
        coverage decodes the raster without weakening the secrecy assertion.
    - id: pairing-discloses-browser-and-relay-boundaries
      outcome: unchanged
      reason: Browser authority, local key custody, relay-visible metadata and
        relay-hidden plaintext remain in one responsive flow with the same
        truthful headings and content.
    - id: pairing-code-enrollment-surfaces
      outcome: unchanged
      reason: CLI and client exchange behavior is untouched; browser code autofocus,
        paste/typing, error handling, Settings offer minting, QR, second-browser
        enrollment and device revoke stay covered while the cells and forms move
        to the v5 layout.
