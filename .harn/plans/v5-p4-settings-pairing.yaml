anchors:
  web-settings-pairing-match-soft-editorial-reference:
    soft-editorial-settings-surface:
      action: change
      reason: Replace the restrained Settings marker with the v5 section-panel
        hierarchy while preserving every selector, role gate and action.
    soft-editorial-pairing-surface:
      action: change
      reason: Anchor the Pairing enrollment, QR, manual forms and disclosures to the
        derived v5 hierarchy without changing enrollment behavior.
    soft-editorial-settings-pairing-style:
      action: change
      reason: Consolidate the duplicated v4 Settings/Pairing CSS into one closed
        --cd-* region for the warm panels, flat rows, desktop columns, linear
        mobile layout, responsive targets and both themes.
    soft-editorial-settings-pairing-token-discipline:
      action: change
      reason: New PostCSS/value-parser and TypeScript-AST guard over exactly the three
        migrated source regions; reject legacy tokens, Tailwind utilities, raw
        presentation, inline styles and nonliteral class bypasses, with only
        `.wr-qr-paper||background||#fff` permitted as a raw-paint tuple.
    soft-editorial-settings-regression:
      action: change
      reason: Replace matte/zero-radius assertions with 18px panels, v5 tokens,
        direct-scroll categories, explicit 1023/1024 geometry, no overflow at
        390 and 1023, named non-vacuous 44px target inventories at both widths,
        brake defaults and truthful relay/device behavior.
    soft-editorial-pairing-regression:
      action: change
      reason: Cover the two-column/linear transition at 1023/1024, QR margin-four
        paper, out-of-DOM exact-URL decode and four-module quiet border, 11px
        code cells, named targets at 390/1023, hidden authority, disclosures and
        functional enrollment states.
    soft-editorial-settings-pairing-axe:
      action: change
      reason: New exact-zero both-theme 1440/390 matrix for seven distinct Settings
        states and three distinct Pairing states, each proven reached before
        scan.
    soft-editorial-settings-pairing-capture-proof:
      action: change
      reason: New separate capture:settings-pairing build-first isolated pipeline that
        writes and verifies the eight Appearance/QR-offer Phase 4 images without
        changing the existing room capture command or touching codor.service.
  web-settings-pairing-match-restrained-reference:
    restrained-settings-pairing-surface:
      action: remove
      reason: Replaced by soft-editorial-settings-surface.
    restrained-settings-pairing-regression:
      action: remove
      reason: Replaced by the soft-editorial Settings and Pairing regressions.
  web-theme-accessible-modes:
    theme-contrast-matrix:
      action: keep
      reason: The established semantic contrast matrix remains unchanged.
    soft-editorial-token-layer:
      action: keep
      reason: Phase 4 consumes the shipped token layer without adding or changing
        tokens.
    token-resolution-regression:
      action: keep
      reason: Existing token graph resolution coverage remains unchanged.
    axe-bridged-state:
      action: keep
      reason: Existing bridged-room axe coverage remains unchanged.
    axe-hold-state:
      action: keep
      reason: Existing hold-state axe coverage remains unchanged.
    axe-room-matrix-dark:
      action: keep
      reason: Existing dark room axe coverage remains unchanged.
    axe-room-matrix-light:
      action: keep
      reason: Existing light room axe coverage remains unchanged.
    axe-room-matrix-shared:
      action: keep
      reason: Existing shared room axe driver remains unchanged.
    theme-contrast-values:
      action: keep
      reason: Existing browser token-value assertions remain unchanged.
    axe-settings-pairing-matrix:
      action: change
      reason: Nest the new state-proven Settings/Pairing matrix under the accessible
        theme contract as well as the visual replacement.
  web-settings-controls-preserve-product-truth:
    glass-settings-surface:
      action: change
      reason: Recompose existing truthful controls with v5 primitives and hierarchy;
        data binding and role gating remain unchanged.
    glass-settings-regression:
      action: change
      reason: Keep brake, device and relay truth assertions while replacing the v4
        computed-style expectations and adding device-revoke coverage.
  web-theme-choice-stays-local-v5:
    prepaint-reads-local:
      action: keep
      reason: The prepaint local theme read is outside Phase 4 and must not change.
    settings-theme-control:
      action: change
      reason: Preserve radiogroup behavior and selectors while presenting the three
        choices as the v5 segmented control.
    local-theme-preference:
      action: keep
      reason: Theme persistence logic remains unchanged.
    theme-choice-regression:
      action: keep
      reason: The existing immediate/local/reload/system regression stays the
        authoritative persistence proof and must continue passing unchanged.
  unpair-purges-all-browser-state:
    device-revoke-rest:
      action: keep
      reason: Server revocation behavior is explicitly out of scope.
    settings-unpair-action:
      action: change
      reason: Restyle the current-device row and confirmation with v5 controls while
        preserving the exact revoke/disconnect/reset/purge sequence and
        warnings.
    browser-unpair-purge:
      action: keep
      reason: Browser purge implementation and stored data remain untouched.
  unpaired-browser-always-has-enrollment-path:
    trusted-pairing-status-regression:
      action: keep
      reason: Switchboard trusted-status behavior remains untouched.
    trusted-pairing-status-rest:
      action: keep
      reason: The unauthenticated non-mutating status endpoint remains untouched.
    trusted-browser-pairing-client:
      action: keep
      reason: Trusted enrollment client behavior remains untouched.
    unpaired-auth-gate:
      action: keep
      reason: Route gating remains untouched.
    unpaired-pairing-workspace:
      action: change
      reason: Restyle the progress and manual enrollment states into the responsive v5
        flow without removing either path.
    pairing-gate-browser-regression:
      action: change
      reason: Retain the trusted/manual/link narrative and add phone overflow and
        target-size assertions for the restyled manual form.
  pairing-offer-token-remains-qr-only:
    glass-pairing-surface:
      action: change
      reason: Restyle the offer workspace and QR paper without rendering the token.
    pairing-token-visibility-regression:
      action: change
      reason: Keep visible-text/attribute authority checks and add raster QR decode
        against the exact offer URL.
  pairing-discloses-browser-and-relay-boundaries:
    pairing-boundary-workspace:
      action: change
      reason: Reflow the same browser/relay disclosure into editorial desktop and
        linear phone regions.
    pairing-boundary-regression:
      action: change
      reason: Replace v4 material assertions while retaining every privacy-boundary
        assertion in both layouts.
  pairing-code-enrollment-surfaces:
    pair-code-cli-regression:
      action: keep
      reason: CLI code formatting is outside the visual phase.
    pair-code-command:
      action: keep
      reason: CLI offer issuance is outside the visual phase.
    settings-pair-another-device:
      action: change
      reason: Restyle the minted code/QR and pair-another action while preserving
        selectors, expiry and hidden token behavior.
    pairing-code-client-api:
      action: keep
      reason: Pairing API protocol is explicitly out of scope.
    browser-pairing-code-client:
      action: keep
      reason: Code exchange and enrollment logic remain untouched.
    browser-pairing-code-workspace:
      action: change
      reason: Recompose the existing autofocus code and concealed-link forms for the
        8-column desktop and 4-by-2 phone layouts.
    pairing-code-surface-style:
      action: change
      reason: Move code cells, Settings offer and forms from legacy --wr-* values to
        v5 tokens, 11px radii and 44px phone targets.
    pairing-code-browser-regression:
      action: change
      reason: Keep manual and second-device enrollment, add Settings QR decode and
        complete the second-device story through revoke.
    pairing-code-browser-harness:
      action: keep
      reason: The isolated harness offer shape and protocol remain untouched.
