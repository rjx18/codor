anchors:
  graph-derived-from-vault-links-readonly-v5:
    ledger-graph-regression:
      action: change
      reason: Move the deterministic nodes/edges regression to the v5 replacement
        without changing its backend assertions.
    ledger-graph-cache:
      action: change
      reason: Move the watched-vault projection marker only; graph derivation and
        cache invalidation remain byte-for-byte unchanged.
    ledger-graph-rest:
      action: change
      reason: Move the authorized read-only REST marker only; request, response, role,
        and schema behavior remain byte-for-byte unchanged.
    ledger-graph-web:
      action: change
      reason: Replace the v4 marker around the live graph page while preserving every
        fetch, test id, role, accessible name, state, and interaction and
        migrating only hierarchy, primitive consumption, literal state classes,
        and functional SVG type hooks.
    soft-editorial-ledger-style:
      action: change
      reason: Replace the unanchored v4 Ledger declarations with one closed v5 region
        for the warm graph, semantic nodes/edges, 18px inspector, shared
        rail/panel composition, exact responsive modes, phone controls popover,
        color-independent type legend/descriptions, 3:1 graphical contrast,
        focus, and target sizes while leaving adjacent shared bridge/message
        rules unchanged.
    soft-editorial-ledger-token-discipline:
      action: change
      reason: Add a PostCSS/value-parser and TypeScript-AST guard over global
        Ledger-owned selectors and the graph TSX, with a closed functional-SVG
        exception, parsed semantic non-text contrast matrix, global
        duplicate-rule detection, and negative bypass fixtures.
    ledger-graph-browser-regression:
      action: change
      reason: Anchor functional and geometry coverage for projection, search/type
        filtering, links/backlinks, note viewing, zoom, drag-pan, reset,
        read-only controls, the phone Graph-controls popover and all four
        commands, color-independent node descriptions, non-vacuous 44px
        node/control targets, overflow, and exact 719/720 and 1359/1360
        transitions.
    ledger-graph-semantics:
      action: change
      reason: Move the existing group/node and complementary/dialog semantics
        regression to the replacement and extend it across the exact boundaries
        without changing names or focus behavior.
    soft-editorial-ledger-axe:
      action: change
      reason: Add the state-asserted fresh-context both-theme matrix for graph, docked
        inspector, side overlay, bottom sheet, and note dialog.
    soft-editorial-ledger-capture-proof:
      action: change
      reason: Add a separate build-first isolated six-capture pipeline for the three
        responsive inspector modes without changing existing capture commands.
  graph-derived-from-vault-links-readonly:
    ledger-graph-regression:
      action: remove
      reason: Re-anchored unchanged to graph-derived-from-vault-links-readonly-v5.
    ledger-graph-cache:
      action: remove
      reason: Re-anchored unchanged to graph-derived-from-vault-links-readonly-v5.
    ledger-graph-rest:
      action: remove
      reason: Re-anchored unchanged to graph-derived-from-vault-links-readonly-v5.
    ledger-graph-web:
      action: remove
      reason: Replaced by the v5 Ledger web anchor.
    ledger-graph-semantics:
      action: remove
      reason: Re-anchored and extended under the v5 replacement.
  ledger-writes-audited-in-room:
    ledger-change-audit:
      action: keep
      reason: Ledger audit notices and attribution do not change.
  roles-gate-human-acts-not-agents:
    role-matrix-integration:
      action: keep
      reason: The authorization regression does not change.
    role-matrix-source:
      action: keep
      reason: The role matrix does not change.
    role-aware-web-controls:
      action: keep
      reason: Existing role-aware room controls do not change and Ledger adds no
        mutating control.
  soft-editorial-design-system-guides-responsive-surfaces:
    soft-editorial-responsive-contract:
      action: keep
      reason: Phase 5 consumes the shipped v5 contract without changing it.
  web-theme-accessible-modes:
    theme-contrast-matrix:
      action: keep
      reason: Ledger uses the existing measured semantic roles unchanged.
    soft-editorial-token-layer:
      action: keep
      reason: No token declaration or alias changes; Ledger consumes only the existing
        v5 graph-appropriate semantic and surface roles.
    token-resolution-regression:
      action: keep
      reason: The token graph remains unchanged.
    axe-room-matrix-dark:
      action: keep
      reason: Existing broad dark-theme coverage remains unchanged.
    axe-room-matrix-light:
      action: keep
      reason: Existing broad light-theme coverage remains unchanged.
    axe-room-matrix-shared:
      action: keep
      reason: The existing shared sweep and its Ledger/note states remain unchanged;
        dedicated Phase 5 coverage is additive and isolated.
    axe-ledger-matrix:
      action: change
      reason: Nest the new state-asserted both-theme Ledger matrix under the
        accessible theme contract and the v5 Ledger replacement.
  web-v5-primitives-consume-only-tokens:
    v5-primitive-styles:
      action: keep
      reason: Ledger consumes the existing primitive CSS unchanged.
    v5-primitive-token-discipline:
      action: keep
      reason: Existing primitive token enforcement remains unchanged.
    v5-primitive-render-regression:
      action: keep
      reason: Existing primitive render and target coverage remains unchanged.
    v5-primitive-components:
      action: keep
      reason: Ledger consumes the current public primitive components unchanged.
  design-references-preserve-wireroom-semantics:
    v5-product-fidelity:
      action: keep
      reason: The tracked product-fidelity contract remains unchanged.
  bridged-room-wears-banner-v5:
    bridged-room-config:
      action: keep
      reason: The persisted bridged flag is unchanged.
    bridged-room-banner:
      action: keep
      reason: The existing disclosure component is reused unchanged.
    bridged-room-regression:
      action: keep
      reason: Existing room/Settings/Ledger disclosure coverage remains unchanged.
