        app already renders (panel backgrounds and blurs, brand padding,
        rail-footer background, presence rings, meter chrome, context-trigger
        visibility) and delete the dead .wr-primary-button and .wr-brand-mark
        rules inside the region.
    soft-editorial-room-token-discipline:
      action: change
      reason: Shrink PINNED_GLASS_ERA_NEUTRALIZERS to the empty set, keep the
        exactness test as a permanent gate, and add the fallback-closure check
        (every settled backdrop-filter consumer appears in the no-backdrop and
        reduced-transparency blocks; reduced-motion disables every animation).
    soft-editorial-room-capture-proof:
      action: keep
      reason: The capture pipeline is unchanged; its six artifacts are regenerated
        and must be visually identical.
