id: v5-review-behavior-a11y
title: V5 whole-overhaul review closure 2 - portal modal dialogs above room
  chrome, compute mobile speaker grouping from visible rows, repair the v5 Harn
  anchor mechanics, close the context-sheet and axe fixture coverage gaps, and
  fix the two phone focus defects.
notes: >-
  Review-confirmed findings 2, 4, 6, 9 and 11 (channel #245/#247). Runs after
  v5-review-cascade-truth. Protocol, switchboard, service worker, crypto, push,
  stored data and routing are untouched. Never restart codor.service.

  One - modal stacking (finding 2). The three wr-modal-backdrop sites (spawn
  dialog components.tsx:775, channel-create shell.tsx:291, ledger note dialog
  components.tsx:2319) render inline inside panel subtrees; the context-rail
  tabpanel's filled wr-cross-fade animation creates a permanent stacking
  context, so the hold banner (z-index 2 in the outer canvas context) paints
  over the trapped z-50 modal and click-blocks its Close control. Fix
  structurally: one shared ModalBackdrop wrapper renders the backdrop through
  createPortal to document.body, used by all three sites, so modal layering
  never depends on the mount point. The wrapper carries the existing
  className/children untouched; React synthetic events (Escape handlers) and
  wrapper-ref focus traps work identically through portals, and the drawer's
  spawn-dialog document query still resolves. If body-level rendering loses an
  inherited font or color, the backdrop gains explicit token-only inherits in
  the anchored room region. This makes every modal paint above the hold banner,
  the room header and any panel chrome. New assumption
  modal-dialogs-layer-above-room-chrome records the layering contract, anchored
  at the shared wrapper and at a browser regression that holds a delivery, opens
  the spawn dialog, and proves the dialog heading and Close are the top
  hit-targets at their own coordinates and that Close actually closes.

  Two - speaker grouping (finding 4). App.tsx:699 computes precededBySameAuthor
  from the raw message array while :721 renders null for approvals that are no
  longer actionable, so a resolved approval between two authors makes the next
  author's phone message render headerless under the previous author's header.
  Fix: derive the rendered timeline first - filter out non-actionable approvals
  - and compute grouping from that visible sequence. Unit regression in
  components.spec drives the visible-sequence computation; browser regression
  seeds author A message, author B approval, resolves it, posts author B
  message, and asserts at 390 that B's message keeps its author header while
  genuine same-author runs still group.

  Three - Harn anchor mechanics in v5-owned files only (finding 6, review
  scope). agent-controls.tsx: add the missing harn:end
  one-control-chooses-an-agent-everywhere and reorder the two existing end
  markers into LIFO order so all three declared anchors become tracked.
  components.spec.tsx: add the missing harn:end
  timeline-rows-are-never-crushed-v5 after the crush-gate describe block.
  index.html: move the two prepaint anchor pairs inside the inline script as JS
  comments so the tracked regions actually cover the prepaint code they guard;
  the script's behaviour is unchanged. Verify with harn find --file that all
  repaired anchors are tracked. Adapter/switchboard anchor debt is explicitly
  out of scope. The same-defect anchor in run-presenter.spec.ts is excluded per
  the review's file list.

  Four - coverage gaps (finding 9). e2e: a Tab-cycle trap regression for the
  context sheet that targets the production-queried .wr-context-sheet class
  itself, so a class rename breaks a test before it breaks the trap.
  a11y-shared: assert the offline state actually rendered (reconnecting status
  visible) before the room:offline scan, and assert the seeded ask card is
  visible before the room:history+ask scan. a11y-settings-pairing: drive and
  axe-scan the pairing checking state (trusted-pairing-progress) in both themes.

  Five - phone focus defects (finding 11). Closing message search currently
  restores focus to desktop-only room-search-toggle, dropping phone focus to
  body: restore to the phone overflow trigger when the desktop toggle is not
  rendered. RoomOverflow's outside-pointerdown close refocuses its trigger,
  stealing focus from the control the user tapped: outside-tap closes without
  refocus; Escape keeps refocusing the trigger. Browser regressions assert both
  behaviours at 390.

  Gate in order: build -> unit -> focused browser (modal layering, grouping,
  context-sheet trap, focus pair, pairing-checking axe, room axe light+dark) ->
  harn check/apply. Then the single full build/unit/e2e/harn gate for the
  checkpoint, per review instruction.
assumptions:
  create:
    - id: modal-dialogs-layer-above-room-chrome
      title: Modal dialog backdrops portal to the body and layer above all room chrome
      statement: Every wr-modal-backdrop dialog - spawn, channel create, and the
        ledger note dialog - must render through the shared body-level portal
        wrapper so its backdrop and dialog paint above all room chrome,
        including the hold banner, the room header and any panel stacking
        context, whenever the dialog is open, because a modal whose Close
        control can be covered or click-blocked by page chrome silently breaks
        both pointer dismissal and the modality the dialog role promises.
      reason: The review proved the hold banner (z-index 2 in the canvas context)
        paints over the z-50 spawn dialog trapped in the context-rail tabpanel's
        filled-animation stacking context, click-blocking its Close control.
        Mount-point-independent layering is a review obligation that future
        overlay or motion work must not regress.
  reviewed:
