anchors:
  windows-named-pipe-shares-local-websocket-protocol:
    windows-local-socket-selection:
      action: change
      reason: Add deterministic platform-specific endpoint derivation and named-pipe
        detection.
    windows-pipe-client-transport:
      action: change
      reason: Add the CLI URL and dial workaround for named pipes while preserving
        parsed frames.
    windows-pipe-server-listener:
      action: change
      reason: Skip POSIX filesystem preparation and chmod only for named pipes.
    windows-pipe-regression:
      action: change
      reason: Pin deterministic selection and an end-to-end local protocol exchange.
  windows-setup-installs-task-scheduler-service:
    windows-service-rendering:
      action: change
      reason: Render the PowerShell service wrapper and UTF-16 Task Scheduler XML.
    windows-setup-runtime:
      action: change
      reason: Add confirmed install, ACL, registration, start, and dry-run behavior.
    windows-setup-regression:
      action: change
      reason: Pin redaction, absolute paths, UTF-16 output, ACL and scheduled commands.
  windows-cli-installer-is-idempotent:
    windows-cli-install-script:
      action: change
      reason: Add the stable per-user codor.cmd and idempotent user PATH update.
    windows-cli-install-regression:
      action: change
      reason: Statically pin missing-build refusal, argument forwarding, stable
        location and de-duplicated PATH logic where PowerShell is unavailable.
  windows-process-liveness-probes-own-pid:
    windows-process-probe-target:
      action: change
      reason: Centralize positive-Windows versus negative-POSIX probe target selection.
    windows-process-probe-regression:
      action: change
      reason: Pin both platform branches without requiring a Windows host.
  windows-cli-adapters-resolve-command-shims:
    windows-cli-spawn-provider:
      action: change
      reason: Use cross-spawn for provider turns and OpenCode synchronous discovery.
    windows-cli-spawn-regression:
      action: change
      reason: Keep subprocess fixtures shell-independent and pin discovery failures.
  member-env-selects-narrow-cli-identity:
    explicit-token-unix-transport:
      action: change
      reason: Derive the local endpoint centrally while retaining the token query
        contract.
  unix-socket-same-protocol:
    cli-protocol-transport:
      action: change
      reason: Add named-pipe dialing without changing the existing frame parser or
        methods.
    unix-websocket-listener:
      action: change
      reason: Branch only the listener preparation for a Windows named pipe.
  unix-socket-parent-private-before-listen:
    unix-socket-parent-precondition:
      action: keep
      reason: The POSIX parent validation body remains unchanged and is bypassed
        before entry only for named pipes.
  cli-setup-wizard-installs-platform-user-service:
    setup-runtime:
      action: change
      reason: Extend the platform branch with Windows setup while preserving Linux and
        macOS paths.
    setup-regression:
      action: change
      reason: Make POSIX fixture tests platform-scoped alongside dedicated Windows
        coverage.
  setup-service-runs-from-current-checkout:
    linux-service-current-checkout-regression:
      action: change
      reason: Scope the POSIX fixture to hosts where its path and mode assertions
        apply.
  operator-launches-serve-web-next:
    systemd-current-web-client:
      action: change
      reason: Scope the Linux service fixture and keep the same built web-next path.
    cli-default-static-root:
      action: keep
      reason: Static-root selection remains byte-for-byte unchanged beside local
        endpoint selection.
  global-cli-install-is-idempotent:
    cli-install-regression:
      action: change
      reason: Scope the existing shell installer regression to POSIX hosts.
  attach-custody-lease-tracks-child-pid:
    attach-release-handshake:
      action: change
      reason: Route recorded process-group identities through the platform-specific
        probe helper.
  custody-uncertain-never-double-writes:
    attach-lease-loss-reconcile:
      action: change
      reason: Use the corrected probe target during expired-lease reconciliation.
  adapter-process-lifecycle-supervised:
    copilot-cli-process-supervision:
      action: change
      reason: Replace only the spawn provider.
    gemini-cli-process-supervision:
      action: change
      reason: Replace only the spawn provider.
    opencode-cli-process-supervision:
      action: change
      reason: Replace only the spawn provider.
  remaining-cli-adapters-use-supervised-subprocesses:
    copilot-cli-subprocess-driver:
      action: change
      reason: Replace native spawn with its Windows-compatible equivalent.
    gemini-cli-subprocess-driver:
      action: change
      reason: Replace native spawn with its Windows-compatible equivalent.
    opencode-cli-subprocess-driver:
      action: change
      reason: Replace native spawn with its Windows-compatible equivalent.
  adapters-own-their-model-catalog:
    opencode-model-discovery:
      action: change
      reason: Use cross-spawn sync and shell-independent fixtures for installed-model
        discovery.
  context-peek-reads-session-artifacts:
    claude-context-peek-regression:
      action: change
      reason: Convert fixture URLs through fileURLToPath on every platform.
    codex-context-peek-regression:
      action: change
      reason: Convert fixture URLs through fileURLToPath on every platform.
  bridge-runtime-persists-delivery-progress:
    bridge-durable-regression:
      action: change
      reason: Keep the privacy assertion while applying POSIX mode checks only where
        mode bits are real.
  codor-runtime-identity-is-a-clean-break:
    systemd-runtime-identity:
      action: change
      reason: The enclosing setup fixture becomes POSIX-host scoped without changing
        runtime names.
  adapter-registry-sole-harness-source:
    registry-cli-composition:
      action: change
      reason: The enclosing CLI up regression expects the platform-derived endpoint.
    third-party-hot-swap-acceptance:
      action: change
      reason: Add Windows-friendly timeout headroom without changing adapter loading.
    hardcoded-list-guard:
      action: change
      reason: Normalize path separators before checking the sole registry import path.
  permalink-ids-stable:
    m1-live-acceptance:
      action: change
      reason: Live acceptance derives the correct platform-local endpoint without
        changing ids.
  browser-protocol-epoch-blocks-only-stale-browser-ui:
    production-browser-protocol-minimum:
      action: change
      reason: The enclosing up composition derives the local endpoint; the epoch
        minimum is unchanged.
    browser-protocol-regression:
      action: change
      reason: The regression uses the platform-local endpoint for agent and owner
        clients.
  member-session-masks-operator-token:
    member-token-mask-regression:
      action: change
      reason: Expect the platform-derived endpoint beside the unchanged credential
        mask.
  agent-network-authority-is-narrow:
    agent-authz-regression:
      action: change
      reason: Use the platform-local endpoint in the existing narrow-agent
        authorization regression.
