id: windows-native-support
title: Add native Windows local transport, per-user service setup, CLI
  installation, and subprocess compatibility without weakening POSIX contracts
notes: >-
  Reconstruct the Windows portion of contributor PR #3 as one reviewable unit.
  Existing Unix-socket, systemd, launchd, attach-custody, and adapter lifecycle
  assumptions remain true and are reviewed unchanged; Windows behavior is
  recorded as supplemental truth rather than by hand-editing or broadening their
  immutable statements. The local transport selects a deterministic named pipe
  on Windows and the existing private Unix socket elsewhere. The CLI and server
  carry the same parsed protocol over both transports, while filesystem
  parent/mode operations remain POSIX-only. Setup renders a hidden per-user Task
  Scheduler job whose PowerShell wrapper reads the token from its ACL-protected
  file, uses absolute checkout/build paths, and exits with the daemon status.
  The Windows installer writes one stable user-local command shim and adds its
  directory to the user PATH idempotently. CLI-backed adapters use cross-spawn
  so Windows command shims resolve without changing argv, environment
  inheritance, or child supervision. Process-liveness probing uses a positive
  leader pid on Windows and the existing negative POSIX process-group id
  elsewhere. Platform-sensitive tests use portable file URL, junction, path, and
  mode handling. No protocol schema, browser epoch, Antigravity adapter, legacy
  web client, public docs, deploy, or daemon restart is in scope.

  Acceptance is frozen install, Harn check, full build and unit suite, plus
  focused CLI, switchboard, adapter, local transport, setup, and
  process-liveness tests. A native Windows host is unavailable, so Task
  Scheduler, PowerShell, named-pipe DACL behavior, and real .cmd resolution
  remain explicit release limitations even though their deterministic rendering
  and platform selection are unit-tested.
assumptions:
  create:
    - id: windows-named-pipe-shares-local-websocket-protocol
      title: Windows local clients use a private deterministic named pipe with the
        same WebSocket protocol
      statement: On Windows the switchboard and CLI must derive the same deterministic
        named-pipe name from the resolved data directory, avoid Unix filesystem
        preparation for that pipe, and exchange the existing parsed ClientFrame
        and ServerFrame WebSocket protocol over it, because local owner
        admission is tokenless and transport selection must not change protocol
        or cross-profile isolation.
      reason: Windows has no Unix-domain socket path or POSIX mode bits, while the CLI
        and switchboard still need one local authenticated transport contract.
      depends_on:
        - unix-socket-same-protocol
        - unix-socket-parent-private-before-listen
    - id: windows-setup-installs-task-scheduler-service
      title: Windows setup installs a hidden per-user Task Scheduler service
      statement: On Windows codor setup must confirm mutations, create private
        configuration and data paths, protect the operator token with the
        current user's ACL, render a hidden logon Task Scheduler job that runs
        the built CLI and web-next assets from the invoking checkout with
        absolute paths, read the token from disk without printing it, and
        propagate the daemon exit code, because setup must produce the same
        durable per-user service outcome as Linux and macOS without exposing
        credentials.
      reason: Windows cannot use systemd or launchd and needs a truthful native
        per-user service path.
      depends_on:
        - cli-setup-wizard-installs-platform-user-service
        - setup-service-runs-from-current-checkout
        - operator-launches-serve-web-next
    - id: windows-cli-installer-is-idempotent
      title: Windows CLI installation is one stable idempotent per-user shim
      statement: The Windows CLI installer must refuse a missing build, write one
        stable codor.cmd shim under the user's local bin directory, preserve
        arguments, and add that directory to the user PATH at most once across
        repeated runs, because install instructions need one predictable command
        without accumulating stale shims or PATH entries.
      reason: The existing shell installer is POSIX-specific and its invariant needs a
        Windows counterpart.
      depends_on:
        - global-cli-install-is-idempotent
    - id: windows-process-liveness-probes-own-pid
      title: Windows custody and recovery probe the process leader rather than a POSIX
        process group
      statement: When custody or crash recovery records a process-group leader,
        liveness checks must probe the positive leader pid on Windows and the
        negative process-group id on POSIX, because Windows does not implement
        POSIX negative process-group signalling and a false-dead result can
        cause concurrent ownership and duplicate work.
      reason: Existing custody and ambiguous-crash recovery store both child and
        process-group identities but their POSIX probe syntax is not portable.
      depends_on:
        - attach-custody-lease-tracks-child-pid
        - custody-uncertain-never-double-writes
    - id: windows-cli-adapters-resolve-command-shims
      title: CLI-backed adapters resolve Windows command shims without changing
        process supervision
      statement: CLI-backed adapters that launch Copilot, Gemini, or OpenCode must use
        a Windows-compatible spawn implementation for asynchronous turns and
        synchronous discovery while preserving exact argv, inherited session
        environment, interruption, output parsing, and terminal cleanup, because
        Node's native spawn does not consistently resolve Windows .cmd and
        shebang shims.
      reason: Windows installations commonly expose provider CLIs as command shims
        rather than native executables.
      depends_on:
        - adapter-process-lifecycle-supervised
        - remaining-cli-adapters-use-supervised-subprocesses
        - adapter-children-inherit-session-env
  reviewed:
    - id: unix-socket-same-protocol
      outcome: unchanged
      reason: POSIX continues to use the same mode-0600 Unix socket and parsed frame
        protocol; Windows adds a separate transport selector.
    - id: unix-socket-parent-private-before-listen
      outcome: unchanged
      reason: Unix socket parent validation and mode enforcement remain byte-for-byte
        active for non-pipe paths.
    - id: member-env-selects-narrow-cli-identity
      outcome: unchanged
      reason: Member credentials and explicit-token selection are unchanged; only the
        platform-specific local endpoint is derived centrally.
    - id: cli-setup-wizard-installs-platform-user-service
      outcome: unchanged
      reason: Linux systemd and macOS launchd behavior remain intact while Windows
        adds a Task Scheduler branch.
    - id: setup-service-runs-from-current-checkout
      outcome: unchanged
      reason: Existing Linux behavior is unchanged and the Windows service
        independently records absolute paths from the invoking checkout.
    - id: operator-launches-serve-web-next
      outcome: unchanged
      reason: Every platform continues to serve the built web-next assets; Windows
        adds the same static-root selection to its wrapper.
    - id: global-cli-install-is-idempotent
      outcome: unchanged
      reason: The POSIX installer remains unchanged while a separate PowerShell
        installer implements the corresponding Windows invariant.
    - id: attach-custody-lease-tracks-child-pid
      outcome: unchanged
      reason: Lease identities and release rules are unchanged; only the
        platform-specific probe target is corrected.
    - id: custody-uncertain-never-double-writes
      outcome: unchanged
      reason: Recovery still refuses concurrent ownership; the Windows probe makes the
        existing decision accurate.
    - id: adapter-process-lifecycle-supervised
      outcome: unchanged
      reason: Cross-spawn returns the same ChildProcess contract and existing
        interruption, exit, and cleanup logic remains unchanged.
    - id: remaining-cli-adapters-use-supervised-subprocesses
      outcome: unchanged
      reason: The same three adapters and process lifecycle remain; only the portable
        spawn provider changes.
    - id: adapter-children-inherit-session-env
      outcome: unchanged
      reason: Each adapter still merges the session environment over process.env
        without modification.
    - id: adapters-own-their-model-catalog
      outcome: unchanged
      reason: OpenCode still discovers its installed catalog; its synchronous command
        runner becomes Windows-compatible.
    - id: context-peek-reads-session-artifacts
      outcome: unchanged
      reason: Peek semantics remain unchanged while fixture URLs are converted with
        fileURLToPath for Windows paths.
    - id: bridge-runtime-persists-delivery-progress
      outcome: unchanged
      reason: Bridge state remains durably private; the POSIX mode assertion is
        skipped only where Windows exposes synthetic mode bits.
    - id: codor-runtime-identity-is-a-clean-break
      outcome: unchanged
      reason: Windows portability changes only fixture endpoint selection; runtime
        identity and service labels remain unchanged.
    - id: adapter-registry-sole-harness-source
      outcome: unchanged
      reason: Registry membership is unchanged; acceptance gains only Windows path
        normalization and timing headroom.
    - id: permalink-ids-stable
      outcome: unchanged
      reason: Live acceptance keeps the same id contract while deriving its
        platform-local endpoint centrally.
    - id: browser-protocol-epoch-blocks-only-stale-browser-ui
      outcome: unchanged
      reason: Epoch admission is unchanged; its composition and regression use the
        platform-local endpoint.
    - id: member-session-masks-operator-token
      outcome: unchanged
      reason: The same masked credential set now includes the platform-derived local
        endpoint.
    - id: agent-network-authority-is-narrow
      outcome: unchanged
      reason: Authorization behavior is unchanged; the regression uses the same local
        endpoint helper as production.
