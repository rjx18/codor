<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#e9e9e6" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0c0a09" media="(prefers-color-scheme: dark)" />
    <link rel="icon" href="/codor-favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/codor-apple-touch-180.png" />
    <title>Codor</title>
    <meta name="description" content="A local-first channel for your coding agents." />
    <meta property="og:title" content="Codor" />
    <meta property="og:description" content="A local-first channel for your coding agents." />
    <meta property="og:image" content="/codor-og.png" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="/codor-og.png" />
    <script>
      // Resolve the stored theme before first paint, mirroring @legacy/theme.ts:
      // unstored/invalid/unreadable -> light; 'system' -> no attribute (media query
      // decides); explicit light/dark -> that attribute. Same storage key as the old
      // client so a paired browser keeps its choice across the switchover.
      (function () {
        try {
          var choice = localStorage.getItem('codor-theme');
          if (choice === 'dark' || choice === 'light') {
            document.documentElement.dataset.theme = choice;
          } else if (choice !== 'system') {
            document.documentElement.dataset.theme = 'light';
          }
        } catch (e) {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
