<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#e9e9e6" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/codor-192.png" />
    <title>Codor</title>
    <!-- Resolve the stored theme before first paint. The module that also does this runs
         after paint, so without this a dark-preferring browser flashes dark, and a stored
         choice opposite the OS flashes the OS colour first. Mirrors readThemeChoice /
         applyThemeChoice in theme.ts: unstored/invalid/unreadable -> light; system -> no
         attribute (the media query decides); explicit light/dark -> that attribute.
         The Harn markers live INSIDE the script as JS comments so the tracked regions
         cover the prepaint code itself; an HTML comment parses as a single-line anchor
         that guards nothing. -->
    <script>
      // harn:assume web-theme-choice-stays-local-v5 ref=prepaint-reads-local
      // harn:assume web-first-run-color-mode-is-light ref=light-first-prepaint
      (function () {
        try {
          var choice = localStorage.getItem('codor-theme');
          if (choice === 'dark' || choice === 'light') {
            document.documentElement.dataset.theme = choice;
          } else if (choice !== 'system') {
            document.documentElement.dataset.theme = 'light';
          }
        } catch (e) {
          document.documentElement.dataset.theme = 'light';
        }
      })();
      // harn:end web-first-run-color-mode-is-light
      // harn:end web-theme-choice-stays-local-v5
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
